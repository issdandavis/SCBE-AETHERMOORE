<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>Saved Passwords</title>
  <style>
    :root {
      --bg:#0d1117; --surface:#161b22; --text:#e6edf3; --muted:#8b949e;
      --accent:#58a6ff; --border:#30363d; --danger:#f85149; --radius:8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:13px;
    }
    header{
      display:flex;align-items:center;gap:10px;padding:14px 16px;
      background:var(--surface);border-bottom:1px solid var(--border);
    }
    header .title{font-weight:600;font-size:15px;}
    header .title .mark{color:var(--accent);}
    header .count{color:var(--muted);font-size:12px;}
    header .spacer{margin-left:auto;}
    button{
      font:inherit;color:var(--text);background:var(--bg);border:1px solid var(--border);
      border-radius:6px;padding:7px 12px;cursor:pointer;transition:border-color .15s,background .15s;
    }
    button:hover{border-color:var(--accent);}
    button.primary{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:600;}
    button.del{color:var(--danger);border-color:transparent;padding:6px 10px;}
    button.del:hover{border-color:var(--danger);background:#f8514915;}
    main{flex:1;overflow-y:auto;padding:14px 16px;}
    .note{
      background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
      border-radius:var(--radius);padding:10px 12px;color:var(--muted);line-height:1.5;margin-bottom:14px;
    }
    .row{
      display:flex;align-items:center;gap:12px;padding:11px 12px;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;
    }
    .row .site{font-weight:600;word-break:break-all;}
    .row .user{color:var(--muted);font-size:12px;word-break:break-all;}
    .row .meta{flex:1;min-width:0;}
    .empty{color:var(--muted);text-align:center;margin-top:50px;line-height:1.7;}
    .empty b{color:var(--text);}
  </style>
</head>
<body>
  <header>
    <span class="title"><span class="mark">✦</span> Saved Passwords</span>
    <span class="count" id="count"></span>
    <span class="spacer"></span>
    <button id="import" class="primary">Import from file…</button>
    <button id="refresh">Refresh</button>
  </header>
  <main>
    <div class="note">
      Passwords are encrypted with Windows' built-in security and stored only on this computer.
      This list shows the site and username only — the password itself is never displayed here.
      Use <b>Import from file…</b> to bring in your Google or Proton Pass export.
    </div>
    <div id="list"></div>
  </main>

  <script>
    const listEl = document.getElementById('list');
    const countEl = document.getElementById('count');

    function hostOf(origin) {
      try { return new URL(origin).host; } catch { return origin; }
    }

    async function render() {
      const items = await window.vaultUI.list();
      countEl.textContent = items.length ? `(${items.length})` : '';
      if (!items.length) {
        listEl.innerHTML =
          '<div class="empty"><b>No saved passwords yet.</b><br/>' +
          'Log into a site and choose <b>Save</b> when asked,<br/>or import your Google / Proton Pass export above.</div>';
        return;
      }
      listEl.innerHTML = '';
      for (const it of items) {
        const row = document.createElement('div');
        row.className = 'row';
        const meta = document.createElement('div');
        meta.className = 'meta';
        const site = document.createElement('div');
        site.className = 'site';
        site.textContent = hostOf(it.origin);
        const user = document.createElement('div');
        user.className = 'user';
        user.textContent = it.username || '(no username saved)';
        meta.appendChild(site); meta.appendChild(user);
        const del = document.createElement('button');
        del.className = 'del';
        del.textContent = 'Delete';
        del.onclick = async () => { await window.vaultUI.remove(it.id); render(); };
        row.appendChild(meta); row.appendChild(del);
        listEl.appendChild(row);
      }
    }

    document.getElementById('refresh').onclick = render;
    document.getElementById('import').onclick = async () => { await window.vaultUI.importFile(); render(); };
    render();
  </script>
</body>
</html>
