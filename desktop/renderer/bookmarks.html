<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src https: http: data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>Bookmark Board</title>
  <style>
    :root{
      --bg:#0d1117;--surface:#161b22;--text:#e6edf3;--muted:#8b949e;
      --accent:#58a6ff;--border:#30363d;--danger:#f85149;--radius:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:13px;
    }
    header{
      display:flex;align-items:center;gap:10px;padding:14px 18px;
      background:var(--surface);border-bottom:1px solid var(--border);
    }
    header .title{font-weight:600;font-size:15px;}
    header .title .mark{color:var(--accent);}
    header .count{color:var(--muted);font-size:12px;}
    main{flex:1;overflow-y:auto;padding:18px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
    .card{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:14px;cursor:pointer;position:relative;transition:border-color .15s,transform .1s;
      display:flex;flex-direction:column;gap:8px;min-height:96px;
    }
    .card:hover{border-color:var(--accent);transform:translateY(-2px);}
    .card .fav{display:flex;align-items:center;gap:8px;}
    .card .fav img{width:18px;height:18px;border-radius:4px;background:#0d1117;flex:0 0 auto;}
    .card .host{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card .name{font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .card .del{
      position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:6px;border:none;
      background:transparent;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;
    }
    .card .del:hover{background:#f8514922;color:var(--danger);}
    .empty{color:var(--muted);text-align:center;margin-top:60px;line-height:1.7;}
    .empty b{color:var(--text);}
  </style>
</head>
<body>
  <header>
    <span class="title"><span class="mark">▦</span> Bookmark Board</span>
    <span class="count" id="count"></span>
  </header>
  <main>
    <div class="grid" id="grid"></div>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const countEl = document.getElementById('count');

    function hostOf(u){ try { return new URL(u).host; } catch { return u; } }
    function favOf(u){ try { return 'https://www.google.com/s2/favicons?domain=' + new URL(u).host + '&sz=32'; } catch { return ''; } }

    async function render(){
      const items = await window.bookmarksUI.list();
      countEl.textContent = items.length ? `(${items.length})` : '';
      if (!items.length){
        grid.innerHTML = '';
        const e = document.createElement('div');
        e.className = 'empty';
        e.innerHTML = '<b>No bookmarks yet.</b><br/>Click the ☆ star in the tab bar to save the page you are on.';
        grid.appendChild(e);
        return;
      }
      grid.innerHTML = '';
      for (const b of items){
        const card = document.createElement('div');
        card.className = 'card';
        card.title = b.url;
        const fav = document.createElement('div'); fav.className = 'fav';
        const img = document.createElement('img'); img.src = favOf(b.url); img.alt = '';
        const host = document.createElement('span'); host.className = 'host'; host.textContent = hostOf(b.url);
        fav.appendChild(img); fav.appendChild(host);
        const name = document.createElement('div'); name.className = 'name'; name.textContent = b.title || hostOf(b.url);
        const del = document.createElement('button'); del.className = 'del'; del.textContent = '×';
        del.onclick = async (e) => { e.stopPropagation(); await window.bookmarksUI.remove(b.id); render(); };
        card.appendChild(fav); card.appendChild(name); card.appendChild(del);
        card.onclick = () => window.bookmarksUI.open(b.url);
        grid.appendChild(card);
      }
    }
    render();
  </script>
</body>
</html>
