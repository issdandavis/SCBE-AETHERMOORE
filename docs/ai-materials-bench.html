<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Materials Bench | AetherMoore</title>
    <meta name="description" content="Visual materials bench for fiber/tube stacks with field, heat, optical, and receipt math." />
    <style>
      :root {
        color-scheme: dark;
        --bg: #07090b;
        --panel: #12171a;
        --panel2: #192024;
        --line: rgba(236, 230, 216, 0.16);
        --text: #f2eadb;
        --muted: #aeb6b2;
        --gold: #e0b65d;
        --copper: #d1844a;
        --cyan: #68d8cf;
        --blue: #84a9ff;
        --red: #ed766c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      a { color: inherit; text-decoration: none; }
      .shell { width: min(1460px, calc(100% - 28px)); margin: 0 auto; padding: 18px 0 34px; }
      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        min-height: 44px;
        border-bottom: 1px solid var(--line);
      }
      .brand { color: var(--gold); font-weight: 900; letter-spacing: .1em; text-transform: uppercase; font-size: 13px; }
      .nav { display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: 14px; }
      .grid {
        display: grid;
        grid-template-columns: minmax(320px, .78fr) minmax(440px, 1.35fr) minmax(300px, .84fr);
        gap: 14px;
        padding-top: 14px;
      }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; min-width: 0; overflow: hidden; }
      .head { min-height: 44px; padding: 11px 12px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 10px; align-items: center; }
      .title { margin: 0; color: var(--gold); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
      .body { padding: 12px; }
      h1 { margin: 0; font-size: 30px; line-height: 1.05; letter-spacing: 0; }
      p { margin: 8px 0 0; color: var(--muted); line-height: 1.45; }
      label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; font-weight: 800; }
      textarea, input {
        width: 100%;
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 8px;
        background: #090d0f;
        color: var(--text);
        padding: 10px;
        font: inherit;
      }
      textarea { min-height: 118px; resize: vertical; line-height: 1.42; }
      .nums { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 10px; }
      .actions { display: grid; grid-template-columns: 1fr 44px; gap: 10px; margin-top: 10px; }
      button {
        min-height: 44px;
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 8px;
        background: var(--panel2);
        color: var(--text);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }
      button.primary { background: var(--gold); border-color: var(--gold); color: #17110a; }
      .status { min-height: 18px; color: var(--muted); font-size: 13px; }
      canvas { display: block; width: 100%; height: 610px; background: #080b0d; }
      .stage { position: relative; min-height: 610px; }
      .hud {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }
      .metric, .card {
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 8px;
        background: rgba(8, 11, 13, .82);
        padding: 10px;
      }
      .metric strong, .card strong {
        display: block;
        margin-bottom: 4px;
        color: var(--gold);
        font-size: 12px;
        letter-spacing: .06em;
        text-transform: uppercase;
      }
      .metric span, .card span { color: var(--text); overflow-wrap: anywhere; }
      .cards { display: grid; gap: 10px; }
      .stack { display: grid; gap: 8px; margin-top: 10px; }
      .layer { border-left: 3px solid var(--cyan); background: rgba(104,216,207,.08); padding: 9px 10px; }
      .layer b { color: var(--text); }
      pre {
        max-height: 260px;
        overflow: auto;
        margin: 10px 0 0;
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 8px;
        background: #050708;
        color: #d8f7e9;
        padding: 10px;
        font-size: 12px;
      }
      @media (max-width: 1180px) {
        .grid { grid-template-columns: 1fr 1.35fr; }
        .right { grid-column: 1 / -1; }
      }
      @media (max-width: 820px) {
        .grid, .nums, .hud { grid-template-columns: 1fr; }
        canvas, .stage { height: 540px; min-height: 540px; }
        .topbar { align-items: flex-start; flex-direction: column; padding-bottom: 10px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="/">AetherMoore</a>
        <nav class="nav" aria-label="Product navigation">
          <a href="/ai-chemistry-set">Chemistry Set</a>
          <a href="/atomic-lab">Atomic Lab</a>
          <a href="/products">Products</a>
        </nav>
      </header>

      <section class="grid">
        <aside class="panel">
          <div class="head"><h2 class="title">AI Materials Bench</h2></div>
          <div class="body">
            <h1>Fiber/tube stack visualizer with real math.</h1>
            <p>Model the glass tube, carbon skin, copper winding, magnetic guide, optical lane, heat, and receipt as one buildable concept.</p>
            <form id="benchForm" style="margin-top: 14px">
              <label>
                Concept
                <textarea id="concept">Glass tube with conductive carbon sleeve, copper micro-winding, ferrite flux guide, and optical path through the core.</textarea>
              </label>
              <div class="nums">
                <label>Length mm<input id="length_mm" type="number" value="120" min="10" max="2000" /></label>
                <label>Radius mm<input id="radius_mm" type="number" value="5" min="0.5" max="100" step="0.1" /></label>
                <label>Turns<input id="turns" type="number" value="180" min="1" max="5000" /></label>
                <label>Current A<input id="current_a" type="number" value="0.35" min="0.001" max="20" step="0.01" /></label>
                <label>Wire dia mm<input id="wire_diameter_mm" type="number" value="0.2" min="0.03" max="5" step="0.01" /></label>
                <label>Frequency Hz<input id="frequency_hz" type="number" value="1000" min="0" max="5000000" /></label>
                <label>μ relative<input id="mu_relative" type="number" value="1" min="1" max="5000" /></label>
                <label>n core<input id="n_core" type="number" value="1.46" min="1" max="4" step="0.01" /></label>
              </div>
              <div class="actions">
                <button class="primary" type="submit">Model stack</button>
                <button type="button" id="copyJson" title="Copy JSON receipt">▣</button>
              </div>
              <button type="button" id="downloadReport" style="margin-top:10px;width:100%">Download concept report (.md)</button>
              <p class="status" id="status">Ready.</p>
            </form>
          </div>
        </aside>

        <section class="panel stage">
          <canvas id="viz" width="900" height="620"></canvas>
          <div class="hud">
            <div class="metric"><strong>Field</strong><span id="fieldMetric">-</span></div>
            <div class="metric"><strong>Power</strong><span id="powerMetric">-</span></div>
            <div class="metric"><strong>Skin</strong><span id="skinMetric">-</span></div>
            <div class="metric"><strong>Optics</strong><span id="opticMetric">-</span></div>
          </div>
        </section>

        <aside class="panel right">
          <div class="head"><h2 class="title">Stack + Receipt</h2></div>
          <div class="body">
            <div class="cards" id="cards"></div>
            <div class="stack" id="stack"></div>
            <pre id="jsonOut">{}</pre>
          </div>
        </aside>
      </section>
    </main>

    <script>
      var lastResult = {};
      var canvas = document.getElementById("viz");
      var ctx = canvas.getContext("2d");

      function esc(value) {
        return String(value).replace(/[&<>"']/g, function (char) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
        });
      }

      function readNumber(id) { return Number(document.getElementById(id).value); }

      function fitCanvas() {
        var rect = canvas.getBoundingClientRect();
        var ratio = window.devicePixelRatio || 1;
        canvas.width = Math.max(360, Math.floor(rect.width * ratio));
        canvas.height = Math.max(420, Math.floor(rect.height * ratio));
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        draw(lastResult);
      }

      function draw(result) {
        var rect = canvas.getBoundingClientRect();
        var w = rect.width || 900;
        var h = rect.height || 620;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#080b0d";
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "rgba(236,230,216,.08)";
        for (var x = 0; x < w; x += 54) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
        for (var y = 0; y < h; y += 54) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

        var cx = w * 0.5;
        var cy = h * 0.43;
        var tubeR = Math.min(w, h) * 0.19;
        var carbonR = tubeR * 1.16;
        var fluxR = tubeR * 1.42;

        ctx.fillStyle = "rgba(132,169,255,.12)";
        ctx.strokeStyle = "rgba(132,169,255,.72)";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(cx, cy, tubeR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "rgba(104,216,207,.08)";
        ctx.strokeStyle = "rgba(104,216,207,.9)";
        ctx.lineWidth = 8;
        ctx.beginPath(); ctx.arc(cx, cy, carbonR, 0, Math.PI * 2); ctx.stroke();

        ctx.strokeStyle = "rgba(209,132,74,.95)";
        ctx.lineWidth = 5;
        for (var i = 0; i < 20; i += 1) {
          var angle = (Math.PI * 2 * i) / 20;
          var x1 = cx + Math.cos(angle) * (carbonR + 18);
          var y1 = cy + Math.sin(angle) * (carbonR + 18);
          var x2 = cx + Math.cos(angle) * (carbonR + 46);
          var y2 = cy + Math.sin(angle) * (carbonR + 46);
          ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }

        ctx.strokeStyle = "rgba(224,182,93,.7)";
        ctx.lineWidth = 9;
        ctx.beginPath(); ctx.arc(cx, cy, fluxR, Math.PI * .12, Math.PI * .42); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, fluxR, Math.PI * .62, Math.PI * .92); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, fluxR, Math.PI * 1.12, Math.PI * 1.42); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, fluxR, Math.PI * 1.62, Math.PI * 1.92); ctx.stroke();

        ctx.strokeStyle = "rgba(104,216,207,.38)";
        ctx.lineWidth = 2;
        for (var f = 0; f < 7; f += 1) {
          var r = tubeR * .45 + f * 19;
          ctx.beginPath(); ctx.ellipse(cx, cy, r * 1.8, r * .45, 0, 0, Math.PI * 2); ctx.stroke();
        }

        ctx.strokeStyle = "rgba(132,169,255,.95)";
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(cx - tubeR * .95, cy); ctx.lineTo(cx + tubeR * .95, cy); ctx.stroke();
        ctx.fillStyle = "#84a9ff";
        ctx.beginPath(); ctx.arc(cx + tubeR * .95, cy, 6, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = "#f2eadb";
        ctx.font = "800 18px ui-sans-serif";
        ctx.fillText("magneto-optic composite tube sleeve", 24, 36);
        ctx.font = "700 13px ui-sans-serif";
        ctx.fillStyle = "#68d8cf";
        ctx.fillText("carbon skin", cx + carbonR + 20, cy - 32);
        ctx.fillStyle = "#d1844a";
        ctx.fillText("copper winding", cx + carbonR + 20, cy + 4);
        ctx.fillStyle = "#e0b65d";
        ctx.fillText("ferrite / iron flux guide", cx + carbonR + 20, cy + 40);
        ctx.fillStyle = "#84a9ff";
        ctx.fillText("optical lane", cx - tubeR, cy - 14);

        if (result && result.risk_flags) {
          ctx.fillStyle = "rgba(8,11,13,.78)";
          ctx.strokeStyle = "rgba(236,230,216,.18)";
          ctx.fillRect(24, h - 152, w - 48, 78);
          ctx.strokeRect(24, h - 152, w - 48, 78);
          ctx.fillStyle = "#e0b65d";
          ctx.font = "900 13px ui-sans-serif";
          ctx.fillText("MODEL RECEIPT", 44, h - 122);
          ctx.fillStyle = "#f2eadb";
          ctx.font = "700 14px ui-sans-serif";
          ctx.fillText(result.risk_flags[0].slice(0, 115), 44, h - 92);
        }
      }

      function render(data) {
        lastResult = data;
        document.getElementById("jsonOut").textContent = JSON.stringify(data, null, 2);
        document.getElementById("fieldMetric").textContent = data.math.estimates.solenoid_field_mt + " mT";
        document.getElementById("powerMetric").textContent = data.math.estimates.coil_power_w + " W";
        document.getElementById("skinMetric").textContent = data.math.estimates.skin_depth_mm + " mm";
        document.getElementById("opticMetric").textContent = "NA " + data.math.estimates.optical_na_estimate;
        var bom = data.bill_of_materials || { estimated_total_low: "-", estimated_total_high: "-", items: [] };
        var safety = data.safety || {};
        document.getElementById("cards").innerHTML = [
          '<div class="card"><strong>Receipt</strong><span>' + esc(data.receipt_id) + '</span></div>',
          '<div class="card"><strong>Est. build cost</strong><span>$' + esc(bom.estimated_total_low) + ' – $' + esc(bom.estimated_total_high) + ' (' + bom.items.length + ' parts)</span></div>',
          '<div class="card"><strong>Safety</strong><span>~' + esc(safety.coil_voltage_v) + ' V · max ~' + esc(safety.max_continuous_current_a) + ' A continuous</span></div>',
          '<div class="card"><strong>Risk flag</strong><span>' + esc(data.risk_flags.join(" ")) + '</span></div>',
          '<div class="card"><strong>Offer</strong><span>' + esc(data.sellable_output.offer) + '</span></div>'
        ].join("");
        document.getElementById("stack").innerHTML = data.architecture.stack.map(function (layer) {
          return '<div class="layer"><b>' + esc(layer.layer) + ':</b> ' + esc(layer.material) + '<br><span>' + esc(layer.role) + '</span></div>';
        }).join("");
        draw(data);
      }

      document.getElementById("benchForm").addEventListener("submit", async function (event) {
        event.preventDefault();
        var status = document.getElementById("status");
        status.textContent = "Modeling...";
        try {
          var response = await fetch("/api/agent/ai-materials-bench", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              concept: document.getElementById("concept").value,
              length_mm: readNumber("length_mm"),
              radius_mm: readNumber("radius_mm"),
              turns: readNumber("turns"),
              current_a: readNumber("current_a"),
              wire_diameter_mm: readNumber("wire_diameter_mm"),
              frequency_hz: readNumber("frequency_hz"),
              mu_relative: readNumber("mu_relative"),
              n_core: readNumber("n_core"),
              n_clad: 1.44
            })
          });
          var data = await response.json();
          if (!response.ok) throw new Error(data.error || "Request failed");
          render(data);
          status.textContent = "Model ready.";
        } catch (error) {
          status.textContent = error.message || String(error);
        }
      });

      document.getElementById("copyJson").addEventListener("click", async function () {
        await navigator.clipboard.writeText(JSON.stringify(lastResult, null, 2));
        document.getElementById("status").textContent = "Receipt copied.";
      });

      document.getElementById("downloadReport").addEventListener("click", function () {
        if (!lastResult.report_markdown) {
          document.getElementById("status").textContent = "Model the stack first, then download.";
          return;
        }
        var blob = new Blob([lastResult.report_markdown], { type: "text/markdown;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = (lastResult.receipt_id || "matbench") + ".md";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        document.getElementById("status").textContent = "Concept report downloaded.";
      });

      window.addEventListener("resize", fitCanvas);
      fitCanvas();
      document.getElementById("benchForm").dispatchEvent(new Event("submit"));
    </script>
  </body>
</html>
