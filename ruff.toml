# Ruff configuration — catches the same issues as CodeQL but 100x faster
# Runs in ~200ms on the entire codebase vs minutes for CodeQL

target-version = "py311"
line-length = 120

# Only check src/, tests/, scripts/ — skip external, node_modules, etc.
include = ["src/**/*.py", "tests/**/*.py", "scripts/**/*.py", "agents/**/*.py"]
exclude = [
    "external/",
    "node_modules/",
    "dist/",
    "**/node_modules/",
    "**/__pycache__/",
    ".git/",
    "artifacts/",
    "training-data/",
    "kindle-app/",
    "shopify/",
    "src/word-addin/",
]

[lint]
# Rules that match our top CodeQL alert categories:
# F401 = unused import (27 CodeQL alerts)
# F811 = redefined unused variable
# F841 = unused local variable (12 CodeQL alerts)
# E711 = comparison to None
# E712 = comparison to True/False
# B = bugbear (catches bare except, mutable defaults, etc.)
# SIM115 = open-file-with-context-handler (7 CodeQL alerts)
# UP = pyupgrade (modernize syntax)
select = [
    "F401",   # unused-import
    "F811",   # redefined-unused
    "F841",   # unused-variable
    "E711",   # none-comparison
    "E712",   # bool-comparison
    "B002",   # unary-prefix-increment (likely typo)
    "B006",   # mutable-argument-default
    "B007",   # unused-loop-control-variable
    "B009",   # get-attr-with-constant
    "B010",   # set-attr-with-constant
    "B017",   # assert-raises-exception (too broad)
    "B025",   # duplicate-except
    "B029",   # except-with-empty-tuple
    "B033",   # duplicate-value
    "SIM115", # open-file-with-context-handler
]

# Don't auto-fix these — review first
unfixable = [
    "F841",   # might be intentional (test fixtures, side effects)
]

[lint.per-file-ignores]
# Tests often have unused variables from fixtures, broad exception asserts are intentional
"tests/**/*.py" = ["F841", "B017", "SIM115"]
# Scripts may import for side effects, have unused vars from prototyping
"scripts/**/*.py" = ["F401", "F841", "SIM115"]
# Agents directory mirrors scripts patterns
"agents/**/*.py" = ["F401"]
