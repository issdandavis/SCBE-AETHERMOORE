<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Dye Injection — SCBE Pathway Visualizer</title>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a2e;
      --bg-hover: #222240;
      --text-primary: #e0e0e8;
      --text-secondary: #8888aa;
      --text-muted: #555570;
      --border: #2a2a44;
      --accent: #6c63ff;
      --accent-dim: #4a42cc;
      /* Tongue colors */
      --ko: #FF6B6B;
      --av: #4ECDC4;
      --ru: #45B7D1;
      --ca: #96CEB4;
      --um: #FFEAA7;
      --dr: #DDA0DD;
      /* Decision colors */
      --allow: #4CAF50;
      --deny: #f44336;
      --quarantine: #FF9800;
      --reroute: #9C27B0;
      --review: #E91E63;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    header h1 span { color: var(--accent); }

    .controls {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .controls button, .controls label {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .controls button:hover, .controls label:hover {
      background: var(--bg-hover);
      border-color: var(--accent-dim);
    }

    .controls input[type="file"] { display: none; }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 1.5rem;
      padding: 1.5rem 2rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
    }

    /* Radar chart container */
    .radar-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
    }

    .radar-container canvas {
      max-width: 100%;
      max-height: 400px;
    }

    /* Scan summary */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0.8rem;
      background: var(--bg-secondary);
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .summary-item .label { color: var(--text-secondary); }
    .summary-item .value { font-weight: 600; font-family: 'Cascadia Code', monospace; }

    .decision-badge {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    .decision-ALLOW { background: var(--allow); color: #000; }
    .decision-DENY { background: var(--deny); color: #fff; }
    .decision-QUARANTINE { background: var(--quarantine); color: #000; }
    .decision-REROUTE { background: var(--reroute); color: #fff; }
    .decision-REVIEW { background: var(--review); color: #fff; }

    /* Layer trace */
    .layer-trace { grid-column: 1 / -1; }

    .layer-bars {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .layer-row {
      display: grid;
      grid-template-columns: 2.5rem 200px 1fr 60px;
      gap: 0.5rem;
      align-items: center;
      font-size: 0.8rem;
    }

    .layer-num {
      color: var(--text-muted);
      text-align: right;
      font-family: monospace;
    }

    .layer-name {
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tongue-bar-group {
      display: flex;
      height: 22px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--bg-secondary);
    }

    .tongue-bar-segment {
      height: 100%;
      transition: width 0.6s ease-out;
      position: relative;
    }

    .tongue-bar-segment:hover {
      filter: brightness(1.3);
    }

    .tongue-bar-segment:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-primary);
      border: 1px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    .layer-energy {
      color: var(--text-muted);
      text-align: right;
      font-family: monospace;
      font-size: 0.75rem;
    }

    /* Signals */
    .signals-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .signal-tag {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-family: monospace;
      color: var(--text-secondary);
    }

    .signal-tag.warn {
      border-color: var(--quarantine);
      color: var(--quarantine);
    }

    .signal-tag.deny {
      border-color: var(--deny);
      color: var(--deny);
    }

    /* Tongue legend */
    .tongue-legend {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.8rem;
      flex-wrap: wrap;
    }

    .tongue-legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .tongue-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* Input text display */
    .input-text {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.8rem;
      font-family: 'Cascadia Code', monospace;
      font-size: 0.8rem;
      color: var(--text-secondary);
      max-height: 80px;
      overflow-y: auto;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    /* Comparison mode */
    .comparison-container {
      grid-column: 1 / -1;
    }

    .scan-tabs {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .scan-tab {
      padding: 0.4rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .scan-tab.active {
      background: var(--bg-card);
      border-bottom-color: var(--bg-card);
      color: var(--accent);
      font-weight: 600;
    }

    .scan-tab:hover:not(.active) {
      background: var(--bg-hover);
    }

    /* Null space warning */
    .null-space-warning {
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.3);
      border-radius: 6px;
      padding: 0.5rem 0.8rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--deny);
    }

    /* Spin vector display */
    .spin-display {
      display: flex;
      gap: 0.3rem;
      justify-content: center;
      margin: 0.5rem 0;
    }

    .spin-cell {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-weight: 700;
      font-family: monospace;
      font-size: 0.9rem;
    }

    .spin-up { background: rgba(76, 175, 80, 0.2); color: var(--allow); }
    .spin-down { background: rgba(244, 67, 54, 0.2); color: var(--deny); }
    .spin-zero { background: rgba(136, 136, 170, 0.1); color: var(--text-muted); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }

    .empty-state h2 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    .empty-state p { font-size: 0.9rem; }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .layer-row { grid-template-columns: 2rem 120px 1fr 40px; }
    }
  </style>
</head>
<body>

<header>
  <h1><span>Neural Dye Injection</span> — SCBE Pathway Visualizer</h1>
  <div class="controls">
    <label for="file-input">Load Scan JSON</label>
    <input type="file" id="file-input" accept=".json" multiple>
    <button id="btn-demo">Load Demo</button>
    <button id="btn-clear">Clear</button>
  </div>
</header>

<div class="main-grid" id="main-grid">
  <div class="empty-state" id="empty-state">
    <h2>No scan loaded</h2>
    <p>Load a dye scan JSON file or click "Load Demo" to see a sample visualization.</p>
    <p style="margin-top:0.5rem; font-size:0.8rem;">
      Generate scans with: <code style="color:var(--accent);">python src/video/dye_injection.py --test-suite --output artifacts/dye_scans/</code>
    </p>
  </div>
</div>

<script>
const TONGUES = ['KO', 'AV', 'RU', 'CA', 'UM', 'DR'];
const TONGUE_COLORS = {
  KO: '#FF6B6B', AV: '#4ECDC4', RU: '#45B7D1',
  CA: '#96CEB4', UM: '#FFEAA7', DR: '#DDA0DD'
};
const TONGUE_LABELS = {
  KO: 'Intent', AV: 'Transport', RU: 'Policy',
  CA: 'Compute', UM: 'Redaction', DR: 'Integrity'
};

let loadedScans = [];
let activeScanIdx = 0;

// --- Canvas radar chart ---
function drawRadar(canvas, heatmap, spinVector, animate = true) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width = 400;
  const H = canvas.height = 400;
  const cx = W / 2, cy = H / 2;
  const R = 160;

  ctx.clearRect(0, 0, W, H);

  const angles = TONGUES.map((_, i) => (Math.PI * 2 * i / 6) - Math.PI / 2);

  // Draw concentric hexagonal grid
  for (let ring = 1; ring <= 5; ring++) {
    const r = R * ring / 5;
    ctx.beginPath();
    for (let i = 0; i <= 6; i++) {
      const a = angles[i % 6];
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(42, 42, 68, ${0.3 + ring * 0.1})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw axis lines + labels
  for (let i = 0; i < 6; i++) {
    const a = angles[i];
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
    ctx.strokeStyle = 'rgba(42, 42, 68, 0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    const lx = cx + (R + 24) * Math.cos(a);
    const ly = cy + (R + 24) * Math.sin(a);
    ctx.fillStyle = TONGUE_COLORS[TONGUES[i]];
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(TONGUES[i], lx, ly);

    // Sub-label
    const slx = cx + (R + 38) * Math.cos(a);
    const sly = cy + (R + 38) * Math.sin(a);
    ctx.fillStyle = '#555570';
    ctx.font = '9px sans-serif';
    ctx.fillText(TONGUE_LABELS[TONGUES[i]], slx, sly);
  }

  // Animated fill
  const values = TONGUES.map(t => heatmap[t] || 0);
  const maxVal = Math.max(...values, 0.01);

  function drawFrame(progress) {
    // Clear data area only
    ctx.save();
    ctx.beginPath();
    for (let i = 0; i <= 6; i++) {
      const a = angles[i % 6];
      const x = cx + (R + 5) * Math.cos(a);
      const y = cy + (R + 5) * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.clip();

    // Filled polygon
    ctx.beginPath();
    for (let i = 0; i <= 6; i++) {
      const idx = i % 6;
      const a = angles[idx];
      const v = (values[idx] / Math.max(maxVal, 0.3)) * R * progress;
      const x = cx + v * Math.cos(a);
      const y = cy + v * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.fillStyle = 'rgba(108, 99, 255, 0.12)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(108, 99, 255, 0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Per-tongue filled wedges
    for (let i = 0; i < 6; i++) {
      const a1 = angles[i];
      const a2 = angles[(i + 1) % 6];
      const v1 = (values[i] / Math.max(maxVal, 0.3)) * R * progress;
      const v2 = (values[(i + 1) % 6] / Math.max(maxVal, 0.3)) * R * progress;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + v1 * Math.cos(a1), cy + v1 * Math.sin(a1));
      ctx.lineTo(cx + v2 * Math.cos(a2), cy + v2 * Math.sin(a2));
      ctx.closePath();

      const color = TONGUE_COLORS[TONGUES[i]];
      ctx.fillStyle = color + '30'; // 30 = ~19% alpha
      ctx.fill();
    }

    // Dots at vertices
    for (let i = 0; i < 6; i++) {
      const a = angles[i];
      const v = (values[i] / Math.max(maxVal, 0.3)) * R * progress;
      const x = cx + v * Math.cos(a);
      const y = cy + v * Math.sin(a);

      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = TONGUE_COLORS[TONGUES[i]];
      ctx.fill();

      // Glow
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fillStyle = TONGUE_COLORS[TONGUES[i]] + '40';
      ctx.fill();

      // Value label
      ctx.fillStyle = '#e0e0e8';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      const lbl_r = v + 14;
      ctx.fillText(values[i].toFixed(3), cx + lbl_r * Math.cos(a), cy + lbl_r * Math.sin(a));
    }

    ctx.restore();
  }

  if (animate) {
    let start = null;
    function step(ts) {
      if (!start) start = ts;
      const elapsed = ts - start;
      const progress = Math.min(1, elapsed / 800);
      // Redraw from scratch
      ctx.clearRect(0, 0, W, H);
      // Re-draw grid
      for (let ring = 1; ring <= 5; ring++) {
        const r = R * ring / 5;
        ctx.beginPath();
        for (let j = 0; j <= 6; j++) {
          const a = angles[j % 6];
          const x = cx + r * Math.cos(a); const y = cy + r * Math.sin(a);
          if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `rgba(42, 42, 68, ${0.3 + ring * 0.1})`;
        ctx.lineWidth = 1; ctx.stroke();
      }
      for (let j = 0; j < 6; j++) {
        const a = angles[j];
        ctx.beginPath(); ctx.moveTo(cx, cy);
        ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
        ctx.strokeStyle = 'rgba(42, 42, 68, 0.5)'; ctx.lineWidth = 1; ctx.stroke();
        const lx = cx + (R + 24) * Math.cos(a); const ly = cy + (R + 24) * Math.sin(a);
        ctx.fillStyle = TONGUE_COLORS[TONGUES[j]]; ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(TONGUES[j], lx, ly);
        const slx = cx + (R + 38) * Math.cos(a); const sly = cy + (R + 38) * Math.sin(a);
        ctx.fillStyle = '#555570'; ctx.font = '9px sans-serif'; ctx.fillText(TONGUE_LABELS[TONGUES[j]], slx, sly);
      }
      drawFrame(easeOutCubic(progress));
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  } else {
    drawFrame(1);
  }
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// --- Render scan ---
function renderScan(scan, index) {
  const s = scan.scan || scan;
  const grid = document.getElementById('main-grid');

  // If multiple scans, show tabs
  if (loadedScans.length > 1 && index === 0) {
    const tabContainer = document.createElement('div');
    tabContainer.className = 'comparison-container';
    tabContainer.innerHTML = '<div class="scan-tabs" id="scan-tabs"></div>';
    grid.appendChild(tabContainer);

    const tabs = tabContainer.querySelector('#scan-tabs');
    loadedScans.forEach((sc, i) => {
      const tab = document.createElement('div');
      tab.className = 'scan-tab' + (i === 0 ? ' active' : '');
      const label = sc.scan_id ? sc.scan_id.slice(0, 8) : `Scan ${i + 1}`;
      const decision = (sc.scan || sc).governance_decision || '?';
      tab.textContent = `${label} [${decision}]`;
      tab.onclick = () => switchScan(i);
      tabs.appendChild(tab);
    });
  }

  // Wrapper
  const wrapper = document.createElement('div');
  wrapper.className = 'scan-view';
  wrapper.id = `scan-view-${index}`;
  wrapper.style.display = index === 0 ? 'contents' : 'none';
  grid.appendChild(wrapper);

  // Input text
  const inputCard = document.createElement('div');
  inputCard.className = 'card';
  inputCard.style.gridColumn = '1 / -1';
  inputCard.innerHTML = `<h2>Input Signal</h2><div class="input-text">${escHtml(scan.input || '')}</div>`;
  wrapper.appendChild(inputCard);

  // Radar
  const radarCard = document.createElement('div');
  radarCard.className = 'card';
  const radarH2 = document.createElement('h2');
  radarH2.textContent = '6D Tongue Pathway Heatmap';
  radarCard.appendChild(radarH2);
  const radarContainer = document.createElement('div');
  radarContainer.className = 'radar-container';
  const radarCanvas = document.createElement('canvas');
  radarCanvas.id = 'radar-' + index;
  radarContainer.appendChild(radarCanvas);
  radarCard.appendChild(radarContainer);
  const legendDiv = document.createElement('div');
  legendDiv.className = 'tongue-legend';
  TONGUES.forEach(t => {
    const item = document.createElement('div');
    item.className = 'tongue-legend-item';
    const dot = document.createElement('div');
    dot.className = 'tongue-dot';
    dot.style.background = TONGUE_COLORS[t];
    item.appendChild(dot);
    item.appendChild(document.createTextNode(t + ' (' + TONGUE_LABELS[t] + ')'));
    legendDiv.appendChild(item);
  });
  radarCard.appendChild(legendDiv);
  wrapper.appendChild(radarCard);

  // Summary
  const summaryCard = document.createElement('div');
  summaryCard.className = 'card';
  const rawDecision = String(s.governance_decision || 'ALLOW');
  const decClass = ['ALLOW', 'DENY', 'ESCALATE', 'QUARANTINE'].includes(rawDecision)
    ? `decision-${rawDecision}`
    : 'decision-ALLOW';
  const safeDecision = escHtml(rawDecision);
  const safeTrustLevel = escHtml(String(s.trust_level || '?'));
  const safeSpinMagnitude = escHtml(String(s.spin_magnitude ?? '?'));
  const safeFibIndex = escHtml(String(s.fibonacci_index ?? '?'));
  const hottestTongue = TONGUES.includes(s.hottest_tongue) ? s.hottest_tongue : '';
  const coldestTongue = TONGUES.includes(s.coldest_tongue) ? s.coldest_tongue : '';
  const hottestColor = TONGUE_COLORS[hottestTongue] || '#ffffff';
  const coldestColor = TONGUE_COLORS[coldestTongue] || '#ffffff';
  const safeHottestTongue = escHtml(String(s.hottest_tongue || '?'));
  const safeColdestTongue = escHtml(String(s.coldest_tongue || '?'));
  const safeScanId = escHtml(String((scan.scan_id || '?').slice(0, 12)));
  summaryCard.innerHTML = `
    <h2>Scan Summary</h2>
    <div class="summary-grid">
      <div class="summary-item"><span class="label">Decision</span><span class="value"><span class="decision-badge ${decClass}">${safeDecision}</span></span></div>
      <div class="summary-item"><span class="label">Trust Level</span><span class="value">${safeTrustLevel}</span></div>
      <div class="summary-item"><span class="label">Harmonic Cost</span><span class="value">${(s.harmonic_cost || 0).toFixed(2)}</span></div>
      <div class="summary-item"><span class="label">Spin Magnitude</span><span class="value">${safeSpinMagnitude}</span></div>
      <div class="summary-item"><span class="label">Fibonacci Index</span><span class="value">${safeFibIndex}</span></div>
      <div class="summary-item"><span class="label">Hottest Tongue</span><span class="value" style="color:${hottestColor}">${safeHottestTongue}</span></div>
      <div class="summary-item"><span class="label">Coldest Tongue</span><span class="value" style="color:${coldestColor}">${safeColdestTongue}</span></div>
      <div class="summary-item"><span class="label">Null Space</span><span class="value">${s.null_space_detected ? 'DETECTED' : 'None'}</span></div>
      <div class="summary-item"><span class="label">Scan ID</span><span class="value">${safeScanId}</span></div>
      <div class="summary-item"><span class="label">Duration</span><span class="value">${(scan.scan_duration_ms || 0).toFixed(1)} ms</span></div>
    </div>
    ${s.null_space_detected ? '<div class="null-space-warning">Null space detected: one or more tongue dimensions show near-zero activation. Signal may be evading detection through dimensional collapse.</div>' : ''}
    <h2 style="margin-top:1rem;">Spin Vector</h2>
    <div class="spin-display">
      ${(s.spin_vector || []).map((v, i) =>
        `<div class="spin-cell ${v > 0 ? 'spin-up' : v < 0 ? 'spin-down' : 'spin-zero'}" title="${TONGUES[i]}: ${v > 0 ? '+1' : v < 0 ? '-1' : '0'}">
          <div style="font-size:0.6rem;color:${TONGUE_COLORS[TONGUES[i]]};margin-bottom:2px;">${TONGUES[i]}</div>
        </div>`
      ).join('')}
    </div>
    <div class="spin-display">
      ${(s.spin_vector || []).map((v, i) =>
        `<div class="spin-cell ${v > 0 ? 'spin-up' : v < 0 ? 'spin-down' : 'spin-zero'}">
          ${v > 0 ? '+1' : v < 0 ? '-1' : '0'}
        </div>`
      ).join('')}
    </div>
    ${(scan.signals || []).length > 0 ? `
    <h2 style="margin-top:1rem;">Signals</h2>
    <div class="signals-list">
      ${(scan.signals || []).map(sig => {
        let cls = 'signal-tag';
        if (sig.includes('deny') || sig.includes('FAIL')) cls += ' deny';
        else if (sig.includes('quarantine') || sig.includes('elevated')) cls += ' warn';
        return `<span class="${cls}">${escHtml(sig)}</span>`;
      }).join('')}
    </div>` : ''}
  `;
  wrapper.appendChild(summaryCard);

  // Layer trace
  if (scan.layer_trace && scan.layer_trace.length > 0) {
    const traceCard = document.createElement('div');
    traceCard.className = 'card layer-trace';
    let barsHtml = '';
    scan.layer_trace.forEach(layer => {
      const acts = layer.tongue_activations || {};
      const total = Object.values(acts).reduce((a, b) => a + b, 0) || 0.01;
      const segments = TONGUES.map(t => {
        const v = acts[t] || 0;
        const pct = (v / total) * 100;
        return `<div class="tongue-bar-segment" style="width:${pct}%;background:${TONGUE_COLORS[t]}" data-tooltip="${escAttr(t)}: ${v.toFixed(4)}"></div>`;
      }).join('');
      barsHtml += `
        <div class="layer-row">
          <div class="layer-num">L${layer.layer}</div>
          <div class="layer-name" title="${escAttr(layer.name)} [${escAttr(layer.axiom)}]">${escHtml(layer.name)}</div>
          <div class="tongue-bar-group">${segments}</div>
          <div class="layer-energy">${layer.layer_energy.toFixed(2)}</div>
        </div>`;
    });
    traceCard.innerHTML = `<h2>14-Layer Pipeline Trace</h2><div class="layer-bars">${barsHtml}</div>`;
    wrapper.appendChild(traceCard);
  }

  // Draw radar after DOM insertion
  requestAnimationFrame(() => {
    const canvas = document.getElementById(`radar-${index}`);
    if (canvas && s.pathway_heatmap) {
      drawRadar(canvas, s.pathway_heatmap, s.spin_vector || [], true);
    }
  });
}

function switchScan(idx) {
  activeScanIdx = idx;
  document.querySelectorAll('.scan-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.scan-view').forEach((v, i) => {
    v.style.display = i === idx ? 'contents' : 'none';
  });
}

function clearAll() {
  loadedScans = [];
  activeScanIdx = 0;
  const grid = document.getElementById('main-grid');
  grid.innerHTML = `
    <div class="empty-state" id="empty-state">
      <h2>No scan loaded</h2>
      <p>Load a dye scan JSON file or click "Load Demo" to see a sample visualization.</p>
    </div>`;
}

function loadScans(scans) {
  loadedScans = scans;
  activeScanIdx = 0;
  const grid = document.getElementById('main-grid');
  grid.replaceChildren();
  document.getElementById('empty-state')?.remove();
  scans.forEach((scan, i) => renderScan(scan, i));
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escAttr(str) {
  return escHtml(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// --- File input ---
document.getElementById('file-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  const scans = [];
  for (const file of files) {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      // Handle both single scan and array
      if (Array.isArray(data)) scans.push(...data);
      else scans.push(data);
    } catch (err) {
      console.error(`Failed to parse ${file.name}:`, err);
    }
  }
  if (scans.length > 0) loadScans(scans);
});
