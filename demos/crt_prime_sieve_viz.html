<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRT Prime Sieve — Orthogonal Nodal System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #020311;
  color: #7090c0;
  font-family: 'Space Mono', 'Courier New', monospace;
  height: 100svh;
  display: grid;
  grid-template-rows: 50px 1fr 58px;
  overflow: hidden;
  user-select: none;
}

/* ── Header ─── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid rgba(40,70,180,0.22);
  background: rgba(4,5,20,0.9);
}
h1 {
  font-family: 'Cinzel', Georgia, serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.22em;
  color: #c0d8f4;
  text-shadow: 0 0 28px rgba(70,130,255,0.28);
}
.hsub {
  font-size: 8px;
  color: #2a3860;
  letter-spacing: 0.22em;
  margin-top: 3px;
}
.htip {
  font-size: 7px;
  color: #253050;
  letter-spacing: 0.18em;
  text-align: right;
  line-height: 1.7;
}

/* ── Canvas wrap ─── */
#wrap {
  position: relative;
  overflow: hidden;
}
#cv {
  display: block;
  width: 100%;
  height: 100%;
  cursor: grab;
}
#cv:active { cursor: grabbing; }
/* scanline overlay */
#wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 50%, transparent 48%, rgba(2,3,17,0.55) 100%),
    repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,15,0.035) 3px,
      rgba(0,0,15,0.035) 4px
    );
  pointer-events: none;
}

/* ── Controls ─── */
footer {
  display: flex;
  align-items: center;
  gap: 22px;
  padding: 0 20px;
  border-top: 1px solid rgba(40,70,180,0.22);
  flex-wrap: wrap;
  background: rgba(4,5,20,0.9);
}
.grp {
  display: flex;
  align-items: center;
  gap: 8px;
}
.lbl {
  font-size: 8px;
  letter-spacing: 0.2em;
  color: #243055;
  white-space: nowrap;
}
.wbtn {
  background: none;
  border: 1px solid rgba(255,115,38,0.2);
  color: rgba(255,138,64,0.5);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 4px 9px;
  cursor: pointer;
  letter-spacing: 0.09em;
  transition: all 0.22s;
}
.wbtn:hover {
  border-color: rgba(255,115,38,0.45);
  color: rgba(255,138,64,0.88);
}
.wbtn.on {
  background: rgba(255,100,30,0.1);
  border-color: rgba(255,100,30,0.62);
  color: rgb(255,132,56);
  box-shadow: 0 0 9px rgba(255,100,30,0.2), inset 0 0 8px rgba(255,100,30,0.05);
}
input[type=range] {
  width: 148px;
  height: 2px;
  -webkit-appearance: none;
  background: rgba(255,215,0,0.18);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: rgb(255,215,0);
  box-shadow: 0 0 7px rgba(255,215,0,0.65);
  cursor: pointer;
}
.nv {
  font-size: 17px;
  font-weight: 700;
  color: rgb(255,215,0);
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
  min-width: 22px;
  text-align: center;
  line-height: 1;
}
.leg {
  display: flex;
  gap: 14px;
  margin-left: auto;
}
.li {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 8px;
  letter-spacing: 0.12em;
  color: #253050;
}
.ld { width: 7px; height: 7px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div>
    <h1>ORTHOGONAL PRIME SIEVE</h1>
    <div class="hsub">CHINESE REMAINDER THEOREM &nbsp;·&nbsp; ℤ/2ℤ × ℤ/3ℤ × ℤ/5ℤ &nbsp;·&nbsp; 30 NODES</div>
  </div>
  <div class="htip">DRAG TO ROTATE<br>CLICK NODE TO SPOTLIGHT</div>
</header>

<div id="wrap"><canvas id="cv"></canvas></div>

<footer>
  <div class="grp">
    <span class="lbl">SLICE ZERO-WALLS —</span>
    <button class="wbtn" id="bx" onclick="tw('x')">X=0 &nbsp;÷2</button>
    <button class="wbtn" id="by" onclick="tw('y')">Y=0 &nbsp;÷3</button>
    <button class="wbtn" id="bz" onclick="tw('z')">Z=0 &nbsp;÷5</button>
  </div>
  <div class="grp">
    <span class="lbl">SPOTLIGHT n=</span>
    <input type="range" id="sl" min="0" max="29" value="7" oninput="us(+this.value)">
    <span class="nv" id="nv">7</span>
  </div>
  <div class="leg">
    <div class="li"><div class="ld" style="background:rgb(0,232,255);box-shadow:0 0 5px rgb(0,232,255)"></div>PRIME CAND.</div>
    <div class="li"><div class="ld" style="background:rgb(255,115,38);box-shadow:0 0 5px rgb(255,115,38)"></div>ZERO-WALL</div>
    <div class="li"><div class="ld" style="background:rgb(255,215,0);box-shadow:0 0 5px rgb(255,215,0)"></div>SPOTLIGHT</div>
  </div>
</footer>

<script>
'use strict';

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ─── State ───────────────────────────────────────────────────
let rX = -0.28, rY = 0.68;
let drag = false, lmx = 0, lmy = 0, csx = 0, csy = 0;
let spot = 7;
let W = { x:false, y:false, z:false };
let autoRot = true;
let W2 = 0, H2 = 0;
let revealT = 0;
let pulse = 0; // for spotlight ring animation

// ─── CRT Node Table ─────────────────────────────────────────
// Bijection: (a,b,c) ∈ {0,1}×{0,1,2}×{0,1,2,3,4}  →  ℤ/30ℤ
// n ≡ 15a + 10b + 6c  (mod 30)
const ND = [];
for (let a = 0; a < 2; a++)
  for (let b = 0; b < 3; b++)
    for (let c = 0; c < 5; c++) {
      const n = (15*a + 10*b + 6*c) % 30;
      ND.push({ a, b, c, n,
        a0: a===0, b0: b===0, c0: c===0,
        pc: a!==0 && b!==0 && c!==0  // prime candidate (coprime to 30)
      });
    }

// Precompute adjacency for connection lines
const EDGES = [];
ND.forEach((n1, i) => {
  ND.forEach((n2, j) => {
    if (j <= i) return;
    const da = Math.abs(n1.a-n2.a), db = Math.abs(n1.b-n2.b), dc = Math.abs(n1.c-n2.c);
    if (da+db+dc === 1) EDGES.push([i, j]);
  });
});

// ─── Spacing ─────────────────────────────────────────────────
const SX = 188, SY = 150, SZ = 100;

function g2w(a, b, c) {
  return [
    a*SX - SX*0.5,
    -(b*SY - SY),      // flip Y: b=0 is top
    c*SZ - SZ*2        // center Z
  ];
}

// ─── 3D Transform + Projection ───────────────────────────────
function rot3([x,y,z]) {
  const cy=Math.cos(rY), sy=Math.sin(rY);
  const cx=Math.cos(rX), sx=Math.sin(rX);
  const x1 = x*cy + z*sy;
  const z1 = -x*sy + z*cy;
  const y2 = y*cx - z1*sx;
  const z2 = y*sx + z1*cx;
  return [x1, y2, z2];
}

function prj([x,y,z]) {
  const f=740, d=270;
  const s = f/(f+z+d);
  return [W2+x*s, H2+y*s, s];
}

function np(a, b, c) { return prj(rot3(g2w(a,b,c))); }

// ─── Stars ───────────────────────────────────────────────────
const ST = Array.from({length:220}, () => [
  Math.random(), Math.random(),
  0.35 + Math.random()*0.95,
  0.08 + Math.random()*0.3
]);

// ─── Render Loop ─────────────────────────────────────────────
let t = 0;

function frame() {
  t++;
  pulse = (Math.sin(t*0.07) * 0.5 + 0.5);  // 0..1 oscillator

  if (autoRot) rY += 0.0035;

  const cw = cv.width, ch = cv.height;

  // ── Background ──
  ctx.fillStyle = '#020311';
  ctx.fillRect(0, 0, cw, ch);

  // Stars
  ST.forEach(([fx,fy,r,a]) => {
    ctx.beginPath();
    ctx.arc(fx*cw, fy*ch, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(180,210,255,${a})`;
    ctx.fill();
  });

  // ── Grid box + connections ──
  drawGrid(cw, ch);

  // ── Wall planes (draw before nodes) ──
  drawWalls();

  // ── Nodes (depth sorted) ──
  drawNodes();

  // ── HUD ──
  drawHUD(cw, ch);

  requestAnimationFrame(frame);
}

// ─── Grid ────────────────────────────────────────────────────
const BOX_C = [[0,0,0],[1,0,0],[0,2,0],[1,2,0],[0,0,4],[1,0,4],[0,2,4],[1,2,4]];
const BOX_E = [[0,1],[0,2],[1,3],[2,3],[4,5],[4,6],[5,7],[6,7],[0,4],[1,5],[2,6],[3,7]];

function drawGrid(cw, ch) {
  // Connection lines between adjacent nodes
  ctx.save();
  ctx.lineWidth = 0.35;
  EDGES.forEach(([i,j]) => {
    const ni=ND[i], nj=ND[j];
    const pi=np(ni.a,ni.b,ni.c), pj=np(nj.a,nj.b,nj.c);
    const hiA=(W.x&&ni.a0)||(W.y&&ni.b0)||(W.z&&ni.c0);
    const hiB=(W.x&&nj.a0)||(W.y&&nj.b0)||(W.z&&nj.c0);
    const a = (hiA||hiB) ? 0.04 : 0.13;
    ctx.strokeStyle = `rgba(50,80,210,${a})`;
    ctx.beginPath(); ctx.moveTo(pi[0],pi[1]); ctx.lineTo(pj[0],pj[1]); ctx.stroke();
  });

  // Bounding box
  ctx.strokeStyle = 'rgba(40,70,200,0.15)';
  ctx.lineWidth = 0.5;
  BOX_E.forEach(([i,j]) => {
    const a=BOX_C[i], b=BOX_C[j];
    const pa=np(a[0],a[1],a[2]), pb=np(b[0],b[1],b[2]);
    ctx.beginPath(); ctx.moveTo(pa[0],pa[1]); ctx.lineTo(pb[0],pb[1]); ctx.stroke();
  });
  ctx.restore();

  // Axis labels
  ctx.font = '8px "Space Mono",monospace';
  ctx.textAlign = 'center';

  // X axis
  for (let a=0; a<=1; a++) {
    const [px,py] = np(a, -0.22, 2);
    ctx.fillStyle='rgba(255,90,45,0.48)';
    ctx.fillText(`X=${a}`, px, py-11);
  }
  // Y axis
  for (let b=0; b<=2; b++) {
    const [px,py] = np(-0.22, b, -0.22);
    ctx.fillStyle='rgba(55,200,80,0.48)';
    ctx.fillText(`Y=${b}`, px-12, py+4);
  }
  // Z axis
  for (let c=0; c<=4; c++) {
    const [px,py] = np(-0.22, 2.28, c);
    ctx.fillStyle='rgba(80,145,255,0.48)';
    ctx.fillText(`Z=${c}`, px, py+12);
  }
}

// ─── Wall planes ─────────────────────────────────────────────
function drawWalls() {
  function quad(pts, fc, sc) {
    const pp = pts.map(([a,b,c])=>np(a,b,c));
    ctx.beginPath();
    ctx.moveTo(pp[0][0],pp[0][1]);
    pp.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.closePath();
    ctx.fillStyle=fc; ctx.fill();
    ctx.strokeStyle=sc; ctx.lineWidth=0.8; ctx.stroke();
  }
  if(W.x) quad([[0,0,0],[0,2,0],[0,2,4],[0,0,4]],
    'rgba(255,100,30,0.05)','rgba(255,100,30,0.2)');
  if(W.y) quad([[0,0,0],[1,0,0],[1,0,4],[0,0,4]],
    'rgba(50,205,80,0.05)','rgba(50,205,80,0.2)');
  if(W.z) quad([[0,0,0],[1,0,0],[1,2,0],[0,2,0]],
    'rgba(80,140,255,0.05)','rgba(80,140,255,0.2)');
}

// ─── Nodes ───────────────────────────────────────────────────
function drawNodes() {
  const sorted = ND.map(nd => {
    const [rx,ry,rz] = rot3(g2w(nd.a,nd.b,nd.c));
    return { nd, rx, ry, rz, proj:[W2+rx*(740/(740+rz+270)), H2+ry*(740/(740+rz+270)), 740/(740+rz+270)] };
  }).sort((a,b)=>a.rz-b.rz);

  sorted.forEach(({ nd, proj:[sx,sy,s] }) => {
    const { a,b,c,n,a0,b0,c0,pc } = nd;
    const hidden = (W.x&&a0)||(W.y&&b0)||(W.z&&c0);
    const lit = n===spot;
    const orig = n===0;

    let rgb, alpha;
    if      (lit)  { rgb='255,215,0';   alpha=1.0; }
    else if (pc)   { rgb='0,232,255';   alpha=hidden?0.055:0.92; }
    else if (orig) { rgb='142,148,255'; alpha=hidden?0.055:0.5; }
    else           { rgb='255,115,38';  alpha=hidden?0.055:0.78; }

    const r = 7 + s*9.5;

    // Outer glow
    if (!hidden || lit) {
      const gr=ctx.createRadialGradient(sx,sy,0,sx,sy,r*(lit?5:pc?3.2:2.6));
      const ga = lit ? 0.38+pulse*0.12 : pc ? 0.26 : 0.16;
      gr.addColorStop(0,`rgba(${rgb},${ga})`);
      gr.addColorStop(1,`rgba(${rgb},0)`);
      ctx.fillStyle=gr;
      ctx.beginPath(); ctx.arc(sx,sy,r*(lit?5:pc?3.2:2.6),0,Math.PI*2); ctx.fill();
    }

    // Spotlight pulse rings
    if (lit) {
      const p1=pulse, p2=1-pulse;
      ctx.beginPath(); ctx.arc(sx,sy,r+7+p1*6,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,215,0,${0.4-p1*0.3})`; ctx.lineWidth=0.9; ctx.stroke();
      ctx.beginPath(); ctx.arc(sx,sy,r+13+p2*8,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,215,0,${0.18-p2*0.14})`; ctx.lineWidth=0.5; ctx.stroke();
    }

    // Body
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rgb},${alpha*0.2})`; ctx.fill();
    ctx.strokeStyle=`rgba(${rgb},${alpha})`; ctx.lineWidth=1.6; ctx.stroke();

    // Core
    ctx.beginPath(); ctx.arc(sx,sy,r*0.3,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rgb},${alpha*0.9})`; ctx.fill();

    // Label
    if (s > 0.42) {
      const la = hidden ? 0.07 : (lit ? 1 : alpha*0.78);
      ctx.font=`bold ${Math.max(7,~~(10*s))}px "Space Mono",monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=`rgba(${rgb},${la})`;
      ctx.fillText(n, sx, sy);

      if (lit && s>0.52) {
        ctx.font=`${Math.max(6,~~(7.5*s))}px "Space Mono",monospace`;
        ctx.fillStyle=`rgba(255,215,0,0.6)`;
        ctx.fillText(`(${a},${b},${c})`, sx, sy+r+10);
      }
    }
  });
}

// ─── HUD ─────────────────────────────────────────────────────
function drawHUD(cw, ch) {
  const nd = ND.find(n=>n.n===spot);
  if (!nd) return;
  const {a,b,c,n,pc} = nd;
  const orig = n===0;
  const hidden = (W.x&&nd.a0)||(W.y&&nd.b0)||(W.z&&nd.c0);

  // Info box
  const bx=14, by=14, bw=196, bh=60;
  ctx.fillStyle='rgba(6,8,26,0.78)';
  ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='rgba(40,70,200,0.28)'; ctx.lineWidth=0.5;
  ctx.strokeRect(bx,by,bw,bh);

  ctx.font='9px "Space Mono",monospace';
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='rgba(80,120,190,0.6)';
  ctx.fillText(`n = ${n}  →  (${a}, ${b}, ${c})`, bx+12, by+20);

  const formula = `(15·${a} + 10·${b} + 6·${c}) mod 30 = ${n}`;
  ctx.font='8px "Space Mono",monospace';
  ctx.fillStyle='rgba(60,90,160,0.5)';
  ctx.fillText(formula, bx+12, by+35);

  const scol = pc ? 'rgba(0,232,255,0.9)' : orig ? 'rgba(142,148,255,0.8)' : 'rgba(255,115,38,0.85)';
  const stxt = pc ? '✦ PRIME CANDIDATE — coprime to 30'
                  : orig ? '· ORIGIN — divisible by 2, 3 & 5'
                  : `✗ COMPOSITE — divisible by ${[nd.a0?'2':'',nd.b0?'3':'',nd.c0?'5':''].filter(Boolean).join(', ')}`;
  ctx.font='8px "Space Mono",monospace';
  ctx.fillStyle = scol;
  ctx.fillText(stxt, bx+12, by+50);

  // All-walls-sliced reveal
  const allSliced = W.x && W.y && W.z;
  revealT = allSliced ? Math.min(revealT+0.04, 1) : Math.max(revealT-0.05, 0);

  if (revealT > 0.01) {
    ctx.save();
    ctx.globalAlpha = revealT;

    // Banner
    const bw2=340, bh2=46, bx2=(cw-bw2)/2, by2=ch-70;
    ctx.fillStyle='rgba(0,15,25,0.85)';
    ctx.fillRect(bx2,by2,bw2,bh2);
    ctx.strokeStyle=`rgba(0,232,255,${0.5+pulse*0.3})`;
    ctx.lineWidth=0.8;
    ctx.strokeRect(bx2,by2,bw2,bh2);

    ctx.font='bold 11px "Space Mono",monospace';
    ctx.textAlign='center';
    ctx.fillStyle=`rgba(0,232,255,${0.85+pulse*0.15})`;
    ctx.fillText('✦  PRIME FIELD REVEALED  ✦', cw/2, by2+18);

    ctx.font='9px "Space Mono",monospace';
    ctx.fillStyle='rgba(0,200,230,0.65)';
    ctx.fillText('1 · 7 · 11 · 13 · 17 · 19 · 23 · 29', cw/2, by2+34);

    ctx.restore();
  }
}

// ─── Controls ────────────────────────────────────────────────
function tw(axis) {
  W[axis] = !W[axis];
  document.getElementById('b'+axis).classList.toggle('on', W[axis]);
}

function us(v) {
  spot = v;
  document.getElementById('nv').textContent = v;
  document.getElementById('sl').value = v;
}

// ─── Input ───────────────────────────────────────────────────
cv.addEventListener('mousedown', e => {
  drag=true; autoRot=false;
  lmx=e.clientX; lmy=e.clientY;
  csx=e.clientX; csy=e.clientY;
});
document.addEventListener('mouseup', () => drag=false);
document.addEventListener('mousemove', e => {
  if (!drag) return;
  rY += (e.clientX-lmx)*0.0072;
  rX += (e.clientY-lmy)*0.0072;
  rX = Math.max(-1.3, Math.min(1.3, rX));
  lmx=e.clientX; lmy=e.clientY;
});

cv.addEventListener('click', e => {
  if ((e.clientX-csx)**2+(e.clientY-csy)**2 > 20) return;
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  for (const nd of ND) {
    const [sx,sy,s]=np(nd.a,nd.b,nd.c);
    const r=7+s*9.5;
    if ((mx-sx)**2+(my-sy)**2 < (r+5)**2) { us(nd.n); return; }
  }
});

cv.addEventListener('touchstart', e => {
  e.preventDefault(); drag=true; autoRot=false;
  lmx=e.touches[0].clientX; lmy=e.touches[0].clientY;
}, {passive:false});
document.addEventListener('touchend', ()=>drag=false);
document.addEventListener('touchmove', e => {
  if (!drag) return;
  rY+=(e.touches[0].clientX-lmx)*0.007;
  rX+=(e.touches[0].clientY-lmy)*0.007;
  rX=Math.max(-1.3,Math.min(1.3,rX));
  lmx=e.touches[0].clientX; lmy=e.touches[0].clientY;
});

// ─── Resize ──────────────────────────────────────────────────
function resize() {
  const rect=cv.getBoundingClientRect();
  cv.width  = ~~rect.width;
  cv.height = ~~rect.height;
  W2 = rect.width/2;
  H2 = rect.height/2;
}
new ResizeObserver(resize).observe(cv);
resize();
frame();
</script>
</body>
</html>
