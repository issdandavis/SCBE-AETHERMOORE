<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cymatic Voxel Graph</title>
    <style>
      :root {
        --bg: #081017;
        --panel: #111e2a;
        --ink: #d8ecff;
        --muted: #9db7cc;
        --line: #244159;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top right, #13273a, var(--bg));
        color: var(--ink);
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: end;
        flex-wrap: wrap;
      }
      .panel {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: linear-gradient(180deg, #102132, var(--panel));
        padding: 12px;
      }
      label {
        font-size: 12px;
        color: var(--muted);
        display: block;
        margin-bottom: 4px;
      }
      input,
      select,
      button {
        border-radius: 8px;
        border: 1px solid #2f4d67;
        background: #09151f;
        color: var(--ink);
        padding: 8px 10px;
      }
      button {
        cursor: pointer;
        background: #143047;
      }
      #graph {
        width: 100%;
        height: 420px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #06111a;
      }
      pre {
        white-space: pre-wrap;
        font-size: 12px;
        color: #c6dbed;
      }
      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Cymatic Voxel Graph</h1>
      <p class="muted">
        Spectral channels route through a hyperbolic graph. Intersections are permitted only at merge nodes.
      </p>

      <div class="row panel">
        <div>
          <label for="flow-count">Flow Count</label>
          <input id="flow-count" type="number" min="1" max="32" value="8" />
        </div>
        <div>
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="default">default</option>
            <option value="quasi">quasi</option>
            <option value="dense">dense</option>
          </select>
        </div>
        <div>
          <label for="at-unix-ms">At Unix ms</label>
          <input id="at-unix-ms" type="number" step="1" />
        </div>
        <div>
          <label for="window-ms">Window ms</label>
          <input id="window-ms" type="number" min="1000" max="86400000" value="60000" />
        </div>
        <div>
          <button id="regen">Regenerate</button>
        </div>
      </div>

      <div class="panel">
        <canvas id="graph" width="1040" height="420"></canvas>
      </div>

      <div class="panel">
        <h2>Metrics</h2>
        <pre id="metrics">Waiting for data...</pre>
      </div>

      <div class="panel">
        <h2>Collisions</h2>
        <pre id="collisions">Waiting for data...</pre>
      </div>

      <div class="panel">
        <h2>Voxel Sample</h2>
        <pre id="voxels">Waiting for data...</pre>
      </div>
    </div>

    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
