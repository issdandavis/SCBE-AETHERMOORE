            - generic [ref=e111]: warning
            - paragraph [ref=e113]: As of September 9, 2025, the "maximum qualifying gross income" for purposes of paying any eligible fee at the micro entity discount rate under the gross income basis has changed to $251,190. This change is based on a report by the Census Bureau. See section 2.3 for more information about this income limit.
            - button "Close" [ref=e115] [cursor=pointer]:
