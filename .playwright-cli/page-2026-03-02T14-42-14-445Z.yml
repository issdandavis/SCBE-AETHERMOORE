          - generic [ref=e117]:
            - heading "Micro entity status" [level=1] [ref=e119]
            - article [ref=e121]:
              - generic [ref=e124]:
                - generic [ref=e125]:
                  - paragraph [ref=e126]:
                    - text: Some applicants and patent owners can benefit from an 80% reduction on most fees charged by the United States Patent and Trademark Office (USPTO) if they qualify and file the appropriate papers in their application or patent. To benefit from this fee reduction, applicants and patentees must establish “micro entity status” according to the USPTO Regulation -
                    - link "37 CFR 1.29" [ref=e127] [cursor=pointer]:
                      - /url: https://www.ecfr.gov/current/title-37/chapter-I/subchapter-A/part-1/subpart-A/subject-group-ECFR474fceace21a5df/section-1.29
                      - strong [ref=e128]: 37 CFR 1.29
                    - text: . Micro entity status may be available if you have limited income and have never or have rarely filed a patent application. This page explains your options for establishing micro entity status and gives details about application filing and income limits. You will also find information about how different work situations can affect your eligibility.
                  - paragraph [ref=e129]
                  - paragraph [ref=e130]:
                    - text: Looking for quick access to income limit information?
                    - link "Click here." [ref=e131] [cursor=pointer]:
                      - /url: "#2.3.3"
                  - paragraph [ref=e132]
                  - heading "1. General information" [level=2] [ref=e133]
                  - heading "1.1 Establishing micro entity status" [level=3] [ref=e134]
                  - paragraph [ref=e135]: "An application or patent may qualify for micro entity status if:"
                  - paragraph [ref=e136]:
                    - text: (1) Each applicant, each inventor, and every other party with an ownership interest in the application or patent is a
                    - link "small entity" [ref=e137] [cursor=pointer]:
                      - /url: https://www.uspto.gov/web/offices/pac/mpep/s509.html#d0e30961
                  - paragraph [ref=e138]:
                    - text: (2) The additional requirements of the micro entity
                    - link "gross income basis" [ref=e139] [cursor=pointer]:
                      - /url: "#Gross%20Income%20Basis"
                    - text: or
                    - link "institution of higher education basis" [ref=e140] [cursor=pointer]:
                      - /url: "#Institution%20of%20Higher%20Education%20Basis"
                    - text: are satisfied;
                    - strong [ref=e141]: and
                  - paragraph [ref=e142]: (3) The applicant or patentee files a micro entity certification in the application or patent for which micro entity status is desired.
                  - paragraph [ref=e143]:
                    - text: Most applications and patents that qualify for micro entity status do so under the
                    - link "gross income basis" [ref=e144] [cursor=pointer]:
                      - /url: "#Gross%20Income%20Basis"
                    - text: ", which requires that additional limits on gross income and the number of previously filed applications be met. Go to the"
                    - link "Gross income basis" [ref=e145] [cursor=pointer]:
                      - /url: "#Gross%20Income%20Basis"
                    - text: section for more information. Some applications and patents may qualify for the
                    - link "institution of higher education basis" [ref=e146] [cursor=pointer]:
                      - /url: "#Institution%20of%20Higher%20Education%20Basis"
                    - text: ", if certain limits on the applicant’s employer or on the ownership of the application or patent are met. Go to the"
                    - link "Institution of higher education basis" [ref=e147] [cursor=pointer]:
                      - /url: "#Institution%20of%20Higher%20Education%20Basis"
                    - text: section for more information for establishing micro entity status.
                  - paragraph [ref=e148]:
                    - text: You must establish micro entity status prior to paying, or at the time of paying, a fee in the micro entity amount. To establish micro entity status on the
                    - strong [ref=e149]: gross income basis
                    - text: ", the applicant or patentee should file form"
                    - link "SB/15A" [ref=e150] [cursor=pointer]:
                      - /url: https://www.uspto.gov/sites/default/files/documents/sb0015a.pdf
                    - text: in the application or patent. To establish micro entity status on the
                    - strong [ref=e151]: institution of higher education basis
                    - text: ", the applicant or patentee should file form"
                    - link "SB/15B" [ref=e152] [cursor=pointer]:
                      - /url: https://www.uspto.gov/sites/default/files/documents/sb0015b.pdf
                    - text: in the application or patent. These forms, along with all other USPTO patent-related forms can be found on our
                    - link "Patents Forms page" [ref=e153] [cursor=pointer]:
                      - /url: /patents/apply/forms
                    - text: .
                  - paragraph [ref=e154]:
                    - text: For more information on small and micro entities, see
                    - link "MPEP sections 509.02" [ref=e155] [cursor=pointer]:
                      - /url: https://www.uspto.gov/web/offices/pac/mpep/s509.html#d0e30961
                      - strong [ref=e156]: MPEP sections 509.02
                    - text: "-"
                    - link "509.04" [ref=e157] [cursor=pointer]:
                      - /url: https://www.uspto.gov/web/offices/pac/mpep/s509.html#ch500_d1ff69_210b3_1ca
                      - strong [ref=e158]: "509.04"
                    - text: .
                  - heading "1.2 Micro entity status must be reevaluated every time a fee is paid" [level=3] [ref=e159]: 1.2 Micro entity status must be reevaluated every time a fee is paid
                  - paragraph [ref=e160]:
                    - text: After micro entity status has been established in an application or patent, it will remain in effect until it is changed. However, the applicant or patentee
                    - strong [ref=e161]: must re-evaluate
                    - text: whether or not the application or patent still qualifies for micro entity status
                    - strong [ref=e162]: each and every time a fee is paid
                    - text: to the USPTO in that application or patent. This is particularly important if the application or patent qualified under the gross income basis, because (1) the income limit changes every year (usually in September or October) and (2) the gross income of any applicant, inventor or other person with an ownership interest in the patent or application will likely change from year to year. For more information concerning the income limit, see
                    - link "section 2.3 Maximum qualifying gross income" [ref=e163] [cursor=pointer]:
                      - /url: "#Maximum%20Qualifying%20Gross%20Income"
                    - text: .
                  - paragraph [ref=e164]:
                    - text: If the applicant or patentee determines that the application or patent
                    - strong [ref=e165]: still qualifies
                    - text: for micro entity status, then the fee may be paid in the micro entity amount. There is no need to re-file the micro entity certification form every time a payment is made.
                  - paragraph [ref=e166]:
                    - text: If an application or patent
                    - strong [ref=e167]: no longer qualifies
                    - text: for micro entity status, for example because the income limit for the gross income basis is no longer met, then the applicant or patentee must file a notification of a loss of entitlement to micro entity status in the application or patent. The
                    - link "“Notification of Loss of Entitlement to Micro Entity Status” form (Form SB/460)" [ref=e168] [cursor=pointer]:
                      - /url: https://www.uspto.gov/sites/default/files/documents/sb0460.pdf
                    - text: may be used to notify the USPTO of loss of entitlement to micro entity status. Information about how to notify the USPTO of loss on entitlement to micro entity status can be found in MPEP sections
                    - link "509.04(e)" [ref=e169] [cursor=pointer]:
                      - /url: https://www.uspto.gov/web/offices/pac/mpep/s509.html#ch500_d1ff69_271ef_147
                    - text: ","
                    - link "509.04(f)" [ref=e170] [cursor=pointer]:
                      - /url: https://www.uspto.gov/web/offices/pac/mpep/s509.html#ch500_d1ff69_2750f_29
                    - text: and
                    - link "2550(II)" [ref=e171] [cursor=pointer]:
                      - /url: https://www.uspto.gov/web/offices/pac/mpep/s2550.html
                    - text: (maintenance fees). If micro entity status is no longer applicable, the fee should be paid in either the small entity or undiscounted amount.
                  - heading "1.3 What to do when micro entity status was established by mistake" [level=3] [ref=e172]: 1.3 What to do when micro entity status was established by mistake
                  - paragraph [ref=e173]:
                    - text: If status as a micro entity is established in good faith in an application or patent, and fees as a micro entity are paid in good faith in the application or patent, and it is later discovered that such micro entity status either was established in error, or that the Office was not notified of a loss of entitlement to micro entity status through error, the error will be excused upon compliance with the separate submission and itemization requirements of
                    - link "37 CFR 1.29(k)(1)" [ref=e174] [cursor=pointer]:
                      - /url: https://www.ecfr.gov/current/title-37/chapter-I/subchapter-A/part-1/subpart-A/subject-group-ECFR474fceace21a5df/section-1.29#p-1.29(k)(1)
                    - text: and the deficiency payment requirement of
                    - link "37 CFR 1.29(k)(2)" [ref=e175] [cursor=pointer]:
                      - /url: https://www.ecfr.gov/current/title-37/chapter-I/subchapter-A/part-1/subpart-A/subject-group-ECFR474fceace21a5df/section-1.29#p-1.29(k)(2)
                    - text: .
                  - paragraph [ref=e176]:
                    - strong [ref=e177]
                    - text: The
                    - link "“Notification of Loss of Entitlement to Micro Entity Status” form (Form SB/460)" [ref=e178] [cursor=pointer]:
                      - /url: https://www.uspto.gov/sites/default/files/documents/sb0460.pdf
                    - text: may be used to notify the USPTO of loss of entitlement to micro entity status, and to submit the required itemization and deficiency payments. Information about how to correct micro entity status that was established by mistake can be found in MPEP section
                    - link "509.04(f)" [ref=e179] [cursor=pointer]:
                      - /url: https://www.uspto.gov/web/offices/pac/mpep/s509.html#ch500_d1ff69_2750f_29
                    - text: .
                - generic [ref=e180]:
                  - link "Expand all" [ref=e181] [cursor=pointer]:
                    - /url: "#"
                  - text: "|"
                  - link "Collapse all" [ref=e182] [cursor=pointer]:
                    - /url: "#"
                - group [ref=e183]:
                  - button "2. Gross income basis" [ref=e184] [cursor=pointer]:
                    - img [ref=e185]
                    - text: 2. Gross income basis
                - generic [ref=e187]:
                  - paragraph [ref=e188]
                  - paragraph [ref=e189]
                - group [ref=e190]:
                  - button "3. Institution of higher education basis" [ref=e191] [cursor=pointer]:
                    - img [ref=e192]
                    - text: 3. Institution of higher education basis
                - generic [ref=e194]:
                  - paragraph [ref=e195]
                  - heading "4. Reminders regarding micro entity status" [level=2] [ref=e196]: 4. Reminders regarding micro entity status
                  - list [ref=e197]:
                    - listitem [ref=e198]:
                      - text: To receive the micro entity reduced fees, you must file a form with your application showing that you meet the requirements as indicated above. These forms must be filed with every application for which you qualify and wish to receive the micro entity discount. Filers qualifying on the gross income basis should use form
                      - link "SB/15A" [ref=e199] [cursor=pointer]:
                        - /url: https://www.uspto.gov/sites/default/files/documents/sb0015a.pdf
                      - text: . For filers qualifying on the institution of higher education basis, use form
                      - link "SB/15B" [ref=e200] [cursor=pointer]:
                        - /url: https://www.uspto.gov/sites/default/files/documents/sb0015b.pdf
                      - text: . These forms, along with all other USPTO patent-related forms can be found on our
                      - link "Patents Forms page" [ref=e201] [cursor=pointer]:
                        - /url: https://www.uspto.gov/patents/apply/forms
                      - text: .
                    - listitem [ref=e202]:
                      - text: Please remember that if you file a nonprovisional utility application in paper, you are subject to
                      - strong [ref=e203]: two surcharges
                      - text: in addition to the normal fees associated with filing a nonprovisional application. The surcharges do not apply to reissue, design, plant, or provisional applications, and can be avoided by filing electronically in DOCX format using
                      - link "Patent Center" [ref=e204] [cursor=pointer]:
                        - /url: https://patentcenter.uspto.gov/
                      - text: ", the USPTO's automated online solution for patent filing. Visit our"
                      - link "Patent Center information page" [ref=e205] [cursor=pointer]:
                        - /url: https://www.uspto.gov/patents/apply/patent-center
                      - text: to learn more.
                      - list [ref=e206]:
                        - listitem [ref=e207]:
                          - text: The first surcharge is for “non-electronic filings.”
                          - strong [ref=e208]: There is no micro entity discount for this surcharge
                          - text: . That means if you are filing as a micro entity using a paper application, you will be required to pay the small entity non-electronic filing surcharge of $200.
                        - listitem [ref=e209]: The second surcharge is for filing an application where the specification, claims, and/or abstract do not conform to the USPTO requirements for submission in DOCX format. There is a micro entity discount for this surcharge. This surcharge applies to applications filed on or after January 17, 2024.
                  - paragraph [ref=e210]
                  - paragraph [ref=e211]
