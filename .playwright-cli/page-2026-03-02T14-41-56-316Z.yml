                  - paragraph [ref=e118]
                  - heading "Introduction" [level=2] [ref=e119]
                  - paragraph [ref=e120]: The United States Patent and Trademark Office (USPTO or Office) is the government agency responsible for examining patent applications and issuing patents. A patent is a type of property right. It gives the patent holder the right, for a limited time, to exclude others from making, using, offering to sell, selling, or importing into the United States the subject matter that is within the scope of protection granted by the patent. The USPTO determines whether a patent should be granted in a particular case. However, it is up to the patent holder to enforce his or her own rights if the USPTO does grant a patent.
                  - paragraph [ref=e121]: "The purpose of this guide is to provide you with basic information about filing a utility patent application. A patent application is a complex legal document, best prepared by one trained to prepare such documents. Thus, after reviewing this guide, you may wish to consult with a registered patent attorney or agent. Additional information is available:"
                  - list [ref=e122]:
                    - listitem [ref=e123]:
                      - text: by calling the USPTO's Contact Center at 800-PTO-9199
                      - link:
                        - /url: "#"
                      - 'generic "Call: 800-PTO-9199"'
                      - text: (800-786-9199
                      - link:
                        - /url: "#"
                      - 'generic "Call: 800-786-9199"'
                      - text: ) or 571-272-1000
                      - link:
                        - /url: "#"
                      - 'generic "Call: 571-272-1000"'
                    - listitem [ref=e124]:
                      - text: on the USPTO website at
                      - link "www.uspto.gov" [ref=e125] [cursor=pointer]:
                        - /url: http://www.uspto.gov
                    - listitem [ref=e126]: at your nearest Patent and Trademark Resource Center (PTRC). You will find information on PTRCs at the end of this guide.
                  - paragraph [ref=e127]: "There are three types of patents: utility, design, and plant. There are two types of utility and plant patent applications: provisional and nonprovisional. A provisional application is a quick and inexpensive way for inventors to establish a U.S. filing date for their invention, which can be claimed in a later-filed nonprovisional application. A provisional application is automatically abandoned 12 months after its filing date and is not examined. An applicant who decides to initially file a provisional application must file a corresponding nonprovisional application during the 12-month pendency period of the provisional application in order to benefit from the earlier provisional application filing. A nonprovisional application is examined by a patent examiner and may be issued as a patent if all the requirements for patentability are met. Each year the USPTO receives more than 600,000 patent applications. Most of the applications filed with the USPTO are nonprovisional applications for utility patents."
                  - paragraph [ref=e128]:
                    - text: This guide contains information to assist you in filing your nonprovisional utility patent application. It specifies the required parts of the utility patent application and identifies some of the forms you may use (available on the USPTO website at
                    - link "www.uspto.gov" [ref=e129] [cursor=pointer]:
                      - /url: /
                    - text: ). This information is generally derived from patent laws and regulations found at Title 35 of the United States Code (U.S.C.), and Title 37 of the Code of Federal Regulations (CFR). These materials, as well as the Manual of Patent Examining Procedure (MPEP), are available at the USPTO website, at PTRCs, and at most law libraries.
                  - paragraph [ref=e130]: "Please contact the USPTO's Contact Center, browse the USPTO's website, or visit a PTRC if you have questions about:"
                  - list [ref=e131]:
                    - listitem [ref=e132]: other types of patent applications
                    - listitem [ref=e133]: locating a patent attorney or agent
                    - listitem [ref=e134]: obtaining the most up-to-date fee schedule
                    - listitem [ref=e135]: obtaining copies of other USPTO publications
                  - heading "Nonprovisional utility patent filing options" [level=2] [ref=e136]
                  - paragraph [ref=e137]:
                    - text: A nonprovisional utility patent application can be filed with the USPTO through the Office's electronic filing system called Patent Center, delivery by U.S. mail, or hand delivery to the Office in Alexandria, Virginia. By far, most patent applications filed at the USPTO are utility applications. Effective November 15, 2011, any regular nonprovisional utility application filed by mail or hand-delivery will require payment of an additional $400 fee called the "non-electronic filing fee," which is reduced by 50 percent to $200 for applicants that qualify for small entity status under 37 CFR § 1.27(a) or micro entity status under 37 CFR 1.29(a) or (d).
                    - strong [ref=e138]: The only way to avoid paying the additional $400 non-electronic filing fee
                    - strong [ref=e139]: is by filing the nonprovisional utility application electronically via Patent Center.
                    - text: (The non-electronic filing fee does not apply to reissue, design, plant, or provisional applications.) Patent Center is a Web-based patent application and document submission systems in which anyone with a Web-enabled computer can file patent applications without downloading special software or changing document preparation tools and processes. Patent Center is the new web-based patent application and document submission tool which has replaced the old electronic filing system called EFS-Web. The Patent Center electronic filing system introduces the ability to electronically file the complete specification including the description, claims and abstract in one DOCX file rather than three separate files, making it easier to file in DOCX. The following “Application Requirements” section explains why this is important. More information is available at the
                    - link "Patent Center" [ref=e140] [cursor=pointer]:
                      - /url: /patents/apply/patent-center
                    - text: . Full technical support for Patent Center is available through the Patent Electronic Business Center by calling 866-217-9197 from 6 a.m. to 12 midnight Eastern Time, Monday through Friday, except federal holidays.
                  - heading "Application requirements" [level=2] [ref=e141]
                  - paragraph [ref=e142]: When filing a nonprovisional utility patent application, it must be submitted in the English language or be accompanied by a translation in the English language, a statement that the translation is accurate, and have payment of the fee set forth in 37 CFR § 1.17(i). If an applicant files a nonprovisional utility application in a language other than English without the translation, statement, or fee, the applicant will be given a notice and time period to submit the missing item(s).
                  - paragraph [ref=e143]: A nonprovisional utility patent application must include a specification, including a description and a claim or claims; drawings, when necessary; an oath or declaration; and the prescribed filing, search, and examination fees.
                  - paragraph [ref=e144]:
                    - text: Patent Center accepts electronic documents formatted in DOCX. The complete specification (description, claims, and abstract) can be created using a word processing program such as Microsoft® Word, Google Docs, Office Online, LibreOffice and Pages for Mac, or Corel® WordPerfect.
                    - strong [ref=e145]: Beginning January 17, 2024, the description, claims, and abstract for a nonprovisional utility patent application specification must all be filed in DOCX format in order to avoid an additional fee of $400, which is reduced to $160 for small entity applicants and $80 for micro entity applicants.
                    - text: As set forth at 37 CFR § 1.16(u), this additional fee will be required where the specification’s written description, claims, and/or abstract does not conform to the USPTO requirements for submission in DOCX format. Other application documents, such as drawings and hand-signed declarations, may be scanned as a PDF file for filing via Patent Center. This additional fee does not apply to reissue, design, plant, and provisional applications. Applicants accustomed to filing a patent application specification in PDF format must switch to filing in DOCX format for any nonprovisional utility patent application filed on or after January 17, 2024, in order to avoid the additional fee. This applies to continuing and divisional applications as well as applications claiming the benefit of a previously filed provisional application. For more information, please see the webpage titled “File patent application documents in DOCX” at
                    - link "File patent application documents in DOCX" [ref=e146] [cursor=pointer]:
                      - /url: /patents/docx
                    - text: .
                  - paragraph [ref=e147]: Each document must have a top margin of at least 2 cm (3/4 inch), a left-side margin of at least 2.5 cm (1 inch), a right-side margin of at least 2 cm (3/4 inch) and a bottom margin of at least 2 cm (3/4 inch). The application pages must be numbered consecutively (centrally located above or below the text) starting with page one. In addition, the DOCX document size should be 8.5 inch by 11 inch (standard size) or 21 centimeter by 29.7 centimeter (DIN size A4). The specification, including the description, claims, and abstract, must have lines that are 1.5 or double-spaced in a single column of text. The text must be a nonscript font (e.g., Arial, Times Roman, or Courier), preferably with a font size of 12.
                  - paragraph [ref=e148]: "A complete nonprovisional utility patent application should contain the elements listed below, arranged in the order shown. Description of these elements is provided in the following sections:"
                  - list [ref=e149]:
                    - listitem [ref=e150]: Utility Patent Application Transmittal Form or Transmittal Letter
                    - listitem [ref=e151]: Appropriate Fees
                    - listitem [ref=e152]: Application Data Sheet (see 37 CFR § 1.76)
                    - listitem [ref=e153]: Specification (including the description, at least one claim, and an abstract)
                    - listitem [ref=e154]: Drawings (when necessary)
                    - listitem [ref=e155]: Executed Oath or Declaration
                    - listitem [ref=e156]: Nucleotide and Amino Acid Sequence Listing (when necessary)
                    - listitem [ref=e157]: Large Tables or Computer Listings (when necessary)
                  - heading "Utility Patent Application Transmittal Form or Transmittal Letter" [level=2] [ref=e158]
                  - paragraph [ref=e159]:
                    - text: A Utility Patent Application Transmittal Form (Form
                    - link "PTO/AIA/15" [ref=e160] [cursor=pointer]:
                      - /url: https://www.uspto.gov/sites/default/files/forms/aia0015.pdf
                      - strong [ref=e161]: PTO/AIA/15
                    - text: ) or a transmittal letter should be filed with every patent application to identify the items being filed (e.g., specification, drawings, declaration, and information disclosure statement). The form identifies the first named inventor, the type of application, the title of the invention, the contents of the application, and any accompanying enclosures. (Form
                    - link "PTO/SB/21" [ref=e162] [cursor=pointer]:
                      - /url: https://www.uspto.gov/web/forms/sb0021.pdf
                      - strong [ref=e163]: PTO/SB/21
                    - text: should be used for all correspondence after initial filing.)
                  - heading "Appropriate fees" [level=2] [ref=e164]
                  - paragraph [ref=e165]:
                    - text: You can electronically submit the required filing, search, and examination fees using a credit card or electronic funds transfer. For example, when filing your patent application online via Patent Center, it is better to pay these fees online rather than later, because any filing, search, or examination fee paid on a date later than the patent application filing date requires a late surcharge of $160 ($64 for small entity applicants and $32 for micro entity applicants). The late surcharge will also be owed if you file the required oath or declaration on a date later than the application filing date, so it is best to ensure that the required fees and the oath or declaration are included with the specification (including claims) and drawings filed via Patent Center. You can also file your nonprovisional utility application in paper by mail or by hand-delivery; however, this will cost you an additional non-electronic filing fee of $400 ($200 for small and micro entities) on top of the regular filing, search, and examination fees. You will also owe the additional fee set forth in 37 CFR § 1.16(u) referenced above for not filing the specification, claims, and abstract in DOCX format if your nonprovisional utility application is filed on or after January 17, 2024. If you file in paper anyway, the Fee Transmittal Form (Form
                    - link "PTO/SB/17" [ref=e166] [cursor=pointer]:
                      - /url: https://www.uspto.gov/sites/default/files/forms/sb0017.pdf
                      - strong [ref=e167]: PTO/SB/17
                    - text: ) may be used to calculate the prescribed filing, examination, and search fees, any excess claim fees or application size fee, and indicate the method of payment (by check, money order, USPTO deposit account, or credit card).
                  - paragraph [ref=e168]: Although it is recommended to pay the filing, search, and examination fees online at the time of filing your application via Patent Center in order to avoid the late surcharge, if you pay the fees later by check or money order, the check or money order must be made payable to the "Director of the United States Patent and Trademark Office." If an application is filed without the fees, the applicant will be notified and required to submit the fees plus the late surcharge within the time period set in the notice.
                  - paragraph [ref=e169]:
                    - text: If your nonprovisional utility application is filed electronically and includes a total number of specification and drawing pages that exceeds 133, an application size fee will be due. (For applications filed in paper, an application size fee is due if the total number of pages exceeds 100 pages.) Further, if the application has more than three independent claims or more than 20 total claims, excess claims fees will be due.
                    - strong [ref=e170]: Fees are subject to change, and the applicant should consult the current
                    - link "fee schedule" [ref=e171] [cursor=pointer]:
                      - /url: https://www.uspto.gov/learning-and-resources/fees-and-payment/fee-schedule
                      - strong [ref=e172]: fee schedule
                    - strong [ref=e173]: before filing the application.
                    - text: Normally, fees change every October.
                  - heading "Fee discounts based on establishment of Small or Micro Entity Status" [level=2] [ref=e174]
                  - paragraph [ref=e175]: Most patent applicants pay regular undiscounted patent fees. However, fees for filing, searching, examining, issuing, appealing, and maintaining patent applications and patents are reduced by 60 percent for any small entity that qualifies for reduced fees under 37 CFR § 1.27(a), and are reduced by 80 percent for any micro entity that files a certification that the requirements under 37 CFR § 1.29(a) or (d) are met.
                  - list [ref=e176]:
                    - listitem [ref=e177]:
                      - strong [ref=e178]: "Small Entity Status:"
                      - text: Applicant must determine that small entity status under
                      - link "37 CFR § 1.27(a)" [ref=e179] [cursor=pointer]:
                        - /url: https://mpep.uspto.gov/RDMS/MPEP/current#/result/d0e31381.html?q=small%20entity&ccb=on&ncb=off&icb=off&fcb=off&ver=current&syn=adj&results=compact&sort=relevance&cnt=10&index=1
                      - text: is appropriate before making an assertion of entitlement to small entity status and paying a fee at the 60 percent small entity discount. Small entity status may be appropriate if the inventors have not assigned any rights in the invention set forth in the application and are not under any obligation to do so (as may be required in an employment contract). Note that by filing electronically, the filing fee for an applicant qualifying for small entity status is further reduced. If you qualify as a small entity for patent fee purposes, no special form is required to claim your entitlement to reduced fees (you may check a special box on the transmittal form), but you should only pay small entity rates after ensuring that you qualify for the small entity status.
                    - listitem [ref=e180]:
                      - strong [ref=e181]: "Micro Entity Status:"
                      - text: Applicant must determine that
                      - link "micro entity status" [ref=e182] [cursor=pointer]:
                        - /url: /patents/laws/micro-entity-status
                      - text: under 37 CFR § 1.29(a) or (d) is appropriate before filing the required certification of micro entity status and paying a fee at the 80 percent micro entity discount. The patent forms Web page is indexed under the
                      - link "Forms, Patents" [ref=e183] [cursor=pointer]:
                        - /url: /patents/apply/forms
                      - text: section on the USPTO website. There are two USPTO micro entity certification forms, namely form
                      - link "PTO/SB/15A" [ref=e184] [cursor=pointer]:
                        - /url: /sites/default/files/documents/sb0015a.pdf
                      - text: for certifying micro entity status on the "gross income basis" under 37 CFR § 1.29(a), and form
                      - link "PTO/SB/15B" [ref=e185] [cursor=pointer]:
                        - /url: /sites/default/files/documents/sb0015b.pdf
                      - text: for certifying micro entity status on the "institution of higher education basis" under 37 CFR § 1.29(d). Because the certifications that must be made in order to be considered a micro entity are rather detailed, it is strongly recommended that the appropriate USPTO micro entity certification form be used to certify qualification for micro entity status.
                  - paragraph [ref=e186]:
                    - text: Effective November 15, 2011, any regular nonprovisional utility application filed by mail or hand-delivery will require payment of an additional $400 fee called the "non-electronic filing fee," which is reduced by 50 percent (to $200) for applicants that qualify for small entity status under 37 CFR § 1.27(a) or micro entity status under 37 CFR § 1.29(a) or (d).
                    - strong [ref=e187]: The only way to avoid having to pay the additional $400 non-electronic filing fee
                    - strong [ref=e188]: is by filing the regular nonprovisional utility application via Patent Center
                    - text: .
                  - heading "Application data sheet" [level=2] [ref=e189]
                  - paragraph [ref=e190]:
                    - text: Submission of an application data sheet (ADS) should be routine for all nonprovisional applications and is required in certain instances. For example, for applications filed on or after September 16, 2012, any domestic benefit claim(s) and any foreign priority claim(s) must be made in an ADS within four months from filing or 16 months from the filing date of the prior-filed application, whichever is later. See 37 CFR § 1.78 for information about domestic benefit claims and 37 CFR § 1.55 for information about foreign priority claims. Form
                    - link "PTO/AIA/14" [ref=e191] [cursor=pointer]:
                      - /url: /patents/apply/forms/important-information-completing-application-data-sheet-ads
                    - text: is the USPTO's ADS form for filing utility applications. See 37 CFR § 1.76 and MPEP § 601.05 for more information.
                  - paragraph [ref=e192]: "A corrected ADS may be filed to correct or update information in a previously filed ADS. In addition, even if an ADS was not previously filed, a corrected ADS must be submitted to make changes to information already of record. The corrected ADS is required to include underlined and strike-through text to reflect the changes: information that is being inserted must be indicated via underlining, and text that is being removed must be indicated via strike-through or brackets. However, certain information cannot be changed by simply filing a corrected ADS. For example, changes to the named inventors must comply with the requirements of 37 CFR § 1.48, correspondence address changes must comply with the requirements of 37 CFR § 1.33(a), and foreign priority and domestic benefit information changes must comply with 37 CFR §§ 1.55 and 1.78, respectively."
                  - heading "Specification" [level=2] [ref=e193]
                  - paragraph [ref=e194]: The specification includes a written description of the invention and of the manner and process of making and using the invention that concludes with the claims to the invention, which must begin on a new page. The specification must be in clear, full, concise, and exact terms to enable any person skilled in the art or science to which the invention pertains to make and use the same.
                  - paragraph [ref=e195]: For inventions involving computer programming, computer program listings may be submitted as part of the specification as set forth in 37 CFR § 1.96(b) and (c). Other than for a reissue application or reexamination proceeding, the pages of the specification (but not the transmittal letter sheets or other forms), including claims and abstract, must be numbered consecutively, starting with 1, the numbers being centrally located above or preferably below, the text. The lines of the specification must be 1.5 or double spaced (lines of text not comprising the specification need not be 1.5 or double spaced). It is desirable to include an indentation at the beginning of each new paragraph and for paragraphs to be numbered (e.g., [0001], [0002], [0003], etc.).
                  - paragraph [ref=e196]: "For an invention made with United States government support and for which the United States government has certain rights, 35 U.S.C. 202(c)(6) and 37 CFR 401.14(f)(4) requires the specification to contain a statement specifying that the invention was made with United States government support and that the United States government has certain rights in the invention. For example, the following language may be used: “This invention was made with government support under [IDENTIFY THE CONTRACT] awarded by [IDENTIFY THE FEDERAL AGENCY]. The government has certain rights in the invention.”"
                  - paragraph [ref=e197]: It is preferable to use all of the section headings described below to represent the parts of the description portion of the specification. Section headings should use upper case text without underlining or bold type. If the section contains no text, the phrase "Not Applicable" should follow the section heading.
                  - heading "Title of invention" [level=2] [ref=e198]
                  - paragraph [ref=e199]: The title of the invention (or an introductory portion stating the name, citizenship, residence of each applicant, and the title of the invention) should appear as the heading on the first page of the specification. Although a title may have up to 500 characters, the title must be as short and specific as possible.
                  - heading "Cross-reference to related applications" [level=2] [ref=e200]
                  - paragraph [ref=e201]: Any nonprovisional utility patent application filed after September 16, 2012, claiming the benefit of one or more prior-filed copending nonprovisional applications (or international applications designating the United States of America) under 35 U.S.C. §§ 120, 121, or 365(c), or to a provisional patent application under 35 U.S.C. § 119(e), must present the reference to the earlier application in an application data sheet under 37 CFR § 1.76. See 37 CFR § 1.78. Cross-references to other related patent applications may be made in an initial section of the description when appropriate.
                  - heading "Statement Regarding Federally Sponsored Research or Development (if Applicable)" [level=2] [ref=e202]
                  - paragraph [ref=e203]: This section, if applicable, should contain a statement as to rights to inventions made under federally sponsored research and development (if any). See MPEP §310 for more information.
                  - heading "Reference to a sequence listing, a large table, or a computer program listing appendix on read-only optical disc (if applicable)" [level=2] [ref=e204]
                  - paragraph [ref=e205]: Any material submitted separately on a read-only optical disc must be referenced in the specification in a separate incorporation by reference statement. The only materials accepted on read-only optical disc are a computer program listing appendix, a sequence listing for disclosures of nucleotides and/or amino acids, and large tables of information. All such information submitted on read-only optical disc must be in compliance with 37 CFR § 1.52(e), and the specification must contain a reference to the read-only optical disc and its contents. The contents of read-only optical disc files must be in standard ASCII character and file formats, unless the submission is a sequence listing XML which requires that the sequence listing contain the information regarding the disclosed nucleotides and/or amino acids in an application filed on or after July 1, 2022. The total number of read-only optical discs including any required duplicates and the files on each read-only optical disc must be specified in the specification.
                  - paragraph [ref=e206]: If a computer program listing appendix is submitted and is over 300 lines long (each line of up to 72 characters), the computer program listing appendix must be submitted on a read-only optical disc in compliance with 37 CFR § 1.96, and the specification must contain an incorporation by reference statement to the computer program listing appendix. A computer program listing of 300 or less lines may be, but is not required to be, submitted on read-only optical disc. The computer program listing appendix on read-only optical disc will not be printed with any patent or patent application publication.
                  - paragraph [ref=e207]: If a sequence listing is to be submitted that exceeds the Office patent electronic filing system limits, the sequence listing may be provided on a read-only optical disc in compliance with 37 CFR §§ 1.821-1.825 (for applications filed before July 1, 2022) or 37 CFR §§ 1.831-1.835 (for applications filed on or after July 1, 2022), and the specification must contain an incorporation by reference statement to the sequence listing on read-only optical disc in a separate incorporation by reference paragraph.
                  - paragraph [ref=e208]: If a large table of data is submitted and the large table would occupy more than 50 pages if submitted on paper, the large table can be submitted on a read-only optical disc in compliance with 37 CFR § 1.58, and the specification must contain an incorporation by reference statement to the large table on read-only optical disc. The data in the large table must properly align visually with the associated rows and columns.
                  - heading "Background of the invention" [level=2] [ref=e209]
                  - paragraph [ref=e210]: This section should include a statement of the field of endeavor to which the invention pertains. This section may also include a paraphrasing of the applicable U.S. patent classification definitions or the subject matter of the claimed invention.
                  - paragraph [ref=e211]: Also, it should contain a description of information known to you, including references to specific documents related to your invention. It should contain, if applicable, references to specific problems involved in the prior art (or state of technology) that your invention is drawn toward. See MPEP § 608.01(c) for more information.
                  - heading "Brief summary of the invention" [level=2] [ref=e212]
                  - paragraph [ref=e213]:
                    - text: This section should present the substance or general idea of the claimed invention in summarized form. The summary can include the advantages of the invention and how it solves previously existing problems. Preferably, problems are identified in the
                    - strong [ref=e214]: Background of the Invention
                    - text: section. A statement of the object of the invention may also be included. See MPEP § 608.01(d) for more information.
                  - heading "Brief description of the several views of the drawing" [level=2] [ref=e215]
                  - paragraph [ref=e216]: Where there are drawings, you must include a listing of all figures by number (e.g., Figure 1A) and with corresponding statements explaining what each figure depicts.
                  - heading "Detailed description of the invention" [level=2] [ref=e217]
                  - paragraph [ref=e218]: In this final and substantively most important section of the description, the invention must be explained along with the process of making and using the invention in full, clear, concise, and exact terms. This section should distinguish the invention from other inventions and from what is old. It should also describe completely the process, machine, manufacture, composition of matter, or improvement invented. In the case of an improvement, the description should be confined to the specific improvement and to the parts that necessarily cooperate with it or that are necessary to completely understand the invention.
                  - paragraph [ref=e219]: It is required that the description be sufficient so that any person of ordinary skill in the pertinent art, science, or area could make and use the invention without extensive experimentation. The best mode contemplated by the inventor of carrying out the invention must be set forth in the description. Each element in the drawings should be mentioned in the description. See MPEP § 608.01(g) for more information.
                  - heading "Claim or claims" [level=2] [ref=e220]
                  - paragraph [ref=e221]: The specification’s claim or claims must particularly point out and distinctly claim the subject matter that the inventor or inventors regard as the invention. The claims define the scope of the protection of the patent. Whether a patent will be granted is determined, in large measure, by the scope of the claims.
                  - paragraph [ref=e222]: A nonprovisional application for a utility patent must contain at least one claim. The claim or claims section must begin on a separate physical sheet or electronic page. If there are several claims, they must be numbered consecutively in Arabic numerals.
                  - paragraph [ref=e223]: One or more claims may be presented in dependent form, referring back to and further limiting another claim or claims in the same application. All dependent claims should be grouped together with the claim or claims to which they refer to the extent practicable. Any dependent claim that refers to more than one other claim (multiple dependent claim) shall refer to such other claims in the alternative only. Each claim should be a single sentence, and where a claim sets forth a number of elements or steps, each element or step of the claim should be separated by a line indentation.
                  - heading "Abstract of the disclosure" [level=2] [ref=e224]
                  - paragraph [ref=e225]: The purpose of the specification’s abstract is to enable the USPTO and the public to quickly determine the nature of the technical disclosures of your invention. The abstract points out what is new in the art to which your invention pertains. It should be in narrative form and generally limited to a single paragraph, and it must begin on a separate page. An abstract should not be longer than 150 words. See MPEP § 608.01(b) for more information.
                  - heading "Drawings" [level=2] [ref=e226]
                  - paragraph [ref=e227]:
                    - text: Separate from the specification, a patent application is required to contain drawings if drawings are necessary to understand the subject matter to be patented. Most patent applications contain drawings. The drawings must show every feature of the invention as specified in the claims. A drawing necessary to understand the invention cannot be introduced into an application after the filing date of the application because of the prohibition against new matter. Please see the detailed
                    - strong [ref=e228]: Drawing Requirements
                    - text: section.
                  - heading "Oath or declaration" [level=2] [ref=e229]
                  - paragraph [ref=e230]:
                    - text: An oath or declaration is a formal statement that must be made by the inventor in a nonprovisional application, including utility, design, plant and reissue applications. Either form
                    - link "PTO/AIA/01" [ref=e231] [cursor=pointer]:
                      - /url: /sites/default/files/forms/aia0001.pdf
                    - text: or
                    - link "PTO/AIA/08" [ref=e232] [cursor=pointer]:
                      - /url: /sites/default/files/forms/aia0008.pdf
                    - text: may be used to make the required declaration in a utility application. It is preferred that applicants use form PTO/AIA/01, which must be filed together with an
                    - link "application data sheet." [ref=e233] [cursor=pointer]:
                      - /url: /sites/default/files/forms/aia0014.pdf
                    - text: Each inventor must sign an oath or declaration that includes certain statements required by law and the USPTO rules, including the statement that he or she believes himself or herself to be the original inventor or an original joint inventor of a claimed invention in the application, and the statement that the application was made or authorized to be made by him or her. See 35 U.S.C 115 and 37 CFR § 1.63. An oath must be sworn to by the inventor before a notary public. A declaration may be submitted in lieu of an oath. A declaration does not need to be notarized. Oaths or declarations are required for design, plant, utility, and reissue applications. In addition to the required statements, the oath or declaration must set forth the legal name of the inventor and, if not provided in an application data sheet, the inventor's mailing address and residence. In lieu of an oath or declaration, a substitute statement may be signed by the applicant with respect to an inventor who is deceased, legally incapacitated, cannot be found or reached after diligent effort, or has refused to execute the oath or declaration. Joint inventors who are the applicant may sign a substitute statement for an inventor who cannot be found or reached after diligent effort or has refused to execute the oath or declaration. However, joint inventors cannot sign a substitute statement for an inventor who is deceased or legally incapacitated. A legal representative of the deceased or legally incapacitated inventor or the assignee who is the applicant may sign a substitute statement for a deceased or legally incapacitated inventor. The assignee (or party to whom the inventor is obligated to assign the invention) who is the applicant may sign a substitute statement for an inventor who is deceased, legally incapacitated, cannot be found or reached after diligent effort, or has refused to execute the oath or declaration. Form
                    - link "PTO/AIA/02" [ref=e234] [cursor=pointer]:
                      - /url: /sites/default/files/forms/aia0002.pdf
                    - text: is the USPTO's substitute statement form for filing utility applications in these situations. When filing a continuing application, a copy of the oath or declaration filed in the earlier application may be used provided that it complies with the rules in effect for the continuing application (i.e., the rules that apply to applications filed on or after September 16, 2012). The oath or declaration must be personally signed by the inventor, either with a handwritten signature (i.e., pen applied to paper) or an "S-signature" (a typed name or electronic image of a handwritten signature inserted between forward slashes on the signature line). Each inventor's legal name is required.
                  - paragraph [ref=e235]: "Any oath or declaration must be in a language the inventor understands. If the oath or declaration used is in a language other than English and is not in a form provided by the USPTO or provided in accordance with Patent Cooperation Treaty (PCT) Rule 4.17(iv), an English translation together with a statement that the translation is accurate is required. The USPTO currently provides translations of forms PTO/AIA/01 and PTO/AIA/02 into 10 languages: Chinese (simplified), Dutch, French, German, Italian, Japanese, Korean, Russian, Swedish, and Spanish."
                  - heading "Sequence listing (if applicable)" [level=2] [ref=e236]
                  - paragraph [ref=e237]: This section, for the disclosure of a nucleotide or amino acid sequence, should contain a listing of the sequence complying with 37 CFR §1.821 through 37 CFR §1.825 and may be in paper or electronic form.
                  - heading "Obtaining a receipt for documents mailed to the USPTO" [level=2] [ref=e238]
                  - paragraph [ref=e239]:
                    - text: Patent correspondence filed in a nonprovisional utility application after the application filing date (known as "follow-on" correspondence) can still be filed by mail or hand-delivery without incurring the $400 non-electronic filing fee. Follow-on correspondence filed by anyone other than a registered eFiler must be sent by mail or be hand-delivered. In the event you receive from the USPTO a "Notice of Incomplete Application" in response to your filing stating that an application number has been assigned but no filing date has been granted, you must become a registered eFiler and file your reply to the "Notice of Incomplete Application" via Patent Center in order to avoid the $400 non-electronic filing fee. Learn how to become a registered eFiler and have the ability to file follow-on correspondence at our
                    - link "Getting Started guide" [ref=e240] [cursor=pointer]:
                      - /url: /patents/apply/applying-online/getting-started-new-users
                    - text: ","
                    - strong [ref=e241]
                    - text: or call the Electronic Business Center at 866-217-9197.
                  - paragraph [ref=e242]: A receipt for documents mailed or hand-delivered to the USPTO can be obtained by attaching a stamped, self-addressed postcard to the first page of the documents. The postcard should contain a detailed list that identifies each type of document and the number of pages of each document. Upon receipt at the USPTO, the detailed list on the postcard will be compared to the actual contents of the delivery. Any discrepancies between the detailed list and the actual contents will be noted on the postcard. The postcard will be initialed and date stamped by the person who reviewed the application in the Office of Patent Application Processing. The postcard will be returned by mail to the addressee whose name appears on the postcard.
                  - paragraph [ref=e243]: The returned postcard serves as evidence of receipt in the USPTO of all items listed on the postcard, unless otherwise noted by the USPTO on the postcard. That is, if the postcard receipt has been annotated to indicate that a particular paper was not received, the postcard receipt will not serve as evidence of receipt of that paper in the USPTO. Likewise, the postcard receipt will not serve as evidence of receipt of papers that are not adequately itemized.
                  - paragraph [ref=e244]: "When preparing the detailed list of documents identified on the postcard, it is important to include the following identifying information:"
                  - list [ref=e245]:
                    - listitem [ref=e246]: application number (if known)
                    - listitem [ref=e247]: confirmation number (if known)
                    - listitem [ref=e248]: filing date of the application (if known)
                    - listitem [ref=e249]: title of the invention
                    - listitem [ref=e250]: name(s) of the inventor or inventors
                  - paragraph [ref=e251]: The postcard should also include a detailed list of every document type and the number of pages of each document that are included in the delivery.
                  - paragraph [ref=e252]: "Although it is highly recommended that nonprovisional utility applications be filed electronically via Patent Center in order to avoid the non-electronic filing fee, a nonprovisional utility application may still be filed by mail, incurring the additional $400 fee ($200 for small entity applicants). If a postcard is submitted with a patent application, the detailed listing should include the following items:"
                  - list [ref=e253]:
                    - listitem [ref=e254]: title and number of pages of each USPTO form
                    - listitem [ref=e255]: number of pages of specification (excluding claims)
                    - listitem [ref=e256]: number of claims and the number of claim pages
                    - listitem [ref=e257]: number of figures of drawing and the number of sheets of drawings
                    - listitem [ref=e258]: whether an oath or declaration statement is included and the number of pages
                    - listitem [ref=e259]: type and number of other documents that are included and the number of pages of each document
                    - listitem [ref=e260]:
                      - text: amount of payment and the method of payment (i.e., check, credit card, money order, or
                      - link "USPTO deposit account)" [ref=e261] [cursor=pointer]:
                        - /url: /learning-and-resources/fees-and-payment/deposit-account-rules-and-information
                  - paragraph [ref=e262]: It is important that the postcard itemizes each component of the application. For example, a general statement such as "complete application" or "patent application" or "drawings" will not show that each of the required components of an application was included if one of the items is later found to be missing by the USPTO.
                  - paragraph [ref=e263]: When the self-addressed postcard is submitted with a utility patent application, the USPTO will stamp the postcard being returned to the addressee with both the receipt date and the application number before placing it in the outgoing mail.
                  - paragraph [ref=e264]: Upon receipt of the returned postcard, the addressee should promptly review the postcard to ensure that all documents and all pages were received by the USPTO.
                  - paragraph [ref=e265]: Pursuant to 35 U.S.C. 21 and 37 CFR § 1.10, any correspondence received by the USPTO (including an application filing) that was delivered via "Priority Mail Express Post Office to Addressee" service of the United States Postal Service (USPS) will be considered filed in the Office on the date of deposit with the USPS. The date of deposit with the USPS is shown by the "date-in" or "date accepted" on the mailing label or other official USPS notation. If the USPS deposit date cannot be determined, the correspondence will be accorded the Office receipt date as the filing date. Before depositing an application with the USPS in accordance with the Priority Mail Express procedure set forth at 37 CFR § 1.10, it is important to place the number of the mailing label on the application papers. Further, only one application should be mailed in a single Priority Mail Express package.
                  - heading "Drawing requirements" [level=2] [ref=e266]
                  - paragraph [ref=e267]: Information on drawing requirements is based substantially on 37 CFR § 1.84.
                  - paragraph [ref=e268]: "Black and white drawings are normally required. India ink, or its equivalent that secures black solid lines, must be used for drawings. Drawings made by hand should be scanned into PDF format for filing via Patent Center. The following margins are required:"
                  - list [ref=e269]:
                    - listitem [ref=e270]: On 21.6 cm by 27.9 cm (8 1/2 by 11 inches) drawing sheets, each sheet must include a top margin of at least 2.5 cm (1 inch), a left-side margin of at least 2.5 cm (1 inch), a right-side margin of at least 1.5 cm (5/8 inch), and a bottom margin of at least 1 cm (3/8 inch) from the edges, thereby leaving a sight (the usable surface) no greater than 17.6 cm by 24.4 cm (6 15/16 by 9 5/8 inches).
                    - listitem [ref=e271]: On 21 cm by 29.7 cm (DIN size A4) drawing sheets, each sheet must include a top margin of at least 2.5 cm (1 inch), a left-side margin of at least 2.5 cm (1 inch), a right-side margin of at least 1.5 cm (5/8 inch), and a bottom margin of at least 1 cm (3/8 inch) from the edges, thereby leaving a sight no greater than 17 cm by 26.2 cm.
                  - heading "Numbering of sheets of drawings and views" [level=2] [ref=e272]
                  - paragraph [ref=e273]: The sheets of drawings should be numbered in consecutive Arabic numerals, starting with 1, within the sight. These numbers, if present, must be placed in the middle of the top of the sheet but not in the margin. The numbers can be placed on the right-hand side if the drawing extends too close to the middle of the top edge of the usable surface. The drawing sheet numbering must be clear and larger than the numbers used as reference characters to avoid confusion. The number of each sheet should be shown by two Arabic numerals placed on either side of an oblique line, with the first being the sheet number and the second being the total number of sheets of drawings, with no other marking.
                  - paragraph [ref=e274]: The different views must be numbered in consecutive Arabic numerals, starting with 1, independent of the numbering of the sheets and, if possible, in the order in which they appear on the drawing sheet(s). Partial views intended to form one complete view, on one or several sheets, must be identified by the same number followed by a capital letter. View numbers must be preceded by the abbreviation "FIG." Where only a single view is used in an application to illustrate the claimed invention, it must not be numbered and the abbreviation "FIG." must not appear.
                  - paragraph [ref=e275]: Numbers and letters identifying the views must be simple and clear and must not be used in association with brackets, circles, or quotation marks. The view numbers must be larger than the numbers used for reference characters.
                  - heading "Reference characters" [level=2] [ref=e276]
                  - paragraph [ref=e277]: Reference characters not mentioned in the description shall not appear in the drawings. Reference characters mentioned in the description must appear in the drawings.
                  - paragraph [ref=e278]: Reference characters (numerals are preferred), sheet numbers, and view numbers must be plain and legible and must not be used in association with brackets or inverted commas, or enclosed within outlines (encircled). They must be oriented in the same direction as the view to avoid having to rotate the sheet. Reference characters should be arranged to follow the profile of the object depicted.
                  - paragraph [ref=e279]: Reference characters must have a print size of at least 0.32 cm (1/8 inch) in height. They should not be placed in the drawing in a way that interferes with its comprehension. Therefore, they should not cross or mingle with the lines. They should not be placed upon hatched or shaded surfaces. When necessary to indicate a surface or cross section, a reference character may be underlined and a blank space may be left in the hatching or shading where the character occurs so that it appears distinct.
                  - paragraph [ref=e280]: The same part of an invention appearing in more than one view of the drawing must always be designated by the same reference character, and the same reference character must never be used to designate different parts.
                  - heading "Lead lines and arrows" [level=2] [ref=e281]
                  - paragraph [ref=e282]: Lead lines are those lines between the reference characters and the details to which they refer. Such lines may be straight or curved and should be as short as possible. They must originate in the immediate proximity of the reference character and extend to the feature indicated. Lead lines must not cross each other. Lead lines are required for each reference character except for those that indicate the surface or cross section on which they are placed. Such a reference character must be underlined to make it clear that a lead line has not been left out by mistake. Lead lines must be executed in the same way as lines in the drawing.
                  - paragraph [ref=e283]: "Arrows may be used at the ends of lines as follows, provided that their meaning is clear:"
                  - list [ref=e284]:
                    - listitem [ref=e285]: on a lead line, a freestanding arrow is used to indicate the entire section toward which it points.
                    - listitem [ref=e286]: on a lead line, an arrow touching a line is used to indicate the surface shown by the line looking along the direction of the arrow.
                    - listitem [ref=e287]: to show the direction of movement
                  - paragraph [ref=e288]
                  - heading "Identification of drawings" [level=2] [ref=e289]
                  - paragraph [ref=e290]: Identifying indicia, if provided, should include the title of the invention, the inventor's name, the application number (if known), and docket number (if any). This information must be placed within the top margin of each sheet of drawings. The name and telephone number of a person to call if the USPTO is unable to match the drawings to the proper application may also be provided in the event the drawings are filed in paper, rather than via Patent Center.
                  - heading "Graphic forms in drawings" [level=2] [ref=e291]
                  - paragraph [ref=e292]: Chemical or mathematical formulas, tables, computer program listings, and waveforms may be submitted as drawings and are subject to the same requirements as drawings. Each chemical or mathematical formula must be labeled as a separate figure, using brackets, when necessary, to show that information is properly integrated. With regard to electrical signals, each group of waveforms must be presented as a single figure using a common vertical axis and time extending along the horizontal axis. Each individual waveform discussed in the specification must be identified with a separate letter designation adjacent to the vertical axis. These may be placed in a landscape orientation if they cannot be presented satisfactorily in a portrait orientation. Characters used in such formulas and tables must meet the requirements set forth in 37 CFR §1.58(c).
                  - heading "Views" [level=2] [ref=e293]
                  - paragraph [ref=e294]: The drawing must contain as many views as necessary to show the invention. The views may be plan, elevation, section, or perspective views. Detailed views of portions of elements, on a larger scale if necessary, may also be used. All views of the drawing must be grouped together and arranged on the sheet(s) without wasting space, preferably in an upright position, clearly separated from one another, and must not be included in the sheets containing the specifications, claims, or abstract. Views must not be connected by projection lines and must not contain center lines. Waveforms of electrical signals may be connected by dashed lines to show the relative timing of the waveforms.
                  - heading "Exploded views" [level=2] [ref=e295]
                  - paragraph [ref=e296]: Exploded views, with the separated parts embraced by a bracket, to show the relationship or order of assembly of various parts are permissible. When an exploded view is shown in a figure that is on the same sheet as another figure, the exploded view should be placed in brackets.
                  - heading "Partial views" [level=2] [ref=e297]
                  - paragraph [ref=e298]: When necessary, a view of a large machine or device in its entirety may be broken into partial views on a single sheet, or extended over several sheets if there is no loss in facility of understanding the view. Partial views drawn on separate sheets must always be capable of being linked edge to edge so that no partial view contains parts of another partial view. A smaller scale view should be included showing the whole formed by the partial views and indicating the positions of the parts shown. When a portion of a view is enlarged for magnification purposes, the view and the enlarged view must each be labeled as separate views.
                  - paragraph [ref=e299]: Where views on two or more sheets effectively form a single complete view, the views on the several sheets must be so arranged that the complete figure can be assembled without concealing any part of any of the views appearing on the various sheets.
                  - paragraph [ref=e300]: A very long view may be divided into several parts placed one above the other on a single sheet. However, the relationship between the different parts must be clear and unambiguous.
                  - heading "Sectional views" [level=2] [ref=e301]
                  - paragraph [ref=e302]: The plane on which a sectional view is taken should be indicated by a broken line on the view from which the section is cut. The ends of the broken line should be designated by Arabic or Roman numerals corresponding to the view number of the sectional view, and should have arrows to indicate the direction of sight. Hatching must be used to indicate section portions of an object, and must be made by regularly spaced oblique parallel lines spaced sufficiently apart to enable the lines to be distinguished without difficulty. Hatching should not impede the clear reading of the reference characters and lead lines. If it is not possible to place reference characters outside the hatched area, the hatching may be broken off wherever reference characters are inserted. Hatching must be at a substantial angle to the surrounding axes or principal lines, preferably 45 degrees.
                  - paragraph [ref=e303]: A cross section must be set out and drawn to show all of the materials as they are shown in the view from which the cross section was taken. The parts in cross section must show proper material(s) by hatching with regularly spaced parallel oblique strokes; the space between strokes being chosen on the basis of the total area to be hatched. The various parts of a cross section of the same item should be hatched in the same manner and should accurately and graphically indicate the nature of the material(s) illustrated in cross section.
                  - paragraph [ref=e304]: The hatching of juxtaposed different elements must be angled in a different way. In the case of large areas, hatching may be confined to an edging drawn around the entire inside of the outline of the area to be hatched. Different types of hatching should have different conventional meanings with regards to the nature of a material seen in cross section.
                  - heading "Alternate position" [level=2] [ref=e305]
                  - paragraph [ref=e306]: A moved position may be shown by a broken line superimposed upon a suitable view if this can be done without crowding; otherwise, a separate view must be used for this purpose.
                  - heading "Modified forms" [level=2] [ref=e307]
                  - paragraph [ref=e308]: Modified forms of construction must be shown in separate views.
                  - heading "Arrangement of views" [level=2] [ref=e309]
                  - paragraph [ref=e310]: One view must not be placed upon another or within the outline of another. All views on the same sheet should stand in the same direction and, if possible, stand so that they can be read with the sheet held in an upright position. If views wider than the width of the sheet are necessary for the clearest illustration of the invention, the sheet may be turned on its side so that the top of the sheet is on the right-hand side, with the appropriate top margin used as the heading space. Words must appear in a horizontal, left-to-right fashion when the page is either upright or turned so that the top becomes the right side, except for graphs utilizing standard scientific convention to denote the axis of abscissas (of X) and the axis of ordinates (of Y).
                  - heading "Front page view" [level=2] [ref=e311]
                  - paragraph [ref=e312]: One of the views should be suitable for inclusion on the front page of the patent application publication and patent as the illustration of the invention.
                  - heading "Scale" [level=2] [ref=e313]
                  - paragraph [ref=e314]: The scale to which a drawing is made must be large enough to show the mechanism without crowding when the drawing is reduced in size to two-thirds in reproduction. Indications such as "actual size" or "scale 1/2" are not permitted on the drawings since these lose their meaning with reproduction in a different format.
                  - heading "Character of lines, numbers, and letters" [level=2] [ref=e315]
                  - paragraph [ref=e316]: All drawings must be made by a process which will give them satisfactory reproduction characteristics. Every line, number, and letter must be durable, clean, black (except for color drawings), sufficiently dense and dark, and uniformly thick and well-defined. The weight of all lines and letters must be heavy enough to permit adequate reproduction. This requirement applies to all lines however fine, to shading, and to lines representing cut surfaces in sectional views. Lines and strokes of different thicknesses may be used in the same drawing where different thicknesses have a different meaning.
                  - heading "Shading" [level=2] [ref=e317]
                  - paragraph [ref=e318]: The use of shading in views is encouraged if it aids in understanding the invention and if it does not reduce legibility. Shading is used to indicate the surface or shape of spherical, cylindrical, and conical elements of an object. Flat parts may also be lightly shaded. Such shading is preferred in the case of parts shown in perspective, but not for cross sections. See discussion of sectional views above. Spaced lines for shading are preferred. These lines must be thin, as few in number as practicable, and they must contrast with the rest of the drawings. As a substitute for shading, heavy lines on the shade side of objects can be used except where they superimpose on each other or obscure reference characters. Light should come from the upper left corner at an angle of 45 degrees. Surface delineations should preferably be shown by proper shading. Solid black shading areas are not permitted, except when used to represent bar graphs or color.
                  - heading "Symbols" [level=2] [ref=e319]
                  - paragraph [ref=e320]: Graphical drawing symbols may be used for conventional elements when appropriate. The elements for which such symbols and labeled representations are used must be adequately identified in the specification. Known devices should be illustrated by symbols that have a universally recognized conventional meaning and are generally accepted in the art. Symbols that are not universally recognized may be used, subject to approval by the USPTO, if they are not likely to be confused with existing conventional symbols, and if they are readily identifiable.
                  - heading "Legends" [level=2] [ref=e321]
                  - paragraph [ref=e322]: Suitable descriptive legends may be used, or may be required by the examiner, where necessary for understanding of the drawing, subject to approval by the USPTO. They should contain as few words as possible.
                  - heading "Copyright or mask work notice" [level=2] [ref=e323]
                  - paragraph [ref=e324]: A copyright or mask work notice may appear in the drawing, but it must be placed within the sight of the drawing immediately below the figure representing the copyright or mask work material and be limited to letters having a print size of 0.32 cm to 0.64 cm (1/8 to 1/4 inches) high. The content of the notice must be limited to only those elements provided for by law. For example, "©1983 John Doe" (17 U.S.C. 401) and "*M* John Doe" (17 U.S.C. 909) would be properly limited and, under current statutes, legally sufficient notices of copyright and mask work, respectively. Inclusion of a copyright or mask work notice will be permitted only if the authorization language set forth in 37 CFR §1.71(e) is included at the beginning (preferably as the first paragraph) of the specification.
                  - heading "Security markings" [level=2] [ref=e325]
                  - paragraph [ref=e326]: Authorized security markings may be placed on the drawings provided they are outside the sight, preferably centered in the top margin.
                  - heading "Black and white drawings are normally required" [level=2] [ref=e327]
                  - paragraph [ref=e328]: "On rare occasions, color drawings may be necessary as the only practical medium by which the subject matter sought to be patented in a utility patent application is disclosed. The USPTO will accept color drawings in utility patent applications and statutory invention registrations only after granting a petition explaining why the color drawings are necessary. Any such petition must include:"
                  - list [ref=e329]:
                    - listitem [ref=e330]: the appropriate fee set forth in 37 CFR §1.17(h)
                    - listitem [ref=e331]: three sets of color drawings
                    - listitem [ref=e332]:
                      - text: the following language as the first paragraph in that portion of the specification relating to the
                      - strong [ref=e333]: Brief Description of the Several Views of the Drawing
                      - text: . If the language is not in the specification, an amendment to insert the language must accompany the petition.
                  - paragraph [ref=e334]: "\"The patent or application file contains at least one drawing executed in color. Copies of this patent or patent application publication with color drawing(s) will be provided by the Office upon request and payment of the necessary fee.\""
                  - paragraph [ref=e335]: Photographs are not ordinarily permitted in utility patent applications. The USPTO will accept black and white photographs in utility patent applications in applications in which the invention is not capable of being illustrated in an ink drawing or where the invention is shown more clearly in a photograph. For example, photographs or photomicrographs of electrophoresis gels, blots (e.g., immunological, western, southern, and northern), autoradiographs, cell cultures (stained and unstained), histological tissue cross sections (stained and unstained), animals, plants, in vivo imaging, thin layer chromatography plates, crystalline structures, and ornamental effects continue to be acceptable. Only one set of black and white photographs is required. Furthermore, no petition or additional processing fee is required.
                  - paragraph [ref=e336]: Photographs have the same format requirements as drawings. The photographs must be of sufficient quality so that all details in the drawing are reproducible in the printed patent or any patent application publication.
                  - paragraph [ref=e337]: Color photographs will be accepted in utility patent applications if the conditions for accepting color drawings have been satisfied.
                  - heading "Patent and Trademark Resource Center Program" [level=2] [ref=e338]
                  - paragraph [ref=e339]:
                    - text: The Patent and Trademark Resource Center (PTRC) Program is a network of PTRC-designated libraries found in 46 states (as of 2014), the District of Columbia, and Puerto Rico. When a library is designated as a PTRC by the USPTO, it receives house copies of U.S. patents and patent and trademark materials and actively disseminates patent and trademark information to the public. The PTRC network provides access to many of the same products and services offered at the USPTO public search facilities in Alexandria, Virginia. The scope of PTRC collections, hours of operation, services, and fees (where applicable) vary depending on PTRC location. Users are advised to call ahead to determine products and services available at a particular PTRC. PTRCs also offer automated access to patent and trademark information. Review the
                    - link "complete list of PTRCs" [ref=e340] [cursor=pointer]:
                      - /url: /learning-and-resources/support-centers/patent-and-trademark-resource-centers-ptrcs
                    - text: .
