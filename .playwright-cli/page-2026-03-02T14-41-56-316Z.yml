                  - heading "June 2023" [level=3] [ref=e109]
                - generic [ref=e110]:
                  - link "Expand all" [ref=e111] [cursor=pointer]:
                    - /url: "#"
                  - text: "|"
                  - link "Collapse all" [ref=e112] [cursor=pointer]:
