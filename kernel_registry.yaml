schema: scbe-kernel-registry-v2.2.0

# =============================================================================
# NAMESPACE SEPARATION
# Kernel Axioms (A0-A4): mathematical invariants — never change
# Pipeline Layers (L01-L14): operational stages — versioned
# =============================================================================

namespaces:
  kernel_axioms:
    prefix: "A"
    range: [0, 4]
    description: "Physical/mathematical invariants. Immutable."

  pipeline_layers:
    prefix: "L"
    range: [1, 14]
    description: "Operational pipeline stages. Versioned per profile."

# =============================================================================
# FIVE QUANTUM AXIOMS (A0-A4)
# =============================================================================

axioms:
  A0_COMPOSITION:
    property: "Pipeline integrity — entry/exit contracts honored"
    layers: [1, 14]
    test: "composition_check decorator"

  A1_UNITARITY:
    property: "Metric-consistent transforms (preserves the intended norm/metric, not Euclidean norm)"
    layers: [2, 4, 7]
    clarification: >
      L2 Realification is isometric under the canonical C^D -> R^2D embedding.
      L4 Poincare Embedding is norm-bounding (tanh map), not Euclidean-preserving.
      L7 Mobius addition is an isometry under the HYPERBOLIC metric, not Euclidean.
    test: "unitarity_check decorator"

  A2_LOCALITY:
    property: "Spatially-bounded operations — no action at a distance"
    layers: [3, 8]
    test: "locality_check decorator"

  A3_CAUSALITY:
    property: "Time-ordering — no retroactive state mutation, tau_dot > 0"
    layers: [6, 11, 13]
    test: "causality_check decorator"

  A4_SYMMETRY:
    property: "Gauge invariance — metrics unchanged under valid transforms"
    layers: [5, 9, 10, 12]
    test: "symmetry_check decorator"

# =============================================================================
# THE INVARIANT (Layer 5)
# =============================================================================

invariant:
  name: "Poincare Ball Metric"
  formula: "d_H(u,v) = arcosh(1 + 2||u-v||^2 / ((1-||u||^2)(1-||v||^2)))"
  axiom: A4_SYMMETRY
  property: "Distance to boundary -> infinity. NEVER changes."
  canonical_impl: "packages/kernel/src/hyperbolic.ts:hyperbolicDistance()"
  python_ref: "packages/kernel/src/pipeline14.ts:layer5HyperbolicDistance()"

# =============================================================================
# HARMONIC SCALING PROFILES (the two H formulas)
# =============================================================================

harmonic_profiles:
  L12_SCORE:
    formula: "H(d, pd) = 1 / (1 + d + 2*pd)"
    range: "(0, 1]"
    role: "Safety score for 14-layer pipeline runtime (L12 -> L13)"
    decision_logic: "L13 divides: Risk' = Risk_base / H_score"
    canonical_impl: "packages/kernel/src/harmonicScaling.ts:harmonicScale()"
    pipeline_impl: "packages/kernel/src/pipeline14.ts:layer12HarmonicScaling()"

  L12_WALL:
    formula: "H(d, R) = R^(d^2)"
    R: 1.5  # Perfect Fifth
    range: "[1.0, +inf)"
    role: "Super-exponential security amplification / hard governance wall"
    amplification_table:
      d1: 1.5
      d2: 5.06
      d3: 38.44
      d4: 656.84
      d5: 25251
      d6: 2184164
    extended_formula: "H_eff(d, R, x) = R^(d^2 * x)"
    temporal_intent_factor: "x(t) = f(d_tri(t), chaosdev(t), fractaldev(t), energydev(t))"
    canonical_impl: "symphonic_cipher/harmonic_scaling_law.py"

  selection_rule: >
    Every call site MUST declare which profile it uses.
    Pipeline runtime uses L12_SCORE.
    Extended governance / cost amplification uses L12_WALL.
    No implicit fallback between profiles.

# =============================================================================
# AETHERMOORE CONSTANTS
# =============================================================================

constants:
  PHI: 1.6180339887  # Golden Ratio
  Phi_aether: 1.3782407725
  Lambda_isaac: 3.9270509831
  Omega_spiral: 1.4832588477
  Alpha_abh: 3.1180339887
  R_harmonic: 1.5  # Perfect Fifth (for L12_WALL)

# =============================================================================
# 9D STATE VECTOR
# =============================================================================

state_vector:
  name: "xi"
  dimensions: 9
  layout:
    "xi[0..5]":
      name: "c(t)"
      description: "6D Context Vector"
      components: [identity, intent_phase, trajectory_score, linear_time, commitment_hash, signature_validity]
    "xi[6]":
      name: "tau(t)"
      description: "Time flow rate (7th dimension)"
      constraint: "tau_dot > 0 (causality)"
    "xi[7]":
      name: "eta(t)"
      description: "Entropy (8th dimension, Ornstein-Uhlenbeck)"
      bounds: [2.0, 6.0]
      target: 4.0
      decay_rate: 0.1
    "xi[8]":
      name: "q(t)"
      description: "Quantum coherence proxy (9th dimension)"
      status: "DETERMINISTIC_PROXY"
      note: >
        q(t) is currently a deterministic coherence proxy: U(t)=e^(-iHt).
        Fidelity >= 0.9 and von Neumann entropy <= 0.2 are enforced
        against this proxy model, not a true quantum density matrix.
        When a full quantum state model is defined, promote to q_quantum.

# =============================================================================
# BYZANTINE CONSENSUS
# =============================================================================

consensus:
  protocol: "SwarmRaft-BFT"
  n: 6
  f: 1  # max Byzantine faults tolerated (f < n/3)
  soft_quorum: 3  # 2f+1, for non-final votes (suggest, observe, status)
  hard_quorum: 4  # 3f+1, for world-changing commits (spawn, config, actuation, durable writes)
  vote_decisions: [ALLOW, DENY, ABSTAIN, ESCALATE]
  signature: "HMAC-SHA256 per vote"
  quorum_rules:
    read_only: "soft_quorum (3/6)"
    suggest_observe: "soft_quorum (3/6)"
    spawn_agent: "hard_quorum (4/6)"
    config_change: "hard_quorum (4/6)"
    destructive_action: "hard_quorum (4/6)"
    durable_write: "hard_quorum (4/6)"
    emergency_shutdown: "hard_quorum (4/6)"

