# =============================================================================
# SS1 ROUTING TABLE (CANONICAL)
# =============================================================================

ss1:
  version: "SS1"
  format: "SS1|kid=...|aad=...|salt=...|nonce=...|ct=...|tag=..."
  sections: [aad, salt, nonce, ct, tag]

  routing:
    aad:   AV   # Avali — context
    salt:  RU   # Runethic — binding
    nonce: KO   # Kor'aelin — flow
    ct:    CA   # Cassisivadan — bitcraft
    tag:   DR   # Draumric — record

  overrides: >
    The canonical routing above is the SS1 standard.
    Overrides are permitted ONLY with explicit annotation in the aad field:
    aad="routing=custom;salt=KO;nonce=RU;..."

# =============================================================================
# TRUST RINGS (Poincare Ball)
# =============================================================================

trust_rings:
  model: "Poincare Ball ||u|| < 1"
  rings:
    CORE:
      radius: "r < 0.3"
      latency: "5ms"
      access: "Full, minimal verification"
    INNER:
      radius: "0.3 <= r < 0.7"
      latency: "30ms"
      access: "Standard verification"
    OUTER:
      radius: "0.7 <= r < 0.9"
      latency: "200ms"
      access: "Enhanced verification"
    WALL:
      radius: "r >= 0.9"
      latency: "DENY"
      access: "Rejected — boundary penalty infinite"

# =============================================================================
# GOVERNANCE DECISION CASCADE
# =============================================================================

governance:
  function: "G(xi, i, poly) -> {ALLOW, QUARANTINE, DENY}"
  cascade_order:
    1: "Topology: Euler chi = V - E + F must equal 2"
    2: "Entropy: eta in [2.0, 6.0]"
    3: "Causality: tau_dot > 0"
    4: "Quantum: fidelity >= 0.9, von Neumann entropy <= 0.2"
    5: "Harmonic gate: coherence >= 0.9 AND d_tri <= 1.5 AND h_cost <= 10.0 -> ALLOW"
    6: "Default: DENY"

  modality_masks:
    STRICT: [1, 3, 5]
    ADAPTIVE: [1, 2, 3, 4, 5]
    PROBE: [1]

# =============================================================================
# PQC (Post-Quantum Cryptography)
# =============================================================================

pqc:
  kem: "ML-KEM-768 (NIST FIPS 203)"
  dsa: "ML-DSA-65 (NIST FIPS 204)"
  symmetric: "AES-256-GCM"
  kdf: "HKDF-SHA256"
  nonce_bytes: 12
  key_bytes: 32
  legacy_names:
    kem: "Kyber768"
    dsa: "Dilithium3"
  migration_pattern: "_select_dsa_algorithm() / _select_kem_algorithm()"

# =============================================================================
# CANONICALIZATION RULES
# =============================================================================

canonicalization:
  transcript_label: "SCBE-v2.2-transcript"
  endianness: "big"
  nonce_len_bytes: 12
  key_len_bytes: 32
  intent_hash: "sha3_256(utf8(intent_ascii))"
  conformance_anchor: "Horadam transcript vectors"

# =============================================================================
# CI ENFORCEMENT
# =============================================================================

ci:
  registry_check: >
    CI MUST validate that:
    1. All H formula call sites declare their profile (L12_SCORE or L12_WALL)
    2. SS1 routing matches this file's routing table
    3. Consensus thresholds match soft_quorum/hard_quorum
    4. Sacred Tongue weights match PHI^k sequence
    5. Trust ring boundaries match the radii above
    6. 9D state vector layout matches xi[0..8] specification
  health_scan: "tests/health/daily_scan.py"
  schedule: "daily at 03:00 UTC"
