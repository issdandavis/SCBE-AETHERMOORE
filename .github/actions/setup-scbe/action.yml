name: 'Setup SCBE Environment'
description: >
  Shared base dependency seed for all SCBE-AETHERMOORE workflows.
  Sets up Node.js, Python, and installs project dependencies in one step.
  Any workflow can call this instead of repeating 6+ setup steps.

inputs:
  node-version:
    description: 'Node.js version to install (set "skip" to skip Node setup)'
    required: false
    default: '20'
  python-version:
    description: 'Python version to install (set "skip" to skip Python setup)'
    required: false
    default: '3.11'
  install-node-deps:
    description: 'Run npm ci to install Node dependencies'
    required: false
    default: 'true'
  install-python-deps:
    description: 'Install Python dependencies from requirements.txt'
    required: false
    default: 'true'
  python-extra-packages:
    description: 'Additional pip packages to install (space-separated)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      if: inputs.node-version != 'skip'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install Node dependencies
      if: inputs.node-version != 'skip' && inputs.install-node-deps == 'true'
      shell: bash
      run: npm ci
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

    - name: Setup Python ${{ inputs.python-version }}
      if: inputs.python-version != 'skip'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Install Python dependencies
      if: inputs.python-version != 'skip' && inputs.install-python-deps == 'true'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          pip install numpy scipy
        fi

    - name: Install extra Python packages
      if: inputs.python-version != 'skip' && inputs.python-extra-packages != ''
      shell: bash
      run: pip install ${{ inputs.python-extra-packages }}

    - name: Set PYTHONPATH
      if: inputs.python-version != 'skip'
      shell: bash
      run: echo "PYTHONPATH=${{ github.workspace }}" >> "$GITHUB_ENV"

    - name: Verify environment
      shell: bash
      run: |
        echo "=== SCBE Environment Seed ==="
        if command -v node &>/dev/null; then
          echo "Node.js: $(node --version)"
          echo "npm: $(npm --version)"
        fi
        if command -v python &>/dev/null; then
          echo "Python: $(python --version)"
          echo "PYTHONPATH: ${PYTHONPATH:-<not set>}"
        fi
        echo "=== Ready ==="
