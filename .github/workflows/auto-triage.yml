name: Auto Triage & Label Management

on:
  issues:
    types: [opened, edited, reopened]
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  auto-label:
    name: Auto Label Issues and PRs
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Label based on size
        uses: codelytv/pr-size-labeler@v1.10.1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: '10'
          s_label: 'size/S'
          s_max_size: '100'
          m_label: 'size/M'
          m_max_size: '500'
          l_label: 'size/L'
          l_max_size: '1000'
          xl_label: 'size/XL'
          fail_if_xl: 'false'

  auto-assign:
    name: Auto Assign
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: pozil/auto-assign-issue@v4
        with:
          assignees: issdandavis
          numOfAssignee: 1
          abortIfPreviousAssignees: true

  # NOTE: Stale management is handled by the dedicated stale.yml workflow.
  # Removed duplicate stale-management job to prevent conflicting policies.

  conflict-detection:
    name: Detect PR Conflicts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    steps:
      - uses: eps1lon/actions-label-merge-conflict@v3
        with:
          dirtyLabel: 'needs-rebase'
          repoToken: ${{ secrets.GITHUB_TOKEN }}

  auto-approve-dependabot:
    name: Auto Approve Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request_target'
    permissions:
      pull-requests: write
    steps:
      - uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
