name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "22 9 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-interpreted:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-extended,security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  analyze-android-java:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kindle-app/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Kindle dependencies
        working-directory: kindle-app
        run: npm ci

      - name: Copy PWA assets
        working-directory: kindle-app
        run: node scripts/copy-pwa-assets.js

      - name: Sync Capacitor Android project
        working-directory: kindle-app
        run: npx cap sync android

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-extended,security-and-quality

      - name: Build Android app for CodeQL extraction
        working-directory: kindle-app/android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
