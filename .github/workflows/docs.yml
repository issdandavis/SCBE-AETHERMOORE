name: Documentation

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate TypeDoc
        run: |
          npx typedoc --out docs-build/api src/index.ts \
            --name "SCBE-AETHERMOORE API" \
            --readme README.md \
            --theme default \
            --skipErrorChecking

      - name: Ensure docs-build directory exists
        run: mkdir -p docs-build/api docs-build/demo

      - name: Copy static docs surfaces
        run: |
          if [ -d "docs/research" ]; then
            mkdir -p docs-build/research
            cp -R docs/research/. docs-build/research/
          fi
          if [ -d "docs/demos" ]; then
            mkdir -p docs-build/demos
            cp -R docs/demos/. docs-build/demos/
          fi
          if [ -d "docs/product-manual" ]; then
            mkdir -p docs-build/product-manual
            cp -R docs/product-manual/. docs-build/product-manual/
          fi
          if [ -d "docs/static" ]; then
            mkdir -p docs-build/static
            cp -R docs/static/. docs-build/static/
          fi
          for page in arena.html redteam.html support.html google7193f08d2589e861.html; do
            if [ -f "docs/${page}" ]; then
              cp "docs/${page}" "docs-build/${page}"
            fi
          done

      - name: Copy demo files
        run: |
          if [ -f "demo/index.html" ]; then
            cp demo/index.html docs-build/demo/index.html
          fi
          if [ -f "demo/mars-communication.html" ]; then
            cp demo/mars-communication.html docs-build/demo/mars-communication.html
          fi
          if [ -f "demo/roundtable-demo.ts" ]; then
            cp demo/roundtable-demo.ts docs-build/demo/
          fi

      - name: Create index page
        run: |
          cat > docs-build/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>SCBE Demo + Docs Hub</title>
            <script src="https://cdn.tailwindcss.com"></script>
            <style>
              .gradient-bg { background: linear-gradient(135deg, #071412 0%, #0b1c1a 42%, #102431 100%); }
            </style>
          </head>
          <body class="gradient-bg min-h-screen text-white">
            <div class="container mx-auto px-4 py-16">
              <div class="max-w-6xl mx-auto">
                <div class="mb-10 text-center">
                  <div class="text-sm uppercase tracking-[0.35em] text-emerald-300 mb-4">SCBE-AETHERMOORE</div>
                  <h1 class="text-5xl md:text-6xl font-bold mb-5">Demo + Docs Hub</h1>
                  <p class="text-lg md:text-xl text-slate-200 max-w-3xl mx-auto">
                    Public proof before pitch. Run the demos, inspect the API, hit the red-team benchmark,
                    and only then decide whether you want the toolkit or a deeper engagement.
                  </p>
                </div>
                <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
                  <a href="demos/" class="block p-8 bg-white/10 rounded-2xl hover:bg-white/20 transition border border-white/10">
                    <div class="text-3xl mb-4">Demo Lab</div>
                    <p class="text-gray-300">14 public demos across governance, spectral layers, risk gates, and swarm behavior.</p>
                  </a>
                  <a href="redteam.html" class="block p-8 bg-white/10 rounded-2xl hover:bg-white/20 transition border border-white/10">
                    <div class="text-3xl mb-4">Red Team Sandbox</div>
                    <p class="text-gray-300">91 adversarial attacks, 10 categories, and a public head-to-head proof surface.</p>
                  </a>
                  <a href="api/" class="block p-8 bg-white/10 rounded-2xl hover:bg-white/20 transition border border-white/10">
                    <div class="text-3xl mb-4">API Reference</div>
                    <p class="text-gray-300">Typed API docs for the public TypeScript surface and operator entrypoints.</p>
                  </a>
                  <a href="demo/mars-communication.html" class="block p-8 bg-white/10 rounded-2xl hover:bg-white/20 transition border border-white/10">
                    <div class="text-3xl mb-4">Mars Communication</div>
                    <p class="text-gray-300">A visual encryption demo with a concrete story people can understand and share.</p>
                  </a>
                  <a href="support.html" class="block p-8 bg-white/10 rounded-2xl hover:bg-white/20 transition border border-white/10">
                    <div class="text-3xl mb-4">Support + Manuals</div>
                    <p class="text-gray-300">Buyer recovery path, manuals, and the shortest route back to a working surface.</p>
                  </a>
                  <a href="https://aethermoorgames.com/" class="block p-8 bg-emerald-300 text-slate-950 rounded-2xl hover:bg-emerald-200 transition border border-emerald-200/40">
                    <div class="text-3xl mb-4 font-bold">Toolkit Offer</div>
                    <p class="text-slate-800">The direct $29 entry point. One offer, one price, one manual, one support route.</p>
                  </a>
                </div>
                <div class="mt-12 flex flex-wrap gap-4 justify-center">
                  <a href="https://github.com/issdandavis/SCBE-AETHERMOORE"
                    class="inline-block px-8 py-4 bg-blue-600 hover:bg-blue-700 rounded-lg transition font-bold">
                    View on GitHub
                  </a>
                  <a href="https://huggingface.co/datasets/issdandavis/scbe-red-team-benchmarks"
                    class="inline-block px-8 py-4 bg-white/10 hover:bg-white/20 rounded-lg transition font-bold">
                    Benchmarks on Hugging Face
                  </a>
                </div>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-build

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
