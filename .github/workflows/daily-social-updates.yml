name: Daily Social Updates

on:
  schedule:
    - cron: '20 15 * * *'
  workflow_dispatch:
    inputs:
      live_publish:
        description: 'Publish live (otherwise dry-run)'
        type: boolean
        default: false

permissions:
  contents: read
  discussions: write

jobs:
  social-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate daily update content
        id: generate
        run: |
          python scripts/publish/generate_daily_system_update.py --json > /tmp/daily_update.json
          cat /tmp/daily_update.json
          readarray -t OUTS < <(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/daily_update.json').read_text())
          print(data.get('github_glob', ''))
          print(data.get('files', {}).get('x_thread', ''))
          print(data.get('files', {}).get('linkedin', ''))
          PY
          )
          echo "github_glob=${OUTS[0]}" >> "$GITHUB_OUTPUT"
          echo "x_article=${OUTS[1]}" >> "$GITHUB_OUTPUT"
          echo "linkedin_article=${OUTS[2]}" >> "$GITHUB_OUTPUT"

      - name: Publish dry-run evidence
        run: |
          python scripts/publish/post_all.py \
            --dry-run \
            --only x,github,linkedin \
            --github-glob "${{ steps.generate.outputs.github_glob }}" \
            --x-article "${{ steps.generate.outputs.x_article }}" \
            --linkedin-article "${{ steps.generate.outputs.linkedin_article }}" \
            --github-limit 1

      - name: Resolve live mode and credential readiness
        id: preflight
        env:
          SCBE_SOCIAL_LIVE: ${{ secrets.SCBE_SOCIAL_LIVE }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          LIVE_ENABLED=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.live_publish }}" = "true" ]; then
            LIVE_ENABLED=true
          fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${SCBE_SOCIAL_LIVE}" = "true" ]; then
            LIVE_ENABLED=true
          fi

          X_READY=false
          BUFFER_READY=false
          OAUTH2_READY=false
          OAUTH1_READY=false
          if [ -n "${BUFFER_ACCESS_TOKEN}" ]; then
            BUFFER_READY=true
          fi
          if [ -n "${X_CLIENT_ID}" ] && [ -n "${X_CLIENT_SECRET}" ] && [ -n "${X_ACCESS_TOKEN}" ] && [ -n "${X_REFRESH_TOKEN}" ]; then
            OAUTH2_READY=true
          fi
          if [ -n "${X_API_KEY}" ] && [ -n "${X_API_SECRET}" ] && [ -n "${X_ACCESS_TOKEN}" ] && [ -n "${X_ACCESS_TOKEN_SECRET}" ]; then
            OAUTH1_READY=true
          fi
          if [ "${OAUTH2_READY}" = "true" ] || [ "${OAUTH1_READY}" = "true" ]; then
            X_READY=true
          fi

          echo "live_enabled=${LIVE_ENABLED}" >> "$GITHUB_OUTPUT"
          echo "x_ready=${X_READY}" >> "$GITHUB_OUTPUT"
          echo "buffer_ready=${BUFFER_READY}" >> "$GITHUB_OUTPUT"
          echo "oauth2_ready=${OAUTH2_READY}" >> "$GITHUB_OUTPUT"
          echo "oauth1_ready=${OAUTH1_READY}" >> "$GITHUB_OUTPUT"
          echo "live_enabled=${LIVE_ENABLED}"
          echo "x_ready=${X_READY}"
          echo "buffer_ready=${BUFFER_READY}"
          echo "oauth2_ready=${OAUTH2_READY}"
          echo "oauth1_ready=${OAUTH1_READY}"

      - name: Publish live GitHub Discussion
        if: ${{ steps.preflight.outputs.live_enabled == 'true' }}
        run: |
          python scripts/publish/post_all.py \
            --only github \
            --github-glob "${{ steps.generate.outputs.github_glob }}" \
            --github-limit 1

      - name: Publish live Buffer (preferred for X distribution)
        if: ${{ steps.preflight.outputs.live_enabled == 'true' && steps.preflight.outputs.buffer_ready == 'true' }}
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
        run: |
          python scripts/publish/post_all.py \
            --only buffer \
            --x-article "${{ steps.generate.outputs.x_article }}" \
            --github-limit 1

      - name: Publish live X
        if: ${{ steps.preflight.outputs.live_enabled == 'true' && steps.preflight.outputs.buffer_ready != 'true' && steps.preflight.outputs.x_ready == 'true' }}
        env:
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python scripts/publish/post_all.py \
            --only x \
            --x-article "${{ steps.generate.outputs.x_article }}" \
            --github-limit 1

      - name: Live social skipped notice
        if: ${{ steps.preflight.outputs.live_enabled == 'true' && steps.preflight.outputs.buffer_ready != 'true' && steps.preflight.outputs.x_ready != 'true' }}
        run: |
          echo "Live social publish skipped: neither Buffer nor X credentials are fully configured."

      - name: Upload social evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-social-evidence
          path: artifacts/publish_browser/
          if-no-files-found: ignore
