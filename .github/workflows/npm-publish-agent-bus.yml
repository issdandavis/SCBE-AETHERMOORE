name: publish-agent-bus

on:
  push:
    tags:
      - 'agent-bus/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.3.11). Must match package.json.'
        required: true
      package_dir:
        description: 'Package directory to publish.'
        required: false
        default: 'packages/agent-bus'
      package_name:
        description: 'Package name to publish.'
        required: false
        default: 'scbe-agent-bus'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.package_dir || 'packages/agent-bus' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build if available
        run: npm run build --if-present

      - name: Verify package identity and version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/agent-bus/v}"
          else
            TAG="${DISPATCH_VERSION}"
          fi
          EXPECTED_NAME="${{ inputs.package_name || 'scbe-agent-bus' }}"
          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version format: $TAG"
            exit 1
          fi
          if [ "$PKG_NAME" != "$EXPECTED_NAME" ]; then
            echo "::error::package.json name ($PKG_NAME) does not match expected ($EXPECTED_NAME)"
            exit 1
          fi
          if [ "$PKG_VER" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VER) does not match expected ($TAG)"
            exit 1
          fi
          echo "Publishing $PKG_NAME@$PKG_VER"

      - name: Disable local prepare hook for CI publish
        run: npm pkg delete scripts.prepare

      - name: Publish
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "$PKG_NAME@$PKG_VER" version 2>/dev/null | grep -qx "$PKG_VER"; then
            echo "::notice::$PKG_NAME@$PKG_VER already published - skipping."
            exit 0
          fi
          npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
