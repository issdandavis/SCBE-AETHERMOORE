name: Deploy SCBE to GKE

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'src/**'
      - 'k8s/deployment.yaml'
      - 'k8s/service.yaml'
      - 'k8s/namespace.yaml'
      - 'Dockerfile.api'
      - '.github/workflows/deploy-gke.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (default: commit SHA)'
        required: false
        default: ''

env:
  PROJECT_ID: gen-lang-client-0103521392
  GKE_CLUSTER: scbe-aethermoore-cluster
  GKE_ZONE: us-central1
  IMAGE: gcr.io/gen-lang-client-0103521392/scbe-aethermoore
  NAMESPACE: scbe-aethermoore

jobs:
  build-and-deploy:
    name: Build and Deploy to GKE
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for GCR
      run: gcloud auth configure-docker gcr.io --quiet

    - name: Determine image tag
      id: tag
      env:
        INPUT_TAG: ${{ github.event.inputs.image_tag }}
      run: |
        if [ -n "$INPUT_TAG" ]; then
          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
        else
          echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
        fi

    - name: Build Docker image
      run: |
        docker build \
          -f Dockerfile.api \
          -t "$IMAGE:${{ steps.tag.outputs.tag }}" \
          -t "$IMAGE:latest" \
          .

    - name: Push Docker image
      run: |
        docker push "$IMAGE:${{ steps.tag.outputs.tag }}"
        docker push "$IMAGE:latest"

    - name: Get GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}
        project_id: ${{ env.PROJECT_ID }}

    - name: Create namespace
      run: kubectl apply -f k8s/namespace.yaml

    - name: Ensure secrets exist
      run: |
        kubectl get secret scbe-secrets -n $NAMESPACE 2>/dev/null || \
        kubectl create secret generic scbe-secrets \
          -n $NAMESPACE \
          --from-literal=api-key="${{ secrets.SCBE_API_KEY }}" \
          --from-literal=hf-token="${{ secrets.HF_TOKEN }}"

    - name: Deploy core API
      run: |
        kubectl apply -f k8s/deployment.yaml -f k8s/service.yaml
        kubectl set image deployment/scbe-aethermoore \
          scbe-api="$IMAGE:${{ steps.tag.outputs.tag }}" \
          -n $NAMESPACE

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/scbe-aethermoore \
          -n $NAMESPACE --timeout=300s

    - name: Verify health
      run: |
        echo "Waiting for external IP..."
        for i in $(seq 1 30); do
          EXTERNAL_IP=$(kubectl get svc scbe-aethermoore-service \
            -n $NAMESPACE \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
          if [ -n "$EXTERNAL_IP" ]; then
            echo "External IP: $EXTERNAL_IP"
            if curl -sf "http://$EXTERNAL_IP/v1/health"; then
              echo " - Health OK"
            else
              echo "::warning::Health check failed — service may still be starting"
            fi
            break
          fi
          echo "  Waiting for LoadBalancer IP... ($i/30)"
          sleep 10
        done

    - name: Print deployment info
      if: always()
      run: |
        echo "=== Deployment Status ==="
        kubectl get deployments -n $NAMESPACE
        echo ""
        echo "=== Pods ==="
        kubectl get pods -n $NAMESPACE
        echo ""
        echo "=== Services ==="
        kubectl get svc -n $NAMESPACE
