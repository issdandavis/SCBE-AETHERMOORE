name: No-New-Fakes Gate

# Fails the build if stub/fake/placeholder code appears in the real product path
# outside scripts/ci/no_fakes_baseline.txt. New fakes cannot land; existing ones
# are ratcheted to zero by deleting baseline lines as they are made real.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  no-fakes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: No-new-fakes gate
        run: python scripts/ci/no_fakes_gate.py
