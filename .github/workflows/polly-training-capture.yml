name: Polly Training Capture

on:
  repository_dispatch:
    types: [polly_training_turn]

permissions:
  contents: read
  issues: write

concurrency:
  group: polly-training-capture
  cancel-in-progress: false

jobs:
  push-to-private-hf-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Push consented turn to private HF dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PAYLOAD: ${{ toJSON(github.event.client_payload.record) }}
          HF_REPO: ${{ vars.POLLY_HF_DATASET || 'issdandavis/polly-chat-live' }}
        run: |
          set -euo pipefail
          if [[ -z "${HF_TOKEN:-}" ]]; then
            echo "HF_TOKEN not configured; skipping push" >&2
            exit 0
          fi
          python3 -m pip install --quiet 'huggingface_hub>=0.27,<1.0'
          # PII guard: never echo PAYLOAD to logs. Pipe via env var into Python,
          # which validates, writes a per-turn JSON file, and uploads it to the
          # PRIVATE Hugging Face dataset. Only the dataset path + remote URL
          # ever land in the workflow log.
          python3 - <<'PY'
          import datetime as dt
          import io
          import json
          import os
          import secrets
          from huggingface_hub import HfApi

          payload = os.environ["PAYLOAD"]
          record = json.loads(payload)
          repo_id = os.environ["HF_REPO"]
          token = os.environ["HF_TOKEN"]

          api = HfApi(token=token)
          # Ensure the dataset exists and is private. exist_ok=True is idempotent.
          api.create_repo(
              repo_id=repo_id,
              repo_type="dataset",
              private=True,
              exist_ok=True,
          )

          ts = dt.datetime.utcfromtimestamp(int(record.get("ts") or 0)) if record.get("ts") else dt.datetime.utcnow()
          day = ts.strftime("%Y-%m-%d")
          stamp = ts.strftime("%Y%m%dT%H%M%S")
          nonce = secrets.token_hex(3)
          # Route by kind so leads land separately from chat turns. Defaults
          # to chat-live for any record without an explicit kind.
          kind = str(record.get("kind") or "chat").lower()
          prefix = "polly-leads" if kind == "lead" else "polly-chat-live"
          path_in_repo = f"{prefix}/{day}/{stamp}-{nonce}.json"
          payload_bytes = json.dumps(record, ensure_ascii=False, separators=(",", ":")).encode("utf-8")
          buffer = io.BytesIO(payload_bytes)

          api.upload_file(
              path_or_fileobj=buffer,
              path_in_repo=path_in_repo,
              repo_id=repo_id,
              repo_type="dataset",
              commit_message=f"chore(polly): consented turn {stamp}",
          )
          print(f"uploaded to private dataset: {repo_id}/{path_in_repo}")
          PY

      - name: File a private GitHub issue when the record is a lead
        if: ${{ github.event.client_payload.record.kind == 'lead' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TYPE: ${{ github.event.client_payload.record.project_type }}
          BUDGET: ${{ github.event.client_payload.record.budget }}
          TIMELINE: ${{ github.event.client_payload.record.timeline }}
          SOURCE: ${{ github.event.client_payload.record.source }}
        run: |
          set -euo pipefail
          # PII stays in the private HF dataset; the issue body deliberately
          # excludes contact + description so notifications are safe to view
          # in the GitHub mobile app or email previews.
          title="lead: ${PROJECT_TYPE} (${BUDGET}, ${TIMELINE})"
          body=$(cat <<EOF
          A new lead landed via $SOURCE.

          - project type: $PROJECT_TYPE
          - budget: $BUDGET
          - timeline: $TIMELINE

          Contact + description are in the private HF dataset:
          https://huggingface.co/datasets/issdandavis/polly-chat-live

          Look in polly-leads/$(date -u +%Y-%m-%d)/ for today's submissions.
          EOF
          )
          # Best-effort label creation; ignore if it already exists.
          gh label create lead --description "Polly /hire form lead" --color "FFD166" --repo "${{ github.repository }}" 2>/dev/null || true
          gh issue create \
            --title "$title" \
            --body "$body" \
            --label "lead" \
            --repo "${{ github.repository }}"

      - name: Email the lead via SMTP (Proton / Gmail / Mailgun / any)
        if: ${{ github.event.client_payload.record.kind == 'lead' }}
        env:
          SMTP_HOST: ${{ secrets.POLLY_LEAD_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.POLLY_LEAD_SMTP_PORT }}
          SMTP_USER: ${{ secrets.POLLY_LEAD_SMTP_USER }}
          SMTP_PASS: ${{ secrets.POLLY_LEAD_SMTP_PASS }}
          SMTP_FROM: ${{ secrets.POLLY_LEAD_SMTP_FROM }}
          SMTP_TO: ${{ secrets.POLLY_LEAD_SMTP_TO }}
          PAYLOAD: ${{ toJSON(github.event.client_payload.record) }}
        run: |
          set -euo pipefail
          # Bail quietly when SMTP isn't configured — the workflow stays green
          # so the only signal channel is the GitHub issue + HF dataset row.
          if [[ -z "${SMTP_HOST:-}" || -z "${SMTP_USER:-}" || -z "${SMTP_PASS:-}" ]]; then
            echo "SMTP credentials missing (POLLY_LEAD_SMTP_HOST/USER/PASS); skipping email send" >&2
            exit 0
          fi
          # Pipe PAYLOAD via env into Python so it never echoes; build the
          # full lead email server-side then submit via SMTP. starttls is
          # the default for port 587 (Proton, Gmail, most providers); for
          # implicit TLS on 465 the script auto-switches.
          python3 - <<'PY'
          import os, ssl, json, smtplib
          from email.message import EmailMessage

          record = json.loads(os.environ["PAYLOAD"])
          host = os.environ["SMTP_HOST"]
          port = int(os.environ.get("SMTP_PORT") or "587")
          user = os.environ["SMTP_USER"]
          password = os.environ["SMTP_PASS"]
          sender = os.environ.get("SMTP_FROM") or user
          recipient = os.environ.get("SMTP_TO") or user

          subject = f"[polly lead] {record.get('project_type','?')} - {record.get('budget','?')} - {record.get('timeline','?')}"
          body_lines = [
              "A new lead landed via the /hire form.",
              "",
              f"contact:      {record.get('contact','')}",
              f"project type: {record.get('project_type','')}",
              f"budget:       {record.get('budget','')}",
              f"timeline:     {record.get('timeline','')}",
              f"source:       {record.get('source','')}",
              "",
              "description:",
              record.get("description",""),
              "",
              "(also stored in the private HF dataset issdandavis/polly-chat-live under polly-leads/)",
          ]
          msg = EmailMessage()
          msg["Subject"] = subject
          msg["From"] = sender
          msg["To"] = recipient
          msg["Reply-To"] = record.get("contact","") or sender
          msg.set_content("\n".join(body_lines))

          context = ssl.create_default_context()
          if port == 465:
              with smtplib.SMTP_SSL(host, port, context=context, timeout=20) as s:
                  s.login(user, password)
                  s.send_message(msg)
          else:
              with smtplib.SMTP(host, port, timeout=20) as s:
                  s.starttls(context=context)
                  s.login(user, password)
                  s.send_message(msg)
          print(f"emailed lead to {recipient}")
          PY
