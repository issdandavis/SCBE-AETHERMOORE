name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read

jobs:
  claude-review:
    name: claude-review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Local deterministic review gate
        shell: bash
        run: |
          # Note: intentionally NOT using `set -e`. Each check below is allowed
          # to fail and record its findings; we aggregate every problem and exit
          # once at the end. With `set -e`, the first failing check (typically
          # `git diff --check`) killed the step before the summary, file list,
          # or conflict-marker scan could run — so reviewers only saw a bare
          # "exit code 2" with no guidance.
          set -uo pipefail

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          git cat-file -e "${base}^{commit}" || git fetch --no-tags --prune origin "${{ github.event.pull_request.base.ref }}"
          git cat-file -e "${head}^{commit}" || git fetch --no-tags --prune origin "pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr-${{ github.event.pull_request.number }}"

          # Compare against the merge-base, not the raw base SHA. base.sha
          # advances with the base branch (e.g. on `synchronize`); if main moves
          # ahead of the branch's actual fork point, `git diff base head` lights
          # up with files the PR never touched — including whitespace flagged
          # by `--check`. The merge-base restricts the gate to what the PR
          # genuinely contributed.
          range_base="$(git merge-base "$base" "$head")"

          git diff --name-only "$range_base" "$head" > changed-files.txt
          file_count="$(wc -l < changed-files.txt | tr -d ' ')"

          {
            echo "## Local deterministic review gate"
            echo
            echo "- External AI invoked: no"
            echo "- Repository comment written: no"
            echo "- Base: \`${base}\`"
            echo "- Head: \`${head}\`"
            echo "- Merge-base: \`${range_base}\`"
            echo "- Changed files: ${file_count}"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          failures=0

          # --- Whitespace errors (trailing whitespace, space-before-tab, etc.)
          # `git diff --check` exits non-zero when the diff introduces whitespace
          # errors. Capture its report so we can surface the exact file:line in
          # the job summary instead of burying it in raw logs.
          whitespace_report="$(git diff --check "$range_base" "$head")"
          if [ -n "$whitespace_report" ]; then
            failures=1
            {
              echo "### ❌ Whitespace errors"
              echo
              echo "The PR introduces whitespace errors (e.g. trailing whitespace)."
              echo "Fix locally, then commit:"
              echo
              echo '```bash'
              echo "git diff --check ${range_base} ${head}   # list offending lines"
              echo "# strip trailing whitespace from the files git names, e.g.:"
              echo "#   sed -i 's/[[:space:]]*\$//' path/to/file"
              echo '```'
              echo
              echo '```'
              echo "$whitespace_report"
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # --- Unresolved merge-conflict markers
          conflict_status=0
          conflict_report="$(git grep -nE '^(<<<<<<<|>>>>>>>)' -- \
            ':!node_modules/**' \
            ':!artifacts/**' \
            ':!training-data/**' \
            ':!**/target/**')" || conflict_status=$?
          if [ "$conflict_status" -ne 0 ] && [ "$conflict_status" -ne 1 ]; then
            echo "git grep failed with status $conflict_status" >&2
            exit "$conflict_status"
          fi
          if [ -n "$conflict_report" ]; then
            failures=1
            {
              echo "### ❌ Merge-conflict markers"
              echo
              echo "Unresolved conflict markers were found in tracked files:"
              echo
              echo '```'
              echo "$conflict_report"
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$failures" -ne 0 ]; then
            echo "Deterministic review gate failed; see the job summary for details." >&2
            exit 1
          fi

          echo "### ✅ Gate passed" >> "$GITHUB_STEP_SUMMARY"
