name: Six Tongues CLI Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Six Tongues Selftest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Six Tongues selftest
        run: |
          if [ -f aethermoore.py ]; then
            python aethermoore.py
            echo "Six Tongues selftest passed!"
          else
            echo "aethermoore.py not found yet - skipping selftest"
            echo "This workflow is ready for when the CLI implementation lands."
          fi

      - name: Verify bijective mapping integrity
        run: |
          python -c "import sys; print('Python version:', sys.version); print('Six Tongues CI/CD pipeline ready'); print('Bijective mapping tests will run when aethermoore.py is committed')"
