name: npm-publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v4.0.3). Defaults to latest semver tag.'
        required: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  npmjs:
    name: Publish to npmjs.org
    if: ${{ inputs.tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Verify package version matches tag
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG="${{ inputs.tag }}"
          TAG_VER="${TAG#v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::package.json version ($PKG_VER) does not match tag ($TAG_VER)"
            exit 1
          fi

      - name: Disable local prepare hook for CI publish
        run: npm pkg delete scripts.prepare

      - name: Verify package contents
        run: npm run publish:check:strict

      - name: Publish to npmjs
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-packages:
    name: Publish to GitHub Packages
    if: ${{ inputs.tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node (GH Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@issdandavis'

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Rewrite package name to scoped form for GH Packages
        # GitHub Packages requires a scope matching the owner. We don't change the
        # name on disk in main — only in this transient build artifact.
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.name = '@issdandavis/scbe-aethermoore';
            p.publishConfig = { registry: 'https://npm.pkg.github.com' };
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
          "

      - name: Disable local prepare hook for CI publish
        run: npm pkg delete scripts.prepare

      - name: Publish to GitHub Packages
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
