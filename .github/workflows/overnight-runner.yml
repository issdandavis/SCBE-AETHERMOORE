name: Overnight Task Runner
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run overnight'
        required: true
        default: 'test-suite'
        type: choice
        options:
          - test-suite
          - attack-suite
          - book-review
          - training-prep
          - full-pytest

permissions:
  contents: read

jobs:
  overnight:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt || pip install pytest hypothesis huggingface_hub

      - name: Run overnight task
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TASK: ${{ inputs.task }}
        run: |
          mkdir -p artifacts
          case "$TASK" in
            test-suite)
              echo "Running full test suite..."
              python -m pytest tests/ -v --tb=short -x 2>&1 | tee artifacts/overnight_test_results.txt
              ;;
            attack-suite)
              echo "Running adversarial attack suite..."
              python -m pytest tests/adversarial/ -v --tb=short 2>&1 | tee artifacts/overnight_attack_results.txt
              ;;
            book-review)
              echo "Running book review panel..."
              python scripts/publish/roundtable_review.py --full 2>&1 | tee artifacts/overnight_book_review.txt
              ;;
            training-prep)
              echo "Running training data pipeline..."
              python -m pytest tests/ -m "not slow" -v --tb=short 2>&1 | tee artifacts/overnight_training_results.txt
              ;;
            full-pytest)
              echo "Running ALL pytest tests..."
              python -m pytest tests/ -v --tb=long 2>&1 | tee artifacts/overnight_full_pytest.txt
              ;;
          esac

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: overnight-results-${{ github.run_number }}
          path: artifacts/
          retention-days: 30
