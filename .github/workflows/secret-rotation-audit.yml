name: Secret Rotation & Audit

on:
  workflow_dispatch:
    inputs:
      rotate_hf:
        description: 'Rotate HuggingFace token'
        type: boolean
        default: true
      rotate_github:
        description: 'Rotate GitHub PAT'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (audit only, no rotation)'
        type: boolean
        default: true
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 3 AM UTC

permissions:
  contents: read
  security-events: write

jobs:
  audit-secrets:
    name: Scan repo for exposed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run SCBE secret scanner
        run: python scripts/check_secrets.py --all

      - name: Git history scan for high-entropy strings
        run: |
          echo "=== Scanning git history for known leaked patterns ==="
          for pattern in "hf_" "sk-ant-api" "sk-proj-" "ghp_" "rk_live_" "sk_[0-9a-f]" "github_pat_"; do
            echo "--- Pattern: $pattern ---"
            count=$(git log --all --oneline -S "$pattern" 2>/dev/null | wc -l)
            echo "  Commits with pattern: $count"
            if [ "$count" -gt 0 ]; then
              git log --all --oneline -S "$pattern" 2>/dev/null | head -5
            fi
          done

      - name: Check .gitignore coverage
        run: |
          echo "=== Verifying .env files are gitignored ==="
          find . -name ".env*" -not -name ".env.example" -not -name ".env.sample" | while read f; do
            if git check-ignore -q "$f" 2>/dev/null; then
              echo "  OK (ignored): $f"
            else
              echo "  DANGER (tracked): $f"
            fi
          done

  validate-tokens:
    name: Validate active tokens
    runs-on: ubuntu-latest
    needs: audit-secrets
    steps:
      - name: Check HuggingFace token validity
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_TOKEN not set in repository secrets"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/api/whoami)
          if [ "$STATUS" = "200" ]; then
            echo "HF_TOKEN: VALID"
          else
            echo "::error::HF_TOKEN: INVALID or EXPIRED (HTTP $STATUS)"
            exit 1
          fi

      - name: Check GitHub PAT validity
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::warning::GH_PAT not set in repository secrets"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_PAT" \
            https://api.github.com/user)
          if [ "$STATUS" = "200" ]; then
            echo "GH_PAT: VALID"
          else
            echo "::error::GH_PAT: INVALID or EXPIRED (HTTP $STATUS)"
            exit 1
          fi

      - name: Check Notion token validity
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          if [ -z "$NOTION_API_KEY" ]; then
            echo "::warning::NOTION_API_KEY not set"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: 2022-06-28" \
            https://api.notion.com/v1/users/me)
          if [ "$STATUS" = "200" ]; then
            echo "NOTION_API_KEY: VALID"
          else
            echo "::error::NOTION_API_KEY: INVALID or EXPIRED (HTTP $STATUS)"
            exit 1
          fi

  rotate-hf-token:
    name: Rotate HuggingFace token
    runs-on: ubuntu-latest
    needs: validate-tokens
    if: ${{ github.event.inputs.rotate_hf == 'true' && github.event.inputs.dry_run != 'true' }}
    steps:
      - name: Rotate HF token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "=== HuggingFace Token Rotation ==="
          echo "To rotate your HF token:"
          echo "  1. Go to https://huggingface.co/settings/tokens"
          echo "  2. Delete the compromised token"
          echo "  3. Create a new token with the same permissions"
          echo "  4. Update the GH secret: gh secret set HF_TOKEN --body <new-token>"
          echo ""
          echo "NOTE: Automated rotation requires HF API v2 which is not yet GA."
          echo "Manual rotation is required for now."
          echo "::warning::HF token rotation requires manual action — see logs above"

  report:
    name: Generate security report
    runs-on: ubuntu-latest
    needs: [audit-secrets, validate-tokens]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret scanner | ${{ needs.audit-secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Token validation | ${{ needs.validate-tokens.result }} |" >> $GITHUB_STEP_SUMMARY
