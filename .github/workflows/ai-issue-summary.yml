name: AI Issue Summary

on:
  issues:
    types:
      - opened

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Summarize and comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title;
            const body = context.payload.issue.body || '(no body)';

            // Keyword-based component detection
            const components = [];
            const text = `${title} ${body}`.toLowerCase();
            if (text.match(/crypto|pqc|kem|dsa|quantum/)) components.push('crypto');
            if (text.match(/game|spiralverse|lore|story/)) components.push('game');
            if (text.match(/ci|workflow|action|deploy|docker/)) components.push('CI/CD');
            if (text.match(/api|endpoint|gateway|rest/)) components.push('API');
            if (text.match(/doc|readme|spec|architecture/)) components.push('docs');
            if (text.match(/harmonic|pipeline|layer|scaling/)) components.push('harmonic');
            if (text.match(/tongue|langues|token/)) components.push('tongues');
            if (text.match(/test|vitest|pytest|coverage/)) components.push('testing');
            if (components.length === 0) components.push('general');

            // Severity detection
            let severity = 'question';
            if (text.match(/bug|error|fail|crash|broken|fix/)) severity = 'bug';
            else if (text.match(/feat|add|enhance|improve|request/)) severity = 'enhancement';

            const component = components.join(', ');

            const comment = [
              `**Auto-Triage Summary**`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Component** | ${component} |`,
              `| **Type** | ${severity} |`,
              ``,
              `---`,
              `*Generated automatically by the AI Issue Summary workflow*`
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
