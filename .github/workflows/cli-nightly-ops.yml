name: 'cli-nightly-ops'
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 'Smoke'
        id: step_01_smoke
        shell: bash
        run: |
          python scbe.py selftest
      - name: 'Doctor'
        id: step_02_doctor
        shell: bash
        run: |
          python scbe.py doctor --json
