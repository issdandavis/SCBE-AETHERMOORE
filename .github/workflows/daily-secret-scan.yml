name: Daily Secret Scan

on:
  schedule:
    - cron: '30 5 * * *'  # Daily at 5:30 AM UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan for secrets
        id: scan
        run: |
          # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
          set +e
          python scripts/check_secrets.py --all > secrets-output.txt 2>&1
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Secrets detected in repository!"
            cat secrets-output.txt
          else
            echo "Clean — no secrets found."
          fi

      - name: Create alert issue if secrets found
        if: steps.scan.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().slice(0, 10);
            const title = `SECRET LEAK DETECTED - ${today}`;
            let output = '';
            try { output = fs.readFileSync('secrets-output.txt', 'utf8'); } catch {}

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `## Secrets detected in repo\n\n\`\`\`\n${output.slice(0, 3000)}\n\`\`\`\n\n---\n*Automated by daily-secret-scan*`,
              labels: ['security-scan', 'critical', 'automated'],
            });
