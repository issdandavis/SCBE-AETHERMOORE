name: pypi-publish-agent-bus

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to publish (e.g. agent-bus-py-v0.2.0, v0.2.0, or 0.2.0).'
        required: true
      package_dir:
        description: 'Python package directory to publish.'
        required: false
        default: 'packages/agent-bus-py'
      package_name:
        description: 'PyPI project name to publish.'
        required: false
        default: 'scbe-agent-bus'

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build sdist+wheel and publish Python package to PyPI
    runs-on: ubuntu-latest
    environment: release-agent-bus
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Verify pyproject identity and version
        working-directory: ${{ inputs.package_dir || 'packages/agent-bus-py' }}
        run: |
          PKG_VER=$(python -c "import tomllib; p=tomllib.load(open('pyproject.toml','rb'))['project']; print(p['version'])")
          PKG_NAME=$(python -c "import tomllib; p=tomllib.load(open('pyproject.toml','rb'))['project']; print(p['name'])")
          TAG="${{ inputs.tag }}"
          TAG_VER="${TAG#agent-bus-py-v}"
          TAG_VER="${TAG_VER#v}"
          EXPECTED_NAME="${{ inputs.package_name || 'scbe-agent-bus' }}"
          if [ "$PKG_NAME" != "$EXPECTED_NAME" ]; then
            echo "::error::pyproject.toml name ($PKG_NAME) does not match expected ($EXPECTED_NAME)"
            exit 1
          fi
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::pyproject.toml version ($PKG_VER) does not match expected ($TAG_VER)"
            exit 1
          fi
          echo "Publishing $PKG_NAME@$PKG_VER"

      - name: Build distributions
        working-directory: ${{ inputs.package_dir || 'packages/agent-bus-py' }}
        run: python -m build

      - name: Publish to PyPI with repository API token
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.package_dir || 'packages/agent-bus-py' }}/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
