name: Publish Content

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - bluesky
          - github-discussion
          - all
      content:
        description: 'Content to post'
        required: true
        type: choice
        options:
          - book-promo
          - chapter-1
          - chapter-2
          - chapter-3
          - governance
          - design-partner
          - custom
      custom_text:
        description: 'Custom text (only if content=custom)'
        required: false

permissions:
  contents: read
  discussions: write

env:
  AMAZON_LINK: "https://www.amazon.com/dp/B0GSSFQD9G"
  GITHUB_DISCUSSIONS: "https://github.com/issdandavis/SCBE-AETHERMOORE/discussions"

jobs:
  post-to-bluesky:
    if: inputs.platform == 'bluesky' || inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          python scripts/publish/post_to_bluesky.py \
            --handle "$BLUESKY_HANDLE" \
            --password "$BLUESKY_APP_PASSWORD" \
            --promo "${{ inputs.content == 'custom' && 'book' || inputs.content }}" \
            ${{ inputs.content == 'custom' && format('--text "{0}"', inputs.custom_text) || '' }}

  post-to-github:
    if: inputs.platform == 'github-discussion' || inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Post to GitHub Discussions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTENT_TYPE: ${{ inputs.content }}
          CUSTOM_TEXT: ${{ inputs.custom_text }}
        run: |
          case "$CONTENT_TYPE" in
            book-promo)
              TITLE="The Six Tongues Protocol — Now Available"
              BODY="$(cat content/book/reader-edition/ch01.md | head -50)

          ...

          **[Read the full novel on Amazon — Kindle \$4.99 / Paperback \$13.99](https://www.amazon.com/dp/B0GSSFQD9G)**"
              ;;
            chapter-*)
              NUM=$(echo "$CONTENT_TYPE" | sed 's/chapter-//')
              CH=$(printf "ch%02d" "$NUM")
              TITLE="The Six Tongues Protocol — $(head -3 content/book/reader-edition/${CH}.md | grep '^#' | sed 's/^# //')"
              BODY="$(cat content/book/reader-edition/${CH}.md)

          ---
          **[Get the full novel on Amazon](https://www.amazon.com/dp/B0GSSFQD9G)**"
              ;;
            governance)
              TITLE="AI Governance with Provable Safety Guarantees"
              BODY="Open source AI governance framework. 91/91 attacks blocked, 0 false positives, NIST AI RMF 100% compliant.

          https://aethermoorgames.com#government"
              ;;
            design-partner)
              TITLE="Design Partner Program — Free AI Governance Evaluation"
              BODY="Free evaluation access for government and enterprise. No payment during testing.

          https://aethermoorgames.com#government"
              ;;
            custom)
              TITLE="SCBE-AETHERMOORE Update"
              BODY="$CUSTOM_TEXT"
              ;;
          esac

          gh api graphql -f query="mutation {
            createDiscussion(input: {
              repositoryId: \"R_kgDOQ7csuQ\",
              categoryId: \"DIC_kwDOQ7csuc4C2BLp\",
              title: \"$TITLE\",
              body: $(echo "$BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
            }) {
              discussion { url }
            }
          }" --jq '.data.createDiscussion.discussion.url'
