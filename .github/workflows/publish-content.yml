name: Publish Content

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to post to'
        required: true
        type: choice
        options:
          - x-twitter
          - all
      content:
        description: 'What to post (chapter-1, chapter-2, chapter-3, book-promo, custom)'
        required: true
        default: 'book-promo'
      custom_text:
        description: 'Custom text (only if content=custom)'
        required: false

permissions:
  contents: read

jobs:
  post-to-x:
    if: inputs.platform == 'x-twitter' || inputs.platform == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Post to X/Twitter
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import json, time, hmac, hashlib, base64, os, secrets as stdlib_secrets
          from urllib.request import Request, urlopen
          from urllib.parse import quote

          consumer_key = os.environ['X_API_KEY']
          consumer_secret = os.environ['X_API_SECRET']
          access_token = os.environ['X_ACCESS_TOKEN']
          access_secret = os.environ['X_ACCESS_TOKEN_SECRET']
          content_type = "${{ inputs.content }}"
          custom = "${{ inputs.custom_text }}"

          TWEETS = {
              "book-promo": """The Six Tongues Protocol — a fantasy novel born from 12,596 AI game log paragraphs.

          Read Chapter 1 free: https://github.com/issdandavis/SCBE-AETHERMOORE/discussions/704

          Full novel on Amazon:
          https://www.amazon.com/dp/B0GSSFQD9G
          Kindle $4.99 / Paperback $13.99

          #fantasy #ai #novel #amwriting""",

              "chapter-1": """Chapter 1: Protocol Handshake

          "The smell of stale coffee sat on Marcus Chen's tongue like a warning he refused to read."

          Read free: https://github.com/issdandavis/SCBE-AETHERMOORE/discussions/704

          Full novel: https://www.amazon.com/dp/B0GSSFQD9G

          #TheSixTonguesProtocol #fantasy""",

              "chapter-2": """Chapter 2: The Language Barrier

          "The corridor tasted like static electricity and old libraries."

          Read free: https://github.com/issdandavis/SCBE-AETHERMOORE/discussions/705

          Full novel: https://www.amazon.com/dp/B0GSSFQD9G

          #TheSixTonguesProtocol #fantasy""",

              "chapter-3": """Chapter 3: Hyperbolic Consequences

          "The first drink in Aethermoor arrived in a stone mug the size of a flowerpot."

          Read free: https://github.com/issdandavis/SCBE-AETHERMOORE/discussions/706

          Full novel: https://www.amazon.com/dp/B0GSSFQD9G

          #TheSixTonguesProtocol #fantasy""",
          }

          tweet_text = custom if content_type == "custom" and custom else TWEETS.get(content_type, TWEETS["book-promo"])

          def oauth1_sign(method, url, consumer_key, consumer_secret, token, token_secret):
              oauth_params = {
                  'oauth_consumer_key': consumer_key,
                  'oauth_nonce': stdlib_secrets.token_hex(16),
                  'oauth_signature_method': 'HMAC-SHA1',
                  'oauth_timestamp': str(int(time.time())),
                  'oauth_token': token,
                  'oauth_version': '1.0',
              }
              sorted_params = '&'.join(f'{quote(k, safe="")}={quote(str(v), safe="")}' for k, v in sorted(oauth_params.items()))
              base_string = f'{method}&{quote(url, safe="")}&{quote(sorted_params, safe="")}'
              signing_key = f'{quote(consumer_secret, safe="")}&{quote(token_secret, safe="")}'
              sig = base64.b64encode(hmac.new(signing_key.encode(), base_string.encode(), hashlib.sha1).digest()).decode()
              oauth_params['oauth_signature'] = sig
              return 'OAuth ' + ', '.join(f'{k}="{quote(v, safe="")}"' for k, v in sorted(oauth_params.items()))

          url = 'https://api.twitter.com/2/tweets'
          auth = oauth1_sign('POST', url, consumer_key, consumer_secret, access_token, access_secret)
          data = json.dumps({'text': tweet_text}).encode()

          req = Request(url, data=data, headers={
              'Authorization': auth,
              'Content-Type': 'application/json',
          })

          try:
              resp = json.loads(urlopen(req, timeout=15).read())
              tweet_id = resp.get('data', {}).get('id', '?')
              print(f"POSTED: https://x.com/davisissac/status/{tweet_id}")
          except Exception as e:
              error_body = getattr(e, 'read', lambda: b'')().decode() if hasattr(e, 'read') else str(e)
              print(f"Error: {e}")
              print(f"Body: {error_body[:500]}")
              raise
          PYEOF
