name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: '⏰ This issue has been automatically marked as stale because it has had no activity for 60 days. It will be closed in 14 days unless there is new activity. Please comment if this issue is still relevant.'
          stale-pr-message: '⏰ This pull request has been automatically marked as stale due to 60 days of inactivity. It will be closed in 14 days unless there is new activity. Please rebase and update if still active.'
          close-issue-message: '🔒 This issue was closed automatically after being stale for 14 days with no activity. Feel free to reopen if this is still relevant.'
          close-pr-message: '🔒 This PR was closed automatically after being stale for 14 days with no activity. Please reopen with a rebase if you wish to continue.'
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,bug,enhancement,priority:high'
          exempt-pr-labels: 'pinned,security,do-not-close'
