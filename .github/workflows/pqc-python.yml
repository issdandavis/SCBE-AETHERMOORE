name: PQC Python (liboqs)

on:
  schedule:
    # Nightly PQC lane (UTC). Keep off PR to avoid long builds + flaky native deps.
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pqc-tests:
    name: PQC tests on Ubuntu with liboqs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config git

      - name: Build and install liboqs
        run: |
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git
          cmake -S liboqs -B liboqs/build -GNinja -DBUILD_SHARED_LIBS=ON -DOQS_BUILD_ONLY_LIB=ON -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build liboqs/build
          sudo cmake --install liboqs/build
          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/liboqs.conf
          sudo ldconfig
          ldconfig -p | grep oqs || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov hypothesis

      - name: Validate oqs import
        run: |
          python -c "
          import oqs
          print('oqs version:', getattr(oqs, '__version__', 'unknown'))
          print('liboqs version:', oqs.oqs_version())
          print('kem count:', len(oqs.get_enabled_kem_mechanisms()))
          print('sig count:', len(oqs.get_enabled_sig_mechanisms()))
          "

      - name: Run PQC marker lane
        env:
          # This workflow installs liboqs, so don't force-skip it.
          SCBE_FORCE_SKIP_LIBOQS: "0"
        run: |
          # NOTE: run_core_python_checks.py accepts extra pytest args as positionals.
          # Use `--` so argparse doesn't treat `-m` as an unknown option.
          PYTHONPATH=. python scripts/system/run_core_python_checks.py --maxfail 1 -- -m "pqc or requires_liboqs"

