name: SCBE Overnight Pipeline
on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Starting tier (later tiers include all earlier ones)'
        required: true
        default: 'full'
        type: choice
        options:
          - tier-1-validate
          - tier-2-test
          - tier-3-security
          - tier-4-build
          - full
  schedule:
    # Run full pipeline every night at 2 AM Pacific
    - cron: '0 10 * * *'

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════
  # TIER 1-GATES: Reusable gate checks (parallel with validate)
  # Absorbed from: scbe-gates.yml
  # ═══════════════════════════════════════════════════════════
  tier-1-gates:
    uses: ./.github/workflows/scbe-reusable-gates.yml
    with:
      node-version: '20'
      python-version: '3.11'

  # ═══════════════════════════════════════════════════════════
  # TIER 1: Validate (5 min) — Lint, type check, basic sanity
  # Absorbed from: nightly-ops.yml, cli-nightly-ops.yml, daily_ops.yml
  # ═══════════════════════════════════════════════════════════
  tier-1-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SCBE_MODE: 'ci'
      PYTHONPATH: '.'
    outputs:
      status: ${{ steps.validate.outcome }}
      vm_status: ${{ steps.vm-health.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest hypothesis numpy
          fi

      - name: Install Node deps
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: npm ci

      - name: SCBE selftest
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: python scbe.py selftest

      - name: SCBE doctor
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: python scbe.py doctor --json

      - name: VM bridge health check
        id: vm-health
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s --connect-timeout 10 "http://34.134.99.90:8001/health" 2>&1)
          if echo "$RESPONSE" | grep -q '"healthy"'; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "VM is healthy"
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "::warning::VM health check failed: $RESPONSE"
          fi

      - name: Validate
        id: validate
        run: |
          FAILURES=0

          echo "=== Python syntax check ==="
          if ! python -m py_compile src/symphonic_cipher/scbe_aethermoore/cpse.py; then
            echo "::warning::Python syntax check failed"
            FAILURES=$((FAILURES + 1))
          fi

          echo "=== TypeScript type check ==="
          if ! npx tsc --noEmit; then
            echo "::warning::TypeScript type check failed"
            FAILURES=$((FAILURES + 1))
          fi

          echo "=== Quick smoke tests ==="
          if ! python -m pytest tests/ -m "homebrew or unit" -x -q --tb=line 2>&1; then
            echo "::warning::Smoke tests failed"
            FAILURES=$((FAILURES + 1))
          fi

          echo "=== Tier 1 complete (failures: $FAILURES) ==="
          echo "failure_count=$FAILURES" >> $GITHUB_OUTPUT
          if [ "$FAILURES" -gt 0 ]; then
            echo "::warning::Tier 1 completed with $FAILURES failure(s)"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier-1-results
          path: artifacts/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # TIER 2: Test (30 min) — Full pytest, property tests
  # Absorbed from: daily_ops.yml training-data-push count step
  # ═══════════════════════════════════════════════════════════
  tier-2-test:
    needs: [tier-1-validate, tier-1-gates]
    if: ${{ always() && (inputs.tier == 'tier-2-test' || inputs.tier == 'tier-3-security' || inputs.tier == 'tier-4-build' || inputs.tier == 'full' || github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: '.'
    outputs:
      test-passed: ${{ steps.test.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest hypothesis numpy scipy
          fi

      - name: Download Tier 1 results
        uses: actions/download-artifact@v4
        with:
          name: tier-1-results
          path: artifacts/tier-1/
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true

      - name: Full test suite
        id: test
        run: |
          mkdir -p artifacts
          PASSED=true

          echo "=== Full pytest ==="
          if ! python -m pytest tests/ -v --tb=short -x 2>&1 | tee artifacts/tier2_test_results.txt; then
            echo "::warning::Full test suite had failures"
            PASSED=false
          fi

          echo "=== Property tests ==="
          if ! python -m pytest tests/ -m "property" -v --tb=short 2>&1 | tee -a artifacts/tier2_test_results.txt; then
            echo "::warning::Property tests had failures"
            PASSED=false
          fi

          echo "passed=$PASSED" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier-2-results
          path: artifacts/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # TIER 3: Security + Analysis — Adversarial attacks, arXiv sweep,
  #          governance scan
  # Absorbed from: daily_ops.yml (arxiv-research, governance-scan)
  # ═══════════════════════════════════════════════════════════
  tier-3-security:
    needs: tier-2-test
    if: ${{ always() && (inputs.tier == 'tier-3-security' || inputs.tier == 'tier-4-build' || inputs.tier == 'full' || github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: '.'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest hypothesis numpy scipy huggingface_hub
          fi

      - name: Download previous tier results
        uses: actions/download-artifact@v4
        with:
          name: tier-2-results
          path: artifacts/tier-2/
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true

      - name: Adversarial attack suite
        run: |
          set -euo pipefail
          mkdir -p artifacts
          SECURITY_FAILURES=0

          echo "=== SCBE Adversarial Tests ==="
          if ! python -m pytest tests/adversarial/ -v --tb=short --ignore=tests/node_modules 2>&1 | tee artifacts/tier3_security_results.txt; then
            echo "::error::Adversarial tests FAILED"
            SECURITY_FAILURES=$((SECURITY_FAILURES + 1))
          fi

          echo "=== HYDRA spine + ledger ==="
          if [ -d tests/hydra ]; then
            if ! python -m pytest tests/hydra/ -v --tb=short --ignore=tests/node_modules 2>&1 | tee -a artifacts/tier3_security_results.txt; then
              echo "::error::HYDRA tests FAILED"
              SECURITY_FAILURES=$((SECURITY_FAILURES + 1))
            fi
          else
            echo "::notice::Skipping HYDRA tests (tests/hydra directory not present)" | tee -a artifacts/tier3_security_results.txt
          fi

          echo "=== Tamper detection ==="
          if [ -f tests/test_tamper_detection.py ]; then
            if ! python -m pytest tests/test_tamper_detection.py -v --tb=short 2>&1 | tee -a artifacts/tier3_security_results.txt; then
              echo "::error::Tamper detection tests FAILED"
              SECURITY_FAILURES=$((SECURITY_FAILURES + 1))
            fi
          else
            echo "::notice::Skipping tamper detection tests (tests/test_tamper_detection.py not present)" | tee -a artifacts/tier3_security_results.txt
          fi

          echo "=== Manifold validation ==="
          MANIFOLD_TESTS=(
            tests/test_manifold_mirror.py
            tests/test_gate_swap_trimanifold.py
            tests/test_harmonic_dark_fill.py
            tests/test_harmonic_cipher.py
            tests/test_harmonic_scaling_integration.py
            tests/test_code_lattice.py
            tests/test_dual_lattice_contract.py
            tests/test_negative_tongue_lattice.py
            tests/test_quasicrystal_lattice.py
            tests/test_triangulated_lattice.py
            tests/test_tri_manifold_lattice.py
            tests/harmonic/test_pipeline14_governance.py
          )
          EXISTING_MANIFOLD_TESTS=()
          for test_file in "${MANIFOLD_TESTS[@]}"; do
            if [ -f "$test_file" ]; then
              EXISTING_MANIFOLD_TESTS+=("$test_file")
            fi
          done

          if [ "${#EXISTING_MANIFOLD_TESTS[@]}" -eq 0 ]; then
            echo "::notice::Skipping manifold validation (no curated manifold test files present)" | tee -a artifacts/tier3_security_results.txt
          elif ! python -m pytest "${EXISTING_MANIFOLD_TESTS[@]}" -v --tb=short --ignore=tests/node_modules 2>&1 | tee -a artifacts/tier3_security_results.txt; then
            echo "::error::Manifold validation tests FAILED"
            SECURITY_FAILURES=$((SECURITY_FAILURES + 1))
          fi

          if [ "$SECURITY_FAILURES" -gt 0 ]; then
            echo "::error::Tier 3 Security: $SECURITY_FAILURES suite(s) failed — security gate violated"
            exit 1
          fi

      - name: arXiv research sweep
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import sys, json
          sys.path.insert(0, '.')
          try:
              from src.aaoe.research_hub import ResearchHub
              hub = ResearchHub()
              result = hub.daily_research_sweep()
              print(json.dumps(result, indent=2))
          except Exception as e:
              print(f'Research sweep skipped: {e}')
          " 2>&1 | tee -a artifacts/tier3_security_results.txt

      - name: Governance scan (VM bridge)
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: |
          RESULT=$(curl -s --connect-timeout 10 \
            -X POST "http://34.134.99.90:8001/v1/governance/scan" \
            -H "Content-Type: application/json" \
            -d '{"content":"overnight governance check","context":"github_actions_overnight"}' \
            2>&1)
          echo "Governance scan: $RESULT" | tee -a artifacts/tier3_security_results.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier-3-results
          path: artifacts/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # TIER 4: Build & Publish (30 min) — Packages, models, datasets
  # ═══════════════════════════════════════════════════════════
  tier-4-build:
    needs: tier-3-security
    if: ${{ always() && (inputs.tier == 'tier-4-build' || inputs.tier == 'full' || github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: '.'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "::warning::requirements.txt not found"
          fi

      - name: Install Node deps
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: npm ci

      - name: Download all previous results
        uses: actions/download-artifact@v4
        with:
          path: artifacts/previous/
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true

      - name: Build TypeScript
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: |
          if ! npm run build; then
            echo "::warning::npm run build failed, trying npx tsc"
            npx tsc
          fi

      - name: Build book EPUB
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: |
          pip install pypandoc_binary
          mkdir -p artifacts
          python scripts/publish/rebuild_and_stage_kdp.py 2>&1 | tee artifacts/tier4_build_results.txt

      - name: Generate training data
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p artifacts
          echo "=== SFT data merge ==="
          python -c "
          import json
          from pathlib import Path
          sft = Path('training-data/sft_system.jsonl')
          if sft.exists():
              count = sum(1 for _ in open(sft))
              print(f'SFT records: {count}')
          " 2>&1 | tee -a artifacts/tier4_build_results.txt

      - name: Generate overnight report
        run: |
          echo "# SCBE Overnight Pipeline Report" > artifacts/OVERNIGHT_REPORT.md
          echo "Generated: $(date -u)" >> artifacts/OVERNIGHT_REPORT.md
          echo "" >> artifacts/OVERNIGHT_REPORT.md
          echo "## Tier Results" >> artifacts/OVERNIGHT_REPORT.md
          for f in artifacts/tier*_results.txt; do
            if [ -f "$f" ]; then
              echo "### $(basename $f)" >> artifacts/OVERNIGHT_REPORT.md
              tail -20 "$f" >> artifacts/OVERNIGHT_REPORT.md
              echo "" >> artifacts/OVERNIGHT_REPORT.md
            fi
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier-4-results
          path: artifacts/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # TIER 5: Training Data (60 min) — Merge, validate, push to HF
  # ═══════════════════════════════════════════════════════════
  tier-5-training:
    needs: tier-4-build
    if: ${{ always() && (inputs.tier == 'full' || github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: pip install huggingface_hub datasets pytest numpy

      - name: Merge training data sources
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p artifacts
          echo "=== Merging SFT sources ==="
          python -c "
          import json, sys
          from pathlib import Path

          sources = list(Path('training-data').glob('**/*.jsonl'))
          total = 0
          merged = []
          for src in sources:
              try:
                  with open(src) as f:
                      records = [json.loads(l) for l in f if l.strip()]
                      merged.extend(records)
                      total += len(records)
                      print(f'  {src.name}: {len(records)} records')
              except Exception as e:
                  print(f'  WARNING: {src.name}: {e}', file=sys.stderr)

          print(f'Total merged: {total} records')

          if total == 0:
              print('::error::Zero records merged — aborting', file=sys.stderr)
              sys.exit(1)

          # Deduplicate by prompt
          seen = set()
          unique = []
          for r in merged:
              key = r.get('prompt', r.get('instruction', ''))[:100]
              if key not in seen:
                  seen.add(key)
                  unique.append(r)
          print(f'After dedup: {len(unique)} records')

          Path('artifacts').mkdir(exist_ok=True)
          with open('artifacts/training_merged.jsonl', 'w') as f:
              for r in unique:
                  f.write(json.dumps(r) + '\n')
          " 2>&1 | tee artifacts/tier5_training_results.txt

      - name: Validate training data quality
        run: |
          python -c "
          import json, sys
          records = [json.loads(l) for l in open('artifacts/training_merged.jsonl')]
          print(f'Records: {len(records)}')

          # Check for required fields
          good = 0
          bad = 0
          for r in records:
              if 'prompt' in r and 'response' in r:
                  if len(r['prompt']) > 10 and len(r['response']) > 20:
                      good += 1
                  else:
                      bad += 1
              else:
                  bad += 1

          total = good + bad
          quality = good / total * 100 if total > 0 else 0
          print(f'Valid: {good}')
          print(f'Invalid: {bad}')
          print(f'Quality: {quality:.1f}%')

          if quality < 50:
              print(f'::error::Training data quality {quality:.1f}% is below 50% threshold')
              sys.exit(1)
          elif quality < 80:
              print(f'::warning::Training data quality {quality:.1f}% is below 80% target')
          " 2>&1 | tee -a artifacts/tier5_training_results.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier-5-results
          path: artifacts/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # TIER 6: Colab Training (runs via API, checks status)
  # ═══════════════════════════════════════════════════════════
  tier-6-colab:
    needs: tier-5-training
    if: ${{ always() && (inputs.tier == 'full' || github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true
        run: pip install huggingface_hub google-genai requests

      - name: Download merged training data
        uses: actions/download-artifact@v4
        with:
          name: tier-5-results
          path: artifacts/
        # audit: advisory - non-blocking telemetry/reporting path; downstream summary or gate handles outcome
        continue-on-error: true

      - name: Push training data to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          from pathlib import Path
          import os

          token = os.environ.get('HF_TOKEN', '')
          merged = Path('artifacts/training_merged.jsonl')

          if merged.exists() and token:
              api = HfApi(token=token)
              try:
                  api.upload_file(
                      path_or_fileobj=str(merged),
                      path_in_repo='training_merged.jsonl',
                      repo_id='issdandavis/scbe-aethermoore-training-data',
                      repo_type='dataset',
                  )
                  print('Pushed training data to HuggingFace')
              except Exception as e:
                  print(f'HF push failed: {e}')
          else:
              print('No training data or no token')
          " 2>&1 | tee artifacts/tier6_colab_results.txt

      - name: Trigger Colab notebook (if configured)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== Colab trigger ==="
          echo "Colab training requires Playwright browser automation."
          echo "For overnight runs, use the scbe-colab-compute skill manually."
          echo "Training data has been pushed to HuggingFace for Colab to pull."
          echo ""
          echo "Manual Colab command:"
          echo "  python -m scripts.training.launch_colab_training"
          echo ""
          echo "HuggingFace dataset: issdandavis/scbe-aethermoore-training-data"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier-6-results
          path: artifacts/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # SUMMARY: Collect all results
  # ═══════════════════════════════════════════════════════════
  summary:
    needs: [tier-1-gates, tier-1-validate, tier-2-test, tier-3-security, tier-4-build, tier-5-training, tier-6-colab]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Pipeline summary
        run: |
          echo "╔═════════════════════════════��════════════╗"
          echo "║  SCBE Overnight Pipeline — Complete      ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  Tier 1 (Gates):     ${{ needs.tier-1-gates.result }}"
          echo "║  Tier 1 (Validate):  ${{ needs.tier-1-validate.result }}"
          echo "║  VM Status:          ${{ needs.tier-1-validate.outputs.vm_status }}"
          echo "║  Tier 2 (Test):      ${{ needs.tier-2-test.result }}"
          echo "║  Tier 3 (Security):  ${{ needs.tier-3-security.result }}"
          echo "║  Tier 4 (Build):     ${{ needs.tier-4-build.result }}"
          echo "║  Tier 5 (Training):  ${{ needs.tier-5-training.result }}"
          echo "║  Tier 6 (Colab/HF):  ${{ needs.tier-6-colab.result }}"
          echo "╚══════════════════════════════════════════╝"
