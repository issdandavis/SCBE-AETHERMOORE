name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          fi

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bandit
        run: |
          bandit -r src scripts api python agents -q \
            -x tests,node_modules,dist,artifacts,training,external || true

      - name: Check for package.json and run npm audit
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm audit --audit-level=high || true

      - name: Check for requirements.txt and run pip-audit
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          pip-audit -r requirements.txt || true

      - name: Security summary
        if: always()
        run: |
          echo "## Security Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- gitleaks is blocking" >> "$GITHUB_STEP_SUMMARY"
          echo "- bandit is advisory in this lane" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm audit is advisory in this lane" >> "$GITHUB_STEP_SUMMARY"
          echo "- pip-audit is advisory in this lane" >> "$GITHUB_STEP_SUMMARY"
