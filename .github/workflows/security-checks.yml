name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          fi

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bandit
        id: bandit
        continue-on-error: true
        run: |
          bandit -r src scripts api python agents -q \
            -x tests,node_modules,dist,artifacts,training,external

      - name: Check for package.json and run npm audit
        id: npm_audit
        if: ${{ hashFiles('package-lock.json') != '' }}
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Check for requirements.txt and run pip-audit
        id: pip_audit
        if: ${{ hashFiles('requirements.txt') != '' }}
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt

      - name: Security summary
        if: always()
        run: |
          echo "## Security Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- gitleaks: **blocking**" >> "$GITHUB_STEP_SUMMARY"
          echo "- bandit: ${{ steps.bandit.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm audit: ${{ steps.npm_audit.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- pip-audit: ${{ steps.pip_audit.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any security check failed
        if: always()
        run: |
          failed=0
          if [ "${{ steps.bandit.outcome }}" = "failure" ]; then
            echo "::error::Bandit security scan found issues"
            failed=1
          fi
          if [ "${{ steps.npm_audit.outcome }}" = "failure" ]; then
            echo "::error::npm audit found vulnerabilities"
            failed=1
          fi
          if [ "${{ steps.pip_audit.outcome }}" = "failure" ]; then
            echo "::error::pip-audit found vulnerabilities"
            failed=1
          fi
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more security checks failed — see summary above"
            exit 1
          fi
