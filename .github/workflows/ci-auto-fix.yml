name: CI Auto-Fix

# Purpose: Apply deterministic, safe fixes (formatting only) when CI fails on main.
# NOTE: Keep workflow syntax and expressions conservative; this file previously caused
# "workflow file issue" failures at parse time.

on:
  workflow_run:
    workflows: ["CI", "SCBE Gates"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-fix:
    # Only run on failures from main, never on forks.
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_URL: ${{ github.event.workflow_run.html_url }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install minimal tooling
        run: |
          python -m pip install --upgrade pip
          pip install black ruff
          npm ci --ignore-scripts 2>/dev/null || true

      - name: Apply deterministic formatting fixes
        run: |
          python -m black --target-version py311 --line-length 120 src/ tests/ 2>/dev/null || true
          ruff check --config ruff.toml --fix 2>/dev/null || true

      - name: Create fix PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git diff --stat)" ] && [ -z "$(git diff --cached --stat)" ]; then
            echo "No deterministic fixes to apply." >> "$GITHUB_STEP_SUMMARY"
            echo "- CI run: $RUN_URL" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          BRANCH="fix/ci-auto-fix-${RUN_ID}"

          git config user.email "ci-auto-fix[bot]@users.noreply.github.com"
          git config user.name "ci-auto-fix[bot]"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(ci): auto-fix formatting from run ${RUN_ID}"
          git push origin "$BRANCH"

          gh pr create \
            --title "fix(ci): auto-fix formatting" \
            --body "Deterministic formatting-only fixes for CI failure: ${RUN_URL}" \
            --base main \
            --head "$BRANCH" \
            --label "ci-auto-fix" || true

          echo "Fix PR created (or already exists)." >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: $BRANCH" >> "$GITHUB_STEP_SUMMARY"
          echo "- CI run: $RUN_URL" >> "$GITHUB_STEP_SUMMARY"
