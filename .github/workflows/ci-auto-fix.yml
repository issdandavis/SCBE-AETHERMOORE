name: CI Auto-Fix

on:
  workflow_run:
    workflows: ["CI", "SCBE Gates"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-fix:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install black flake8
          npm ci --ignore-scripts 2>/dev/null || true

      - name: Detect failures
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci/detect_failures.py \
            --run-id ${{ github.event.workflow_run.id }} \
            --json > /tmp/failure_report.json

          echo "failure_count=$(python -c "import json; d=json.load(open('/tmp/failure_report.json')); print(d.get('failure_count', 0))")" >> $GITHUB_OUTPUT
          cat /tmp/failure_report.json

      - name: Apply deterministic fixes
        if: steps.detect.outputs.failure_count > 0
        run: |
          # Black formatting
          if grep -q '"black_format"' /tmp/failure_report.json; then
            echo "Applying Black formatting..."
            python -m black --target-version py311 --line-length 120 src/ tests/ 2>/dev/null || true
          fi

          # Check if anything changed
          if git diff --stat | head -5; then
            echo "changes_made=true" >> $GITHUB_OUTPUT
          fi

      - name: Create fix PR
        if: steps.detect.outputs.failure_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git diff --stat)" ]; then
            echo "No deterministic fixes applicable. Manual intervention needed."
            echo "## CI Auto-Fix Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Run ${{ github.event.workflow_run.id }} failed but no automated fixes could be applied." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Detected Failures" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          d = json.load(open('/tmp/failure_report.json'))
          for f in d.get('failures', []):
              print(f'- **[{f[\"category\"]}]** {f[\"description\"]}: `{f[\"raw_match\"][:80]}`')
          for line in d.get('raw_errors', [])[:5]:
              print(f'- `{line[:120]}`')
          " >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          BRANCH="fix/ci-auto-fix-${{ github.event.workflow_run.id }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(ci): auto-fix formatting from run ${{ github.event.workflow_run.id }}

          Automated fix generated by CI Auto-Fix workflow.

          Co-Authored-By: CI Auto-Fix Bot <noreply@github.com>"
          git push origin "$BRANCH"

          gh pr create \
            --title "fix(ci): auto-fix from run ${{ github.event.workflow_run.id }}" \
            --body "$(cat <<'PREOF'
          ## Summary
          Automated CI fix for failed run ${{ github.event.workflow_run.id }}.

          Triggered by: ${{ github.event.workflow_run.name }}
          Branch: ${{ github.event.workflow_run.head_branch }}

          ## Failure Report
          $(python -c "
          import json
          d = json.load(open('/tmp/failure_report.json'))
          for f in d.get('failures', []):
              print(f'- **[{f[\"category\"]}]** {f[\"description\"]}')
          ")

          🤖 Generated by CI Auto-Fix
          PREOF
          )" \
            --base "${{ github.event.workflow_run.head_branch }}"

      - name: Summary
        if: always()
        run: |
          echo "## CI Auto-Fix Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/failure_report.json ]; then
            python -c "
          import json
          d = json.load(open('/tmp/failure_report.json'))
          print(f'**Run**: {d.get(\"run_id\", \"?\")}')
          print(f'**Workflow**: {d.get(\"workflow\", \"?\")}')
          print(f'**Branch**: {d.get(\"branch\", \"?\")}')
          print(f'**Failures detected**: {d.get(\"failure_count\", 0)}')
          print()
          if d.get('failures'):
              print('### Failures')
              for f in d['failures']:
                  print(f'- [{f[\"category\"]}] {f[\"description\"]}: \`{f[\"raw_match\"][:80]}\`')
          if d.get('fix_commands'):
              print()
              print('### Suggested Commands')
              for cmd in d['fix_commands']:
                  print(f'- \`{cmd[:120]}\`')
          " >> $GITHUB_STEP_SUMMARY
          fi
