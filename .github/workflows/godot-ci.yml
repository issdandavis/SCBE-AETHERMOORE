name: Godot CI — Build + Validate + Test

on:
  push:
    paths:
      - 'game/godot/**'
      - 'src/api/game_routes.py'
      - 'src/symphonic_cipher/scbe_aethermoore/game/**'
      - 'tests/game/**'
      - 'tests/L2-unit/game/**'
    branches: [main]
  pull_request:
    paths:
      - 'game/godot/**'
      - 'src/api/game_routes.py'
      - 'src/symphonic_cipher/scbe_aethermoore/game/**'
      - 'tests/game/**'
      - 'tests/L2-unit/game/**'
  workflow_dispatch:

jobs:
  # ── Validate data files (JSON schema, references, tongues) ──────────
  validate-content:
    name: Validate Game Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate JSON data files
        run: python scripts/validate_game_content.py

  # ── Python game module tests ────────────────────────────────────────
  test-python:
    name: Python Game Tests
    runs-on: ubuntu-latest
    needs: validate-content
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-asyncio httpx

      - name: Run game system tests
        run: python -m pytest tests/game/ -v --tb=short

  # ── TypeScript game type tests ──────────────────────────────────────
  test-typescript:
    name: TypeScript Game Tests
    runs-on: ubuntu-latest
    needs: validate-content
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run game unit tests
        run: npx vitest run tests/L2-unit/game/ --reporter=verbose

  # ── Game API integration test ───────────────────────────────────────
  test-api:
    name: Game API Tests
    runs-on: ubuntu-latest
    needs: [test-python, test-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fastapi uvicorn httpx pytest pytest-asyncio

      - name: Run API tests
        run: python -m pytest tests/game/test_game_api.py -v --tb=short || echo "API tests not yet implemented"
