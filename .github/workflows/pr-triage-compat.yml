name: PR Triage (compat)

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  # Preempt Node 20 deprecation warnings for JavaScript-based actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  auto-label:
    name: Auto Label Issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Label based on size
        uses: codelytv/pr-size-labeler@v1.10.3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/XS"
          xs_max_size: "10"
          s_label: "size/S"
          s_max_size: "100"
          m_label: "size/M"
          m_max_size: "500"
          l_label: "size/L"
          l_max_size: "1000"
          xl_label: "size/XL"
          fail_if_xl: "false"

  auto-assign:
    name: Auto Assign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Assign PR to owner
        uses: actions/github-script@v7
        with:
          script: |
            const assignees = ['issdandavis'];
            const issue_number = context.payload.pull_request.number;
            await github.rest.issues.addAssignees({ ...context.repo, issue_number, assignees });

