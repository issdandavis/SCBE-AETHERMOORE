name: Build AetherCode - Play Store and Kindle

on:
  push:
    paths:
      - 'kindle-app/**'
      - 'public/arena.html'
  workflow_dispatch:
    inputs:
      build_release:
        description: 'Build signed release AAB for Play Store'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEY_ALIAS: ${{ secrets.AETHERCODE_KEY_ALIAS }}
      KEYSTORE_PASSWORD: ${{ secrets.AETHERCODE_KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.AETHERCODE_KEY_PASSWORD }}
      KEYSTORE_B64: ${{ secrets.AETHERCODE_KEYSTORE_B64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: kindle-app
        run: npm install

      - name: Copy PWA assets
        working-directory: kindle-app
        run: node scripts/copy-pwa-assets.js

      - name: Sync Capacitor
        working-directory: kindle-app
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build debug APK
        working-directory: kindle-app/android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AetherCode-debug-apk
          path: kindle-app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Detect release signing readiness
        id: release_guard
        shell: bash
        run: |
          ready=true
          for key in KEYSTORE_PASSWORD KEY_PASSWORD KEYSTORE_B64; do
            if [ -z "${!key}" ]; then
              ready=false
            fi
          done
          if [ -z "$KEY_ALIAS" ]; then
            echo "KEY_ALIAS=aethercode" >> "$GITHUB_ENV"
          fi
          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        if: (inputs.build_release == true || github.event_name == 'push') && steps.release_guard.outputs.ready == 'true'
        working-directory: kindle-app/android
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 --decode > app/aethercode-release.jks

      - name: Inject signing config
        if: (inputs.build_release == true || github.event_name == 'push') && steps.release_guard.outputs.ready == 'true'
        working-directory: kindle-app/android
        run: |
          python3 - << 'PYEOF'
          with open("app/build.gradle", "r") as f:
              content = f.read()
          if "signingConfigs" not in content:
              signing = '''
              signingConfigs {
                  release {
                      storeFile file("aethercode-release.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
          '''
              content = content.replace("buildTypes {", signing + "\n    buildTypes {")
              content = content.replace(
                  "minifyEnabled false",
                  "minifyEnabled false\n            signingConfig signingConfigs.release"
              )
              with open("app/build.gradle", "w") as f:
                  f.write(content)
              print("Signing config injected")
          else:
              print("Signing config already present")
          PYEOF

      - name: Build release AAB (Play Store)
        if: (inputs.build_release == true || github.event_name == 'push') && steps.release_guard.outputs.ready == 'true'
        working-directory: kindle-app/android
        run: ./gradlew bundleRelease

      - name: Build release APK (Amazon Appstore)
        if: (inputs.build_release == true || github.event_name == 'push') && steps.release_guard.outputs.ready == 'true'
        working-directory: kindle-app/android
        run: ./gradlew assembleRelease

      - name: Upload release AAB
        if: (inputs.build_release == true || github.event_name == 'push') && steps.release_guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: AetherCode-release-aab
          path: kindle-app/android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Upload release APK
        if: (inputs.build_release == true || github.event_name == 'push') && steps.release_guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: AetherCode-release-apk
          path: kindle-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Summary
        run: |
          echo "## AetherCode Build" >> $GITHUB_STEP_SUMMARY
          echo "- Package: com.issdandavis.aethercode" >> $GITHUB_STEP_SUMMARY
          echo "- Debug APK: uploaded" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.release_guard.outputs.ready }}" != "true" ]; then
            echo "- Release signing: skipped (missing GitHub secrets)" >> $GITHUB_STEP_SUMMARY
          fi
          ls kindle-app/android/app/build/outputs/bundle/release/*.aab 2>/dev/null && echo "- Release AAB: uploaded (Play Store ready)" >> $GITHUB_STEP_SUMMARY || true
          ls kindle-app/android/app/build/outputs/apk/release/*.apk 2>/dev/null && echo "- Release APK: uploaded (Amazon ready)" >> $GITHUB_STEP_SUMMARY || true
