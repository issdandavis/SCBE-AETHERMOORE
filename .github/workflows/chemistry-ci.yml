name: Chemistry Lane CI

on:
  push:
    paths:
      - 'python/scbe/chemistry_*.py'
      - 'python/scbe/atomic_tokenization.py'
      - 'tests/test_chemistry_*.py'
      - 'tests/test_state9d_chemistry*.py'
      - 'training-data/**/chemistry_*.jsonl'
  pull_request:
    paths:
      - 'python/scbe/chemistry_*.py'
      - 'python/scbe/atomic_tokenization.py'
      - 'tests/test_chemistry_*.py'
      - 'tests/test_state9d_chemistry*.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  chemistry-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: '.'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest rdkit numpy jsonschema

    - name: Run Chemistry Adapter Tests
      run: |
        python -m pytest tests/test_chemistry_adapter.py -v --tb=short

    - name: Run Chemistry Verification Gate Tests
      run: |
        python -m pytest tests/test_chemistry_verification_gate.py -v --tb=short

    - name: Run State9D Chemistry Tests
      run: |
        python -m pytest tests/test_state9d_chemistry.py tests/test_state9d_chemistry_fusion.py -v --tb=short

    - name: Run State9D Engine Tests
      run: |
        python -m pytest tests/test_state9d_engine.py -v --tb=short

    - name: Run Gate Stress Test
      run: |
        python scripts/system/gate_stress_test.py

    - name: Preflight Training Datasets
      run: |
        python scripts/system/preflight_zero_cost_training.py --profile config/model_training/scbe-chemistry-0.5b-qlora.json --json
