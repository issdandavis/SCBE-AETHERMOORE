# SCBE-AETHERMOORE Kubernetes Service
# Routes external traffic to the SCBE API pods.
apiVersion: v1
kind: Service
metadata:
  name: scbe-aethermoore-service
  namespace: scbe-aethermoore
  labels:
    app: scbe-aethermoore
    managed-by: config-sync
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: scbe-aethermoore
