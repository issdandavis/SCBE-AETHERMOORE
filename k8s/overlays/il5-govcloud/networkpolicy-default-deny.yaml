  namespace: scbe-agents
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: scbe-aethermoore
          podSelector:
            matchLabels:
              app: scbe-aethermoore
      ports:
        - protocol: TCP
          port: 8080
